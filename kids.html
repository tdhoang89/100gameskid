  }
});

/* ---- 4. TAP — light switches toggle bulbs ----------------------------- */
Arcade.register({
  id: 'light-switches', title: 'Bật Đèn', emoji: '💡', category: 'Tap', color: '#facc15',
  desc: 'Chạm để bật/tắt đèn.', how: 'Chạm để bật hết các bóng đèn!',
  create: function (host) {
    var bulbs, n, celebrate;
    function reset() { n = 6; bulbs = []; for (var i = 0; i < n; i++) bulbs.push({ on: 0, glow: 0 }); celebrate = 0; }
    function layout() {
      var W = host.W, H = host.H;
      var cols = W > H ? 3 : 2, rows = Math.ceil(n / cols);
      var pad = Math.min(W, H) * 0.05;
      var top = H * 0.14;
      var cw = (W - pad * (cols + 1)) / cols;
      var ch = (H - top - pad * (rows + 1)) / rows;
      var arr = [];
      for (var i = 0; i < n; i++) {
        var cx = i % cols, cy = (i / cols) | 0;
        arr.push({ x: pad + cx * (cw + pad), y: top + pad + cy * (ch + pad), w: cw, h: ch });
      }
      return arr;
    }
    function allOn() { for (var i = 0; i < bulbs.length; i++) if (!bulbs[i].on) return false; return true; }
    host.on('tap', function (p) {
      if (!bulbs || celebrate > 0) return;
      var L = layout();
      for (var i = 0; i < bulbs.length; i++) {
        if (p.x > L[i].x && p.x < L[i].x + L[i].w && p.y > L[i].y && p.y < L[i].y + L[i].h) {
          bulbs[i].on = bulbs[i].on ? 0 : 1; bulbs[i].glow = 0.3;
          host.sfx('select'); host.vibrate(12);
          if (bulbs[i].on) host.note('A5', 0.2, 'bell', 0.25); else host.tone(300, 0.08, 'sine', 0.2);
          if (allOn()) { celebrate = 1.8; host.celebrate(host.W / 2, host.H * 0.4); host.say('All lit up!', 'en-US'); }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var lit = 0; for (var q = 0; q < bulbs.length; q++) if (bulbs[q].on) lit++;
      // room dims/brightens with how many are on
      var bright = 0.25 + 0.75 * (lit / bulbs.length);
      var bg = c.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, 'rgb(' + Math.round(40 + bright * 200) + ',' + Math.round(35 + bright * 190) + ',' + Math.round(70 + bright * 130) + ')');
      bg.addColorStop(1, 'rgb(' + Math.round(30 + bright * 180) + ',' + Math.round(28 + bright * 170) + ',' + Math.round(55 + bright * 120) + ')');
      c.fillStyle = bg; c.fillRect(0, 0, W, H);
      var L = layout();
      for (var i = 0; i < bulbs.length; i++) {
        var b = bulbs[i], r = L[i];
        if (b.glow > 0) b.glow -= dt;
        var cx = r.x + r.w / 2, cy = r.y + r.h / 2;
        var rad = Math.min(r.w, r.h) * 0.34;
        if (b.on) {
          // halo
          var hg = c.createRadialGradient(cx, cy, rad * 0.3, cx, cy, rad * 2.4);
          hg.addColorStop(0, 'rgba(255,240,150,.85)'); hg.addColorStop(1, 'rgba(255,240,150,0)');
          c.fillStyle = hg; c.beginPath(); c.arc(cx, cy, rad * 2.4, 0, 7); c.fill();
        }
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = Math.round(rad * 2.2 * (1 + Math.max(0, b.glow) * 0.3)) + 'px system-ui';
        c.globalAlpha = b.on ? 1 : 0.55;
        c.fillText(b.on ? '💡' : '🔌', cx, cy);
        c.globalAlpha = 1; c.textBaseline = 'alphabetic';
      }
      c.fillStyle = lit === bulbs.length ? '#fde047' : 'rgba(255,255,255,.85)';
      c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Sáng hết rồi!' : '💡 Chạm để bật đèn  ' + lit + '/' + bulbs.length, W / 2, H * 0.08);
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) { for (var k = 0; k < bulbs.length; k++) { bulbs[k].on = 0; bulbs[k].glow = 0; } } }
    });
    return { start: function () { reset(); host.music('sunny'); } };
  }
});

/* ---- 5. TAP — jack in the box, crank then surprise -------------------- */
Arcade.register({
  id: 'jack-in-box', title: 'Hộp Bất Ngờ', emoji: '🎁', category: 'Tap', color: '#ec4899',
  desc: 'Quay tay đến khi bất ngờ nhảy ra!', how: 'Chạm quay tay nhiều lần!',
  create: function (host) {
    var POPS = [['🐰', 'rabbit'], ['🤡', 'clown'], ['🐶', 'dog'], ['🐱', 'cat'], ['🐸', 'frog'], ['🦄', 'unicorn'], ['🐵', 'monkey'], ['🐥', 'chick']];
    var TUNE = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5', 'F5', 'G5'];
    var cranks, target, open, who, crankAngle, rise, lidWob;
    function reset() {
      cranks = 0; target = host.rint(6, 10); open = 0; who = host.choice(POPS);
      crankAngle = 0; rise = 0; lidWob = 0;
    }
    function box() {
      var W = host.W, H = host.H;
      var s = Math.min(W, H) * 0.42;
      return { x: W / 2 - s / 2, y: H * 0.5 - s / 2, w: s, h: s };
    }
    function crankHit() {
      // whole lower box area is a big crank target
      var b = box();
      return { x: b.x - b.w * 0.2, y: b.y, w: b.w * 1.4, h: b.h + b.h * 0.5 };
    }
    host.on('tap', function (p) {
      if (!POPS) return;
      if (open > 0) { reset(); host.sfx('pop'); return; }
      var ch = crankHit();
      if (p.x > ch.x && p.x < ch.x + ch.w && p.y > ch.y && p.y < ch.y + ch.h) {
        cranks++; crankAngle += Math.PI / 3; lidWob = 0.3;
        host.note(TUNE[Math.min(cranks - 1, TUNE.length - 1)], 0.3, 'musicbox', 0.3);
        host.vibrate(10);
        if (cranks >= target) {
          open = 0.001; rise = 0;
          host.sfx('boing'); host.sfx('tada'); host.animal(who[1] === 'clown' || who[1] === 'unicorn' ? 'monkey' : who[1]);
          host.confetti(host.W / 2, host.H * 0.35); host.celebrate(host.W / 2, host.H * 0.35);
          host.say('Surprise!', 'en-US'); host.vibrate(40);
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#fce7f3'); g.addColorStop(1, '#fbcfe8'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      if (lidWob > 0) lidWob -= dt;
      var b = box();

      // character rising out
      if (open > 0) {
        open += dt; rise = Math.min(1, rise + dt * 3);
        var px = b.x + b.w / 2;
        var py = b.y - b.h * 0.5 * rise + Math.sin(open * 8) * (1 - rise) * 10;
        c.textAlign = 'center'; c.textBaseline = 'middle';
        // spring
        c.strokeStyle = '#9ca3af'; c.lineWidth = 6; c.beginPath();
        for (var s = 0; s <= 1; s += 0.1) { var yy = b.y + (py - b.y) * s; var xx = px + Math.sin(s * 18) * b.w * 0.12 * (1 - rise * 0.5); if (s === 0) c.moveTo(xx, yy); else c.lineTo(xx, yy); }
        c.stroke();
        c.font = Math.round(b.w * 0.5) + 'px system-ui'; c.fillText(who[0], px, py);
        c.textBaseline = 'alphabetic';

      // box body
      c.save(); host.rr(b.x, b.y, b.w, b.h, b.w * 0.1);
      c.fillStyle = '#ec4899'; c.fill(); c.lineWidth = 6; c.strokeStyle = '#fff'; c.stroke();
      // ribbon
      c.fillStyle = 'rgba(255,255,255,.55)'; c.fillRect(b.x + b.w * 0.42, b.y, b.w * 0.16, b.h);
      c.restore();

      // lid (closed = on top; open = flipped up)
      c.save();
      if (open > 0) {
        c.translate(b.x, b.y); c.rotate(-1.1 * Math.min(1, open * 4));
        host.rr(0, -b.h * 0.18, b.w, b.h * 0.18, b.w * 0.08); c.fillStyle = '#db2777'; c.fill(); c.lineWidth = 5; c.strokeStyle = '#fff'; c.stroke();
      } else {
        var lw = lidWob > 0 ? Math.sin(lidWob * 50) * 0.04 : 0;
        c.translate(b.x + b.w / 2, b.y); c.rotate(lw);
        host.rr(-b.w / 2, -b.h * 0.16, b.w, b.h * 0.18, b.w * 0.08); c.fillStyle = '#db2777'; c.fill(); c.lineWidth = 5; c.strokeStyle = '#fff'; c.stroke();
        c.font = Math.round(b.h * 0.12) + 'px system-ui'; c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText('🎀', 0, -b.h * 0.07); c.textBaseline = 'alphabetic';
      }
      c.restore();

      // crank handle
      if (open <= 0) {
        var hx = b.x + b.w, hy = b.y + b.h * 0.6;
        c.save(); c.translate(hx, hy); c.rotate(crankAngle);
        c.strokeStyle = '#6b7280'; c.lineWidth = 8; c.lineCap = 'round';
        c.beginPath(); c.moveTo(0, 0); c.lineTo(b.w * 0.22, 0); c.stroke();
        c.beginPath(); c.arc(b.w * 0.22, 0, b.w * 0.07, 0, 7); c.fillStyle = '#f59e0b'; c.fill();
        c.restore();
      }

      c.fillStyle = '#9d174d'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(open > 0 ? '🎉 Bất ngờ! Chạm để chơi lại' : '🎁 Chạm quay tay nào!', W / 2, H * 0.93);
    });
    return { start: function () { reset(); host.music('musicbox'); } };
  }
});

/* ---- 6. TAP — tap anywhere for confetti bursts ------------------------ */
Arcade.register({
  id: 'confetti-tap', title: 'Pháo Giấy', emoji: '🎉', category: 'Tap', color: '#a855f7',
  desc: 'Chạm khắp nơi để bắn pháo giấy.', how: 'Chạm bất cứ đâu để vui!',
  create: function (host) {

      host.sparkle(x, y, host.choice(host.PAL));

<script>
/* =============================================================================
 * BÉ VUI — GAMES PART 13  (6 gentle, no-fail cause-effect TOYS for ages 2–6)
 *   1. poke-jelly  — Chọc Thạch    🟪  Tap   #a855f7
 *   2. spinner     — Chong Chóng   🌀  Tap   #38bdf8
 *   3. day-night   — Ngày Và Đêm   🌞  Tap   #f59e0b
 *   4. piano-cat   — Mèo Đàn       🐱  Tap   #ec4899
 *   5. pop-stars   — Hái Sao       🌟  Tap   #facc15
 *   6. tickle      — Cù Lét        😆  Tap   #22c55e
 * Every game lives entirely inside create(host). No globals. dt-based timers.
 * Reads W/H every frame. Big touch targets. Endless, relaxing, rewarding.
 * ========================================================================== */

/* ---- 1. TAP — poke the jelly blob ------------------------------------- */
Arcade.register({
  id: 'poke-jelly', title: 'Chọc Thạch', emoji: '🟪', category: 'Tap', color: '#a855f7',
  desc: 'Chạm để chọc khối thạch.', how: 'Chạm & kéo khối thạch!',
  create: function (host) {
    var COLS = ['#a855f7', '#ec4899', '#38bdf8', '#22c55e', '#f59e0b', '#fb7185'];
    var jelly;
    function reset() {
      jelly = {
        col: host.choice(COLS),
        wob: 0,        // wobble energy
        ph: 0,         // wobble phase
        sx: 0, sy: 0,  // squish offset from poke point
        blink: 0,      // blink timer
        eye: 0,        // surprise (eyes wide) timer
        t: 0
      };
    }
    function center() { return { x: host.W / 2, y: host.H * 0.56 }; }
    function radius() { return Math.min(host.W, host.H) * 0.30; }
    function poke(p, hard) {
      var ct = center(), r = radius();
      var dx = p.x - ct.x, dy = p.y - ct.y;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d > r * 1.25) return false;
      // direction of squish (push away from poke point)
      var nx = d > 1 ? dx / d : 0, ny = d > 1 ? dy / d : 0;
      jelly.sx = host.lerp(jelly.sx, nx * r * 0.22, 0.6);
      jelly.sy = host.lerp(jelly.sy, ny * r * 0.22, 0.6);
      jelly.wob = Math.min(1.4, jelly.wob + (hard ? 0.9 : 0.5));
      jelly.eye = 0.5;
      host.sfx('boing'); host.vibrate(18);
      if (hard) { host.sparkle(p.x, p.y, jelly.col); }
      return true;
    }
    host.on('down', function (p) { poke(p, true); });
    host.on('move', function (p) { if (host.pointer.down) poke(p, false); });
    host.on('tap', function (p) {
      // a clean tap on empty space gives the jelly a wiggle too
      var ct = center(), r = radius();
      if (host.dist(p.x, p.y, ct.x, ct.y) > r * 1.25) { jelly.wob = Math.min(1.4, jelly.wob + 0.4); host.sfx('blip'); }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#f3e8ff'); g.addColorStop(1, '#fdf2ff'); c.fillStyle = g; c.fillRect(0, 0, W, H);

      jelly.t += dt;
      jelly.ph += dt * 12;
      // decay wobble & squish back to rest
      jelly.wob = Math.max(0, jelly.wob - dt * 1.1);
      jelly.sx = host.lerp(jelly.sx, 0, dt * 6);
      jelly.sy = host.lerp(jelly.sy, 0, dt * 6);
      jelly.blink -= dt; if (jelly.blink <= 0) { jelly.blink = host.rand(2.2, 4.5); }
      jelly.eye = Math.max(0, jelly.eye - dt);
      var blinking = jelly.blink < 0.12;

      var ct = center(), r = radius();
      // jiggle: stretch horizontally vs vertically out of phase
      var amp = jelly.wob;
      var sxr = 1 + Math.sin(jelly.ph) * 0.12 * amp + Math.abs(jelly.sx) / r * 0.4;
      var syr = 1 - Math.sin(jelly.ph) * 0.12 * amp - Math.abs(jelly.sy) / r * 0.2;
      var cx = ct.x + jelly.sx * 0.5, cy = ct.y + jelly.sy * 0.5;

      // shadow
      c.save(); c.globalAlpha = 0.18; c.fillStyle = '#7e22ce';
      c.beginPath(); c.ellipse(ct.x, ct.y + r * 0.92, r * 0.85, r * 0.22, 0, 0, 7); c.fill(); c.restore();

      // body
      c.save();
      c.translate(cx, cy);
      var grd = c.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.1, 0, 0, r * 1.15);
      grd.addColorStop(0, '#ffffff'); grd.addColorStop(0.25, jelly.col); grd.addColorStop(1, jelly.col);
      c.fillStyle = grd; c.globalAlpha = 0.92;
      c.beginPath(); c.ellipse(0, 0, r * sxr, r * syr, 0, 0, 7); c.fill();
      // glossy highlight
      c.globalAlpha = 0.5; c.fillStyle = 'rgba(255,255,255,.85)';
      c.beginPath(); c.ellipse(-r * 0.3, -r * 0.34, r * 0.26, r * 0.18, -0.5, 0, 7); c.fill();
      c.globalAlpha = 1;

      // eyes
      var ex = r * 0.32, ey = -r * 0.05, er = r * (0.16 + jelly.eye * 0.06);
      for (var s = -1; s <= 1; s += 2) {
        c.fillStyle = '#ffffff';
        c.beginPath(); c.ellipse(s * ex, ey, er, blinking ? er * 0.15 : er, 0, 0, 7); c.fill();
        if (!blinking) {
          c.fillStyle = '#3b2a55';
          var px = s * ex + jelly.sx * 0.12, py = ey + jelly.sy * 0.12;
          c.beginPath(); c.arc(px, py, er * 0.5, 0, 7); c.fill();
          c.fillStyle = '#fff';
          c.beginPath(); c.arc(px - er * 0.18, py - er * 0.18, er * 0.18, 0, 7); c.fill();
        }
      }
      // smile
      c.strokeStyle = '#3b2a55'; c.lineWidth = Math.max(3, r * 0.04); c.lineCap = 'round';
      c.beginPath();
      var sm = r * 0.30 * (1 + amp * 0.4);
      c.arc(0, r * 0.22, sm, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
      // rosy cheeks
      c.fillStyle = 'rgba(244,114,182,.4)';
      c.beginPath(); c.arc(-r * 0.5, r * 0.18, r * 0.1, 0, 7); c.fill();
      c.beginPath(); c.arc(r * 0.5, r * 0.18, r * 0.1, 0, 7); c.fill();
      c.restore();

      c.fillStyle = '#7e22ce'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('👆 Chọc khối thạch!', W / 2, H * 0.12);
    });
    return { start: function () { reset(); host.music('playful'); } };
  }
});

/* ---- 2. TAP — spin the pinwheel --------------------------------------- */
Arcade.register({
  id: 'spinner', title: 'Chong Chóng', emoji: '🌀', category: 'Tap', color: '#38bdf8',
  desc: 'Vuốt để quay chong chóng.', how: 'Vuốt hoặc chạm để quay!',
  create: function (host) {
    var COLS = ['#ef4444', '#f97316', '#facc15', '#22c55e', '#38bdf8', '#a855f7'];
    var spin, lastP, whirT;
    function reset() { spin = { ang: 0, vel: 0 }; lastP = null; whirT = 0; }
    function center() { return { x: host.W / 2, y: host.H * 0.52 }; }
    function radius() { return Math.min(host.W, host.H) * 0.32; }
    function push(amt) {
      spin.vel += amt;
      spin.vel = host.clamp(spin.vel, -26, 26);
      host.sfx('whoosh'); host.vibrate(12);
    }
    host.on('down', function (p) { lastP = { x: p.x, y: p.y, t: host.now() }; });
    host.on('move', function (p) {
      if (!host.pointer.down || !lastP) return;
      var ct = center();
      // angular delta around the hub -> drives the spin
      var a0 = Math.atan2(lastP.y - ct.y, lastP.x - ct.x);
      var a1 = Math.atan2(p.y - ct.y, p.x - ct.x);
      var da = a1 - a0;
      while (da > Math.PI) da -= Math.PI * 2;
      while (da < -Math.PI) da += Math.PI * 2;
      spin.vel = host.clamp(spin.vel + da * 14, -26, 26);
      lastP = { x: p.x, y: p.y, t: host.now() };
    });
    host.on('swipe', function (s) {
      var dir = (s.dx + s.dy) >= 0 ? 1 : -1;
      var mag = Math.min(20, (Math.abs(s.dx) + Math.abs(s.dy)) / 20 + 6);
      push(dir * mag);
    });
    host.on('tap', function (p) {
      // a tap gives it a friendly push
      push((host.rand() < 0.5 ? -1 : 1) * host.rand(8, 14));
      host.sparkle(p.x, p.y, host.choice(COLS));
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#e0f2fe'); g.addColorStop(1, '#f0f9ff'); c.fillStyle = g; c.fillRect(0, 0, W, H);

      // physics: coast & friction
      spin.ang += spin.vel * dt;
      var sp = Math.abs(spin.vel);
      // friction increases at low speed so it eases to a gentle stop
      spin.vel *= (1 - host.clamp(0.45 * dt + 0.012, 0, 0.5));
      if (sp < 0.04) spin.vel = 0;

      whirT -= dt;

      // pinwheel blades
      c.save();
      c.translate(ct.x, ct.y);
      c.rotate(spin.ang);
      var blades = 6;
      for (var i = 0; i < blades; i++) {
        var a = (i / blades) * Math.PI * 2;
        c.save();
        c.rotate(a);
        c.fillStyle = COLS[i % COLS.length];
        c.beginPath();
        c.moveTo(0, 0);
        c.lineTo(r, -r * 0.06);
        c.quadraticCurveTo(r * 0.95, r * 0.5, r * 0.18, r * 0.55);
        c.closePath();
        c.fill();
        c.strokeStyle = 'rgba(255,255,255,.7)'; c.lineWidth = Math.max(2, r * 0.02); c.stroke();
        c.restore();
      }
      // hub
      c.fillStyle = '#fde047'; c.beginPath(); c.arc(0, 0, r * 0.16, 0, 7); c.fill();
      c.strokeStyle = '#fff'; c.lineWidth = Math.max(3, r * 0.03); c.stroke();
      c.fillStyle = '#f59e0b'; c.beginPath(); c.arc(0, 0, r * 0.07, 0, 7); c.fill();
      c.restore();

      // motion-blur sparkles when fast
      if (sp > 8 && host.rand() < 0.5) {
        var ax = ct.x + Math.cos(spin.ang + host.rand(0, 6.28)) * r * 0.95;
        var ay = ct.y + Math.sin(spin.ang + host.rand(0, 6.28)) * r * 0.95;
        host.sparkle(ax, ay, host.choice(COLS));
      }

      c.fillStyle = '#0369a1'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('🌀 Vuốt để quay!', W / 2, H * 0.1);
    });
    return { start: function () { reset(); host.music('sunny'); } };
  }
});

Arcade.register({

  desc: 'Chạm các chú mèo để chơi nhạc.', how: 'Chạm vào mèo để nghe meo!',
  create: function (host) {

    }
    function layout() {
      var W = host.W, H = host.H, n = cats.length;

      c.beginPath();

      c.fillText('🐱 Chạm vào mèo để hát!', W / 2, H * 0.12);

  }

      c.fillStyle = '#fef9c3'; c.beginPath(); c.arc(mx, my, mr, 0, 7); c.fill();
      c.fillStyle = '#2a2560'; c.beginPath(); c.arc(mx + mr * 0.4, my - mr * 0.15, mr * 0.9, 0, 7); c.fill();

      // spawn drifting stars
      spawn -= dt;
      if (spawn <= 0 && stars.length < 7) { spawn = host.rand(0.6, 1.3); stars.push(makeStar(W, H)); }

      for (var j = stars.length - 1; j >= 0; j--) {
        var s = stars[j];
        if (s.pop > 0) {
          s.pop -= dt;
          if (s.pop <= 0) { stars.splice(j, 1); continue; }
        } else {
          s.x += s.vx * dt; s.y += s.vy * dt; s.tw += dt * 3;
          // wrap-out (no penalty, just drifts off)
          if (s.x < -s.r * 2 || s.x > W + s.r * 2 || s.y < -s.r * 2 || s.y > H + s.r * 2) { stars.splice(j, 1); continue; }
        }

        // glow
        var gg = c.createRadialGradient(s.x, s.y, rr * 0.2, s.x, s.y, rr * 1.8);
        gg.addColorStop(0, 'rgba(253,224,71,.5)'); gg.addColorStop(1, 'rgba(253,224,71,0)');
        c.fillStyle = gg; c.beginPath(); c.arc(s.x, s.y, rr * 1.8, 0, 7); c.fill();
        // star body
        starPath(c, s.x, s.y, rr, rot); c.fillStyle = s.col; c.fill();
        c.strokeStyle = 'rgba(255,255,255,.7)'; c.lineWidth = Math.max(2, rr * 0.06); c.stroke();
        c.restore();
      }
      c.globalAlpha = 1;

      // gentle collected counter (stars icons, no penalty text)
      c.fillStyle = '#fde047'; c.textAlign = 'left'; c.textBaseline = 'middle';
      c.font = '900 ' + Math.round(Math.min(W, H) * 0.07) + 'px system-ui';
      c.fillText('⭐ ' + collected, W * 0.05, H * 0.08);
      c.textAlign = 'center'; c.textBaseline = 'alphabetic';
      c.fillStyle = 'rgba(255,255,255,.85)'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('🌟 Chạm vào sao!', W / 2, H * 0.95);
    });
    return { start: function () { reset(); host.music('lullaby'); } };
  }
});

/* ---- 6. TAP — tickle the creature ------------------------------------- */
Arcade.register({
  id: 'tickle', title: 'Cù Lét', emoji: '😆', category: 'Tap', color: '#22c55e',
  desc: 'Chạm để cù bạn nhỏ.', how: 'Chạm & vuốt để cù!',
  create: function (host) {
    var ch;

        blink: host.rand(1, 4),
        bounce: 0,
        t: 0,
        sweat: []      // little joy droplets
      };
    }
    function center() { return { x: host.W / 2, y: host.H * 0.55 }; }
    function radius() { return Math.min(host.W, host.H) * 0.28; }

      var ct = center(), r = radius();
      if (host.dist(p.x, p.y, ct.x, ct.y) > r * 1.3) return false;
      ch.wig = Math.min(1.6, ch.wig + 0.6);
      ch.laugh = Math.max(ch.laugh, 0.7);
      ch.bounce = 0.4;
      // pick a giggle flavor by where it was tickled (different spots = different giggles)

      if (dy < -r * 0.2) { host.sfx('giggle'); host.note('C5', 0.18, 'flute', 0.22); }   // head

      else if (dx > r * 0.2) { host.sfx('giggle'); host.note('G5', 0.18, 'flute', 0.22); }  // right
      else { host.sfx('giggle'); host.note('A4', 0.18, 'flute', 0.22); }                    // belly
      host.vibrate(16);
      // joy droplet
      ch.sweat.push({ x: p.x, y: p.y, vx: host.rand(-30, 30), vy: host.rand(-80, -30), life: 0.6 });
      return true;
    }
    host.on('down', function (p) { tickleAt(p); });
    host.on('move', function (p) { if (host.pointer.down) { var ct = center(), r = radius(); if (host.dist(p.x, p.y, ct.x, ct.y) < r * 1.3) tickleAt(p); } });
    host.on('swipe', function () { ch.wig = Math.min(1.6, ch.wig + 0.5); ch.laugh = Math.max(ch.laugh, 0.6); host.sfx('giggle'); });
    host.on('tap', function (p) {
      var ct = center(), r = radius();
      if (host.dist(p.x, p.y, ct.x, ct.y) > r * 1.3) { ch.wig = Math.min(1.6, ch.wig + 0.3); host.sfx('blip'); }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#dcfce7'); g.addColorStop(1, '#f0fdf4'); c.fillStyle = g; c.fillRect(0, 0, W, H);

      ch.t += dt;
      ch.ph += dt * 16;
      ch.wig = Math.max(0, ch.wig - dt * 1.2);
      ch.laugh = Math.max(0, ch.laugh - dt);
      ch.bounce = Math.max(0, ch.bounce - dt);
      ch.blink -= dt; if (ch.blink <= -0.12) ch.blink = host.rand(1.5, 4.5);
      var blinking = ch.blink < 0.12;

      var ct = center(), r = radius();
      // wiggle: shift x with phase, scale a bit when laughing
      var wob = Math.sin(ch.ph) * ch.wig * r * 0.10;
      var bob = -ch.bounce * r * 0.25;
      var sc = 1 + ch.wig * 0.05;
      var cx = ct.x + wob, cy = ct.y + bob;

      // shadow
      c.save(); c.globalAlpha = 0.16; c.fillStyle = '#15803d';
      c.beginPath(); c.ellipse(ct.x, ct.y + r * 0.95, r * 0.8, r * 0.2, 0, 0, 7); c.fill(); c.restore();

      // joy droplets
      for (var i = ch.sweat.length - 1; i >= 0; i--) {
        var d = ch.sweat[i]; d.vy += 200 * dt; d.x += d.vx * dt; d.y += d.vy * dt; d.life -= dt;
        if (d.life <= 0) { ch.sweat.splice(i, 1); continue; }
        c.globalAlpha = host.clamp(d.life / 0.6, 0, 1); c.fillStyle = '#7dd3fc';
        c.beginPath(); c.arc(d.x, d.y, 6, 0, 7); c.fill();
      }
      c.globalAlpha = 1;

      // body (round blob)
      c.save();
      c.translate(cx, cy);
      var grd = c.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.1, 0, 0, r * 1.1);
      grd.addColorStop(0, '#86efac'); grd.addColorStop(0.4, ch.col); grd.addColorStop(1, '#16a34a');
      c.fillStyle = grd;
      c.beginPath(); c.ellipse(0, 0, r * sc, r * (2 - sc), 0, 0, 7); c.fill();
      // little feet
      c.fillStyle = '#16a34a';
      c.beginPath(); c.ellipse(-r * 0.35, r * 0.92, r * 0.2, r * 0.12, 0, 0, 7); c.fill();
      c.beginPath(); c.ellipse(r * 0.35, r * 0.92, r * 0.2, r * 0.12, 0, 0, 7); c.fill();
      // arms (wiggle)
      c.strokeStyle = '#16a34a'; c.lineWidth = Math.max(6, r * 0.12); c.lineCap = 'round';
      var aw = Math.sin(ch.ph * 1.3) * ch.wig * r * 0.3;
      c.beginPath(); c.moveTo(-r * 0.8, r * 0.1); c.lineTo(-r * 1.05, r * 0.1 - aw); c.stroke();
      c.beginPath(); c.moveTo(r * 0.8, r * 0.1); c.lineTo(r * 1.05, r * 0.1 + aw); c.stroke();

      // eyes (squeezed shut when laughing hard)
      var ex = r * 0.34, ey = -r * 0.12, er = r * 0.15;
      var squeezed = ch.laugh > 0.25;
      c.strokeStyle = '#14532d'; c.lineWidth = Math.max(3, r * 0.05); c.lineCap = 'round';
      if (squeezed || blinking) {
        // happy closed eyes ^ ^
        for (var s = -1; s <= 1; s += 2) {
          c.beginPath();
          c.arc(s * ex, ey + er * 0.4, er * 0.8, 1.15 * Math.PI, 1.85 * Math.PI);
          c.stroke();

      } else {
        c.fillStyle = '#14532d';
        c.beginPath(); c.arc(-ex, ey, er * 0.7, 0, 7); c.fill();
        c.beginPath(); c.arc(ex, ey, er * 0.7, 0, 7); c.fill();
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(-ex - er * 0.2, ey - er * 0.2, er * 0.25, 0, 7); c.fill();
        c.beginPath(); c.arc(ex - er * 0.2, ey - er * 0.2, er * 0.25, 0, 7); c.fill();
      }

      // mouth: big open laugh vs gentle smile
      c.fillStyle = '#b91c1c';
      if (ch.laugh > 0) {
        var mo = r * (0.16 + ch.laugh * 0.14);
        c.beginPath(); c.ellipse(0, r * 0.25, mo * 0.9, mo, 0, 0, 7); c.fill();
        c.fillStyle = '#fca5a5';
        c.beginPath(); c.ellipse(0, r * 0.32, mo * 0.5, mo * 0.5, 0, 0, 7); c.fill();
      } else {
        c.strokeStyle = '#14532d'; c.lineWidth = Math.max(3, r * 0.05);
        c.beginPath(); c.arc(0, r * 0.18, r * 0.26, 0.12 * Math.PI, 0.88 * Math.PI); c.stroke();
      }
      // rosy cheeks
      c.fillStyle = 'rgba(244,114,182,.45)';
      c.beginPath(); c.arc(-r * 0.5, r * 0.12, r * 0.1, 0, 7); c.fill();
      c.beginPath(); c.arc(r * 0.5, r * 0.12, r * 0.1, 0, 7); c.fill();
      c.restore();

      // "ha ha" bubbles when laughing
      if (ch.laugh > 0.3 && host.rand() < 0.15) {
        host.sparkle(cx + host.rand(-r, r), cy - r, '#bbf7d0');
      }

      c.fillStyle = '#15803d'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('😆 Cù cho bạn cười!', W / 2, H * 0.12);
    });
    return { start: function () { reset(); host.music('happy'); } };
  }
});

<script>

/* ---- 1. SIZE-SORT — drag the item into the big or small bin ------------- */
Arcade.register({
  id: 'size-sort', title: 'Xếp To Nhỏ', emoji: '📏', category: 'Logic', color: '#f59e0b',
  desc: 'Kéo đồ vật vào hộp To hoặc Nhỏ.', how: 'To bỏ hộp to, nhỏ bỏ hộp nhỏ!',
  create: function (host) {
    var EMO = ['🍎', '⭐', '🐠', '🌸', '🎈', '🍓', '🦋', '🚗', '🐝', '🍋'];
    var item, drag, dragOff, done, target, celebrate;
    function reset() { done = 0; celebrate = 0; spawn(); }
    function spawn() {
      target = host.choice(['big', 'small']);
      item = { emoji: host.choice(EMO), big: target === 'big', x: host.W / 2, y: host.H * 0.3 };
      drag = false; dragOff = { x: 0, y: 0 };
      host.say(item.big ? 'big' : 'small', 'en-US');
    }
    function bins() {
      var W = host.W, H = host.H;
      var bw = W * 0.4, bh = Math.min(H * 0.34, W * 0.42);
      var y = H - bh - H * 0.04;
      return [
        { kind: 'big',   x: W * 0.06,            y: y, w: bw, h: bh },
        { kind: 'small', x: W - bw - W * 0.06,   y: y, w: bw, h: bh }
      ];
    }
    function isz() { var s = Math.min(host.W, host.H); return (item && item.big ? s * 0.26 : s * 0.12); }
    function hit() { return Math.max(isz(), Math.min(host.W, host.H) * 0.16); }
    host.on('down', function (p) {
      if (!item || celebrate > 0) return;
      if (host.dist(p.x, p.y, item.x, item.y) < hit()) { drag = true; dragOff.x = item.x - p.x; dragOff.y = item.y - p.y; }
    });
    host.on('move', function (p) { if (drag && item) { item.x = p.x + dragOff.x; item.y = p.y + dragOff.y; } });
    host.on('up', function (p) {
      if (!drag || !item || celebrate > 0) { drag = false; return; }
      drag = false;
      var B = bins();
      for (var i = 0; i < B.length; i++) {
        var b = B[i];
        if (p.x > b.x - 24 && p.x < b.x + b.w + 24 && p.y > b.y - 40) {
          if (b.kind === (item.big ? 'big' : 'small')) {
            host.sfx('ding'); host.sparkle(b.x + b.w / 2, b.y + b.h / 2, host.PAL[done % host.PAL.length]); host.vibrate(20); done++;
            if (done >= 5) { celebrate = 1.8; host.celebrate(host.W / 2, host.H * 0.32); host.say('Great job!', 'en-US'); }
            else spawn();
          } else { host.sfx('nope'); item.x = host.W / 2; item.y = host.H * 0.3; }
          return;
        }
      }
      item.x = host.W / 2; item.y = host.H * 0.3;
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#fff7e6');
      var B = bins();
      var cols = ['#fb923c', '#fdba74'];
      for (var i = 0; i < B.length; i++) {
        var b = B[i];
        c.save(); c.globalAlpha = 0.9; host.rr(b.x, b.y, b.w, b.h, b.h * 0.16); c.fillStyle = cols[i]; c.fill(); c.restore();
        c.lineWidth = 5; c.strokeStyle = '#fff'; host.rr(b.x, b.y, b.w, b.h, b.h * 0.16); c.stroke();
        c.textAlign = 'center'; c.textBaseline = 'middle';
        var icon = b.kind === 'big' ? Math.round(b.h * 0.6) : Math.round(b.h * 0.28);
        c.font = icon + 'px system-ui'; c.fillStyle = '#fff';
        c.fillText('📦', b.x + b.w / 2, b.y + b.h / 2);
        c.textBaseline = 'alphabetic';
      }
      if (item && celebrate <= 0) {
        c.font = Math.round(isz() * 1.4) + 'px system-ui'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText(item.emoji, item.x, item.y); c.textBaseline = 'alphabetic';
      }
      c.fillStyle = '#92702a'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Giỏi quá!' : '👆 Kéo vào hộp To hay Nhỏ', W / 2, H * 0.09);
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) reset(); }
    });
    return { start: function () { reset(); host.music('happy'); }, stop: function () { host.music('stop'); } };
  }
});

/* ---- 2. ODD-ONE-OUT — tap the one that's different --------------------- */
Arcade.register({
  id: 'odd-one-out', title: 'Cái Khác', emoji: '❓', category: 'Logic', color: '#ef4444',
  desc: 'Chạm vào cái khác các cái còn lại.', how: 'Tìm và chạm cái khác!',
  create: function (host) {
    var GROUPS = [
      ['🍎', '🍌'], ['🐶', '🐱'], ['🚗', '🚲'], ['⭐', '❤️'],
      ['🍓', '🍇'], ['🐸', '🐥'], ['🌸', '🌻'], ['🔵', '🔴'],
      ['🐟', '🦋'], ['🍪', '🍰']
    ];
    var items, oddIdx, celebrate;
    function reset() {
      var g = host.choice(GROUPS);
      var same = g[0], odd = g[1];
      var n = host.rint(3, 4);
      oddIdx = host.rint(0, n - 1);
      items = [];
      for (var i = 0; i < n; i++) items.push({ emoji: i === oddIdx ? odd : same, wob: 0, pop: 0 });
      celebrate = 0;
      host.say('Find the different one', 'en-US');
    }
    function layout() {
      var W = host.W, H = host.H, n = items.length;
      var r = Math.min(W / (n + 0.6), H * 0.4) * 0.42;
      r = Math.max(r, Math.min(W, H) * 0.12);
      var gap = (W - 2 * r * n) / (n + 1);
      var arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: gap + r + i * (2 * r + gap), y: H * 0.56, r: r });
      return arr;
    }
    host.on('tap', function (p) {
      if (celebrate > 0) return;
      var L = layout();
      for (var i = 0; i < items.length; i++) {
        if (host.dist(p.x, p.y, L[i].x, L[i].y) < L[i].r * 1.25) {
          if (i === oddIdx) {
            items[i].pop = 1; celebrate = 1.6; host.celebrate(L[i].x, L[i].y); host.say('Yes! Different!', 'en-US'); host.vibrate(30);
          } else { items[i].wob = 0.6; host.sfx('nope'); }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#fee2e2'); g.addColorStop(1, '#fff7ed'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      c.fillStyle = '#b91c1c'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Đúng rồi!' : '❓ Cái nào khác?', W / 2, H * 0.16);
      var L = layout();
      for (var i = 0; i < items.length; i++) {
        var it = items[i], x = L[i].x, y = L[i].y, r = L[i].r;
        if (it.wob > 0) { it.wob -= dt; x += Math.sin(it.wob * 40) * r * 0.18; }
        var sc = 1;
        if (it.pop > 0) { it.pop -= dt * 1.2; sc = 1 + (1 - Math.max(0, it.pop)) * 0.3; }
        c.save(); host.rr(x - r, y - r, r * 2, r * 2, r * 0.4);
        c.fillStyle = '#ffffff'; c.fill(); c.lineWidth = 5; c.strokeStyle = host.PAL[i % host.PAL.length]; c.stroke(); c.restore();
        c.font = Math.round(r * 1.3 * sc) + 'px system-ui'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText(it.emoji, x, y); c.textBaseline = 'alphabetic';
      }
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) reset(); }
    });
    return { start: function () { reset(); host.music('playful'); }, stop: function () { host.music('stop'); } };
  }
});

/* ---- 3. PATTERN-CONTINUE — pick what comes next ------------------------ */
Arcade.register({
  id: 'pattern-continue', title: 'Tiếp Theo', emoji: '🔁', category: 'Logic', color: '#a855f7',
  desc: 'Chọn cái tiếp theo của dãy.', how: 'Cái gì tiếp theo? Chạm chọn!',
  create: function (host) {
    var TOKENS = ['🔴', '🔵', '🟡', '🟢', '🟣', '🟠', '🍎', '🍌', '⭐', '❤️', '🐶', '🐱'];
    var seq, answer, choices, celebrate, picked;
    function reset() {
      var pair = host.shuffle(TOKENS.slice()).slice(0, 2);
      var a = pair[0], b = pair[1];
      var type = host.choice(['ABAB', 'AABB']);

      var others = TOKENS.filter(function (t) { return t !== answer; });
      host.shuffle(others);
      choices = host.shuffle([answer, others[0], others[1]]);
      celebrate = 0; picked = -1;
      host.say('What comes next?', 'en-US');
    }
    function seqLayout() {
      var W = host.W, H = host.H, n = seq.length + 1;

    }

      var W = host.W, H = host.H, n = choices.length;

      for (var i = 0; i < n; i++) arr.push({ x: gap + i * (s + gap), y: H * 0.62, w: s, h: s });
      return arr;
    }
    host.on('tap', function (p) {
      if (celebrate > 0) return;
      var C = choiceLayout();
      for (var i = 0; i < choices.length; i++) {
        var b = C[i];
        if (p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h) {
          if (choices[i] === answer) {
            picked = i; celebrate = 1.8; host.celebrate(b.x + b.w / 2, b.y + b.h / 2); host.say('Yes!', 'en-US'); host.vibrate(30);
          } else { host.sfx('nope'); }
          return;
        }
      }
    });
    host.loop(function (dt) {

/* ---- 4. MATCH-SOCKS — drag a sock onto its identical match ------------- */
Arcade.register({
  id: 'match-socks', title: 'Đôi Tất', emoji: '🧦', category: 'Logic', color: '#38bdf8',
  desc: 'Kéo chiếc tất vào chiếc giống nó.', how: 'Tìm đôi tất giống nhau!',
  create: function (host) {
    var COLORS = ['#ef4444', '#f97316', '#facc15', '#22c55e', '#14b8a6', '#3b82f6', '#a855f7', '#ec4899'];
    var socks, drag, dragId, celebrate;
    function reset() {
      var nPairs = host.rint(3, 4);
      var cols = host.shuffle(COLORS.slice()).slice(0, nPairs);
      var list = [];
      for (var i = 0; i < nPairs; i++) { list.push({ pair: i, col: cols[i] }); list.push({ pair: i, col: cols[i] }); }
      host.shuffle(list);
      socks = list.map(function (s, idx) { return { id: idx, pair: s.pair, col: s.col, matched: false, x: 0, y: 0, hx: 0, hy: 0, wob: 0 }; });
      celebrate = 0; drag = false; dragId = -1;
      placeHome();
    }
    function placeHome() {
      var W = host.W, H = host.H, n = socks.length;
      var cols = Math.min(n, host.W > host.H ? 4 : 3);
      var rows = Math.ceil(n / cols);
      var cw = W / cols, ch = (H * 0.78) / rows;
      for (var i = 0; i < n; i++) {
        var col = i % cols, row = (i / cols) | 0;
        socks[i].hx = col * cw + cw / 2;
        socks[i].hy = H * 0.16 + row * ch + ch / 2;
        socks[i].x = socks[i].hx; socks[i].y = socks[i].hy;
      }
    }
    function rad() { return Math.min(host.W, host.H) * 0.11; }
    function drawSock(c, x, y, r, col) {
      c.save();
      c.fillStyle = col; c.strokeStyle = '#ffffff'; c.lineWidth = Math.max(3, r * 0.12);
      // simple boot shape
      c.beginPath();
      c.moveTo(x - r * 0.45, y - r * 0.9);
      c.lineTo(x + r * 0.35, y - r * 0.9);
      c.lineTo(x + r * 0.35, y + r * 0.25);
      c.lineTo(x + r * 0.95, y + r * 0.25);
      c.quadraticCurveTo(x + r * 1.05, y + r * 0.85, x + r * 0.45, y + r * 0.85);
      c.lineTo(x - r * 0.45, y + r * 0.85);
      c.closePath(); c.fill(); c.stroke();
      // cuff stripe
      c.fillStyle = 'rgba(255,255,255,.7)';
      c.fillRect(x - r * 0.45, y - r * 0.9, r * 0.8, r * 0.22);
      c.restore();
    }
    host.on('down', function (p) {
      if (celebrate > 0) return;
      for (var i = socks.length - 1; i >= 0; i--) {
        if (socks[i].matched) continue;
        if (host.dist(p.x, p.y, socks[i].x, socks[i].y) < rad() * 1.3) { drag = true; dragId = socks[i].id; return; }
      }
    });
    host.on('move', function (p) {
      if (drag && dragId >= 0) { var s = socks[dragId]; if (s && !s.matched) { s.x = p.x; s.y = p.y; } }
    });
    host.on('up', function (p) {
      if (!drag || dragId < 0) { drag = false; dragId = -1; return; }
      var s = socks[dragId]; drag = false; var keep = dragId; dragId = -1;
      if (!s || s.matched) return;
      var bestI = -1, bestD = 1e9;
      for (var i = 0; i < socks.length; i++) {
        if (i === keep || socks[i].matched) continue;
        var d = host.dist(p.x, p.y, socks[i].x, socks[i].y);
        if (d < bestD) { bestD = d; bestI = i; }
      }
      if (bestI >= 0 && bestD < rad() * 2.2 && socks[bestI].pair === s.pair) {
        s.matched = true; socks[bestI].matched = true;
        host.sfx('ding'); host.sparkle(socks[bestI].x, socks[bestI].y, s.col); host.vibrate(20);
        s.x = socks[bestI].x; s.y = socks[bestI].y;
        var remaining = 0;
        for (var k = 0; k < socks.length; k++) if (!socks[k].matched) remaining++;
        if (remaining === 0) { celebrate = 1.8; host.celebrate(host.W / 2, host.H * 0.4); host.say('All matched!', 'en-US'); }
      } else {
        host.sfx('nope');
        s.x = s.hx; s.y = s.hy;
      }
    });
    host.on('resize', function () { if (socks) placeHome(); }); // re-lay socks on rotate
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#e0f2fe');
      c.fillStyle = '#0369a1'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Đủ đôi rồi!' : '🧦 Kéo tất vào chiếc giống nó', W / 2, H * 0.09);
      var r = rad();
      for (var i = 0; i < socks.length; i++) {
        var s = socks[i];
        if (s.matched && s.id !== dragId) {
          c.globalAlpha = 0.55;
          drawSock(c, s.x, s.y, r * 0.9, s.col);
          c.globalAlpha = 1;
        } else if (s.id !== dragId) {
          drawSock(c, s.x, s.y, r, s.col);
        }
      }
      // dragged sock on top
      if (drag && dragId >= 0 && socks[dragId] && !socks[dragId].matched) {
        drawSock(c, socks[dragId].x, socks[dragId].y, r * 1.1, socks[dragId].col);
      }
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) reset(); }
    });
    return { start: function () { reset(); host.music('sunny'); }, stop: function () { host.music('stop'); } };
  }
});

/* ---- 5. NESTING-CUPS — tap cups biggest to smallest to stack ----------- */
Arcade.register({
  id: 'nesting-cups', title: 'Xếp Ly', emoji: '🥤', category: 'Logic', color: '#22c55e',
  desc: 'Chạm ly từ to nhất đến nhỏ nhất.', how: 'Chạm ly to nhất trước!',
  create: function (host) {
    var cups, nextRank, celebrate, palette;
    function reset() {
      var n = host.rint(4, 5);
      palette = host.shuffle(host.PAL.slice()).slice(0, n);
      var ranks = [];
      for (var i = 0; i < n; i++) ranks.push(i);               // 0 = biggest
      var order = host.shuffle(ranks.slice());                 // scattered display order
      cups = order.map(function (rank, idx) {
        return { rank: rank, col: palette[rank], placed: false, idx: idx, wob: 0, pop: 0 };
      });
      nextRank = 0; celebrate = 0;
    }
    function trayLayout() {
      // scattered (un-placed) cups across the top
      var W = host.W, H = host.H, n = cups.length;
      var gap = (W * 0.92) / n;
      var arr = [];
      for (var i = 0; i < n; i++) {
        var rank = cups[i].rank;

      }
      return arr;
    }
    function stackCenter() { return { x: host.W / 2, y: host.H * 0.72 }; }
    function cupW(rank) { var n = cups.length; return host.lerp(Math.min(host.W, host.H) * 0.28, Math.min(host.W, host.H) * 0.12, rank / Math.max(1, n - 1)); }
    function drawCup(c, x, y, w, col, alpha) {
      var h = w * 1.05;
      c.save(); c.globalAlpha = alpha == null ? 1 : alpha;
      c.fillStyle = col; c.strokeStyle = '#ffffff'; c.lineWidth = Math.max(3, w * 0.06);
      // trapezoid cup (wider at top)
      c.beginPath();
      c.moveTo(x - w / 2, y - h / 2);
      c.lineTo(x + w / 2, y - h / 2);
      c.lineTo(x + w * 0.36, y + h / 2);
      c.lineTo(x - w * 0.36, y + h / 2);
      c.closePath(); c.fill(); c.stroke();

    }
    host.on('tap', function (p) {
      if (celebrate > 0) return;
      var T = trayLayout();
      for (var i = 0; i < cups.length; i++) {
        if (cups[i].placed) continue;
        var t = T[i];
        if (host.dist(p.x, p.y, t.x, t.y) < Math.max(t.w, Math.min(host.W, host.H) * 0.14)) {
          if (cups[i].rank === nextRank) {
            cups[i].placed = true; cups[i].pop = 0.4;
            host.note(['C4', 'E4', 'G4', 'C5', 'E5', 'G5'][Math.min(nextRank, 5)], 0.45, 'marimba');
            host.sparkle(stackCenter().x, stackCenter().y, cups[i].col);
            nextRank++;
            if (nextRank >= cups.length) { celebrate = 1.8; host.celebrate(host.W / 2, host.H * 0.55); host.say('You stacked them all!', 'en-US'); host.vibrate(30); }
          } else { cups[i].wob = 0.6; host.sfx('nope'); }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#ecfdf5');
      c.fillStyle = '#15803d'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Xếp xong rồi!' : '🥤 Chạm ly to nhất trước', W / 2, H * 0.09);
      // tray (unplaced cups)
      var T = trayLayout();
      for (var i = 0; i < cups.length; i++) {
        if (cups[i].placed) continue;
        var t = T[i], x = t.x;
        if (cups[i].wob > 0) { cups[i].wob -= dt; x += Math.sin(cups[i].wob * 40) * t.w * 0.18; }
        // highlight the next-needed cup
        if (cups[i].rank === nextRank) {
          c.save(); c.globalAlpha = 0.5; c.fillStyle = '#fde047';
          c.beginPath(); c.arc(t.x, t.y, t.w * 0.85 + Math.sin(host.now() / 180) * 3, 0, 7); c.fill(); c.restore();
        }
        drawCup(c, x, t.y, t.w, cups[i].col);
      }

      var sc = stackCenter();
      var placedRanks = [];
      for (var k = 0; k < cups.length; k++) if (cups[k].placed) placedRanks.push(cups[k].rank);
      placedRanks.sort(function (a, b) { return a - b; });
      for (var j = 0; j < placedRanks.length; j++) {
        var rank = placedRanks[j];
        var w = cupW(rank);
        var yy = sc.y - j * (Math.min(W, H) * 0.045);
        drawCup(c, sc.x, yy, w, palette[rank]);
      }
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) reset(); }
    });
    return { start: function () { reset(); host.music('happy'); }, stop: function () { host.music('stop'); } };
  }
});

<script>
/* =============================================================================
 * BÉ VUI — GAMES PART 15  (6 games · Logic + Memory)
 *   sequence-order · whats-missing · cup-shuffle · simon-lights
 *   gentle-whack · find-pair-sound
 * No-fail, gentle, touch-first. Everything inside create(host) — NO globals.
 * Read W/H every frame. dt-based timers. Sound + music each action.
 * ========================================================================== */

/* ---- 1. LOGIC — arrange pictures in natural order (drag to slots) ------- */
Arcade.register({
  id: 'sequence-order', title: 'Sắp Thứ Tự', emoji: '📶', category: 'Logic', color: '#f97316',
  desc: 'Kéo các hình theo đúng thứ tự.', how: 'Kéo hình cho đúng thứ tự!',
  create: function (host) {
    // each set is small→big / grow stages, in CORRECT order (index 0..2)
    var SETS = [
      { items: ['🌱', '🌿', '🌸'], say: 'small to big' },
      { items: ['🥚', '🐣', '🐔'], say: 'small to big' },
      { items: ['🌰', '🌳', '🌲'], say: 'small to big' },
      { items: ['🔵', '🔵', '🔵'], say: 'small to big', sizes: [0.5, 0.75, 1.0] },
      { items: ['⭐', '⭐', '⭐'], say: 'small to big', sizes: [0.5, 0.75, 1.0] },
      { items: ['🐛', '🦋', '🦋'], say: 'small to big' },
      { items: ['🍪', '🍰', '🎂'], say: 'small to big' },
      { items: ['💧', '💦', '🌊'], say: 'small to big' }
    ];
    var set, slots, drag, celebrate, hint;
    function reset() {
      set = host.choice(SETS);
      // slot i holds an item index (0..2). Start shuffled but not already solved.
      var order;
      do { order = host.shuffle([0, 1, 2]); } while (order[0] === 0 && order[1] === 1 && order[2] === 2);
      slots = order.slice();
      drag = null; celebrate = 0; hint = 0;
      host.say('Put in order', 'en-US');
    }
    function slotLayout() {
      var W = host.W, H = host.H, n = 3;
      var s = Math.min(W / (n + 0.8), H * 0.4);
      s = Math.max(s, Math.min(W, H) * 0.2);
      var gap = (W - s * n) / (n + 1);
      var arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: gap + s / 2 + i * (s + gap), y: H * 0.55, s: s });
      return arr;
    }
    function sizeFor(itemIdx) {
      if (set.sizes) return set.sizes[itemIdx];
      // default: index encodes natural growth → scale up
      return 0.62 + itemIdx * 0.22;
    }
    function isSolved() { return slots[0] === 0 && slots[1] === 1 && slots[2] === 2; }
    function findSlotAt(x, y) {
      var L = slotLayout();
      for (var i = 0; i < L.length; i++) {
        if (host.dist(x, y, L[i].x, L[i].y) < L[i].s * 0.72) return i;
      }
      return -1;
    }
    host.on('down', function (p) {
      if (!slots || celebrate > 0) return;
      var si = findSlotAt(p.x, p.y);
      if (si >= 0) { drag = { slot: si, x: p.x, y: p.y }; host.sfx('select'); }
    });
    host.on('move', function (p) { if (drag) { drag.x = p.x; drag.y = p.y; } });
    host.on('up', function (p) {
      if (!drag || celebrate > 0) { drag = null; return; }
      var target = findSlotAt(p.x, p.y);
      if (target >= 0 && target !== drag.slot) {
        // swap the two slots' contents
        var t = slots[drag.slot]; slots[drag.slot] = slots[target]; slots[target] = t;
        host.sfx('pop');
        if (isSolved()) {
          celebrate = 1.8;
          var L = slotLayout();
          host.celebrate(host.W / 2, H_third());
          host.confetti(L[1].x, L[1].y, host.PAL);
          host.say('Great! In order!', 'en-US');
        }
      } else {
        host.sfx('blip');
      }
      drag = null;
    });
    function H_third() { return host.H * 0.3; }
    function drawItem(c, glyph, x, y, s, scale) {
      c.save();
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = Math.round(s * 0.74 * scale) + 'px system-ui';
      c.fillText(glyph, x, y);
      c.restore();
    }
    host.loop(function (dt) {

  }
});

/* ---- 5. MEMORY — gentle whack: tap friendly animals popping up --------- */
Arcade.register({
  id: 'gentle-whack', title: 'Thú Thò Đầu', emoji: '🐹', category: 'Memory', color: '#84cc16',
  desc: 'Chạm con vật khi nó thò đầu lên.', how: 'Chạm con vật đang thò đầu!',
  create: function (host) {
    var ANIM = [['🐹', 'cat'], ['🐰', 'frog'], ['🐭', 'bird'], ['🐱', 'cat'], ['🐶', 'dog'], ['🐸', 'frog'], ['🐻', 'cow'], ['🦊', 'dog']];
    var holes, spawnTimer, happy;
    function reset() {
      holes = [];
      for (var i = 0; i < 6; i++) holes.push({ up: 0, target: 0, anim: null, hold: 0, giggle: 0 });
      spawnTimer = 0.6; happy = 0;
    }
    function grid() {
      var W = host.W, H = host.H;
      var cols = W > H ? 3 : 2, rows = Math.ceil(6 / cols);
      var pad = Math.min(W, H) * 0.05;
      var topPad = H * 0.16;
      var cw = (W - pad * (cols + 1)) / cols;
      var ch = (H - topPad - pad * (rows + 1)) / rows;
      var arr = [];
      for (var i = 0; i < 6; i++) {
        arr.push({
          x: pad + (i % cols) * (cw + pad),
          y: topPad + pad + ((i / cols) | 0) * (ch + pad),
          w: cw, h: ch
        });
      }
      return arr;
    }
    function popUp() {
      // find a hole that's down
      var down = [];
      for (var i = 0; i < holes.length; i++) if (holes[i].target === 0 && holes[i].up < 0.05) down.push(i);
      if (!down.length) return;
      var idx = host.choice(down);
      var a = host.choice(ANIM);
      holes[idx].anim = a;
      holes[idx].target = 1;
      holes[idx].hold = host.rand(1.4, 2.6); // how long it stays up if not tapped
      host.note(host.choice(['C5', 'E5', 'G5']), 0.2, 'musicbox', 0.22);
    }
    host.on('tap', function (p) {
      var L = grid();
      for (var i = 0; i < holes.length; i++) {
        var h = holes[i], b = L[i];
        if (h.up > 0.45 && h.anim && p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h) {
          // tapped an animal that's up → giggle + sparkle + happy chime
          h.giggle = 0.5; h.target = 0; h.hold = 0;
          host.sfx('giggle'); host.animal(h.anim[1]); host.sfx('chime');
          host.sparkle(b.x + b.w / 2, b.y + b.h * 0.4, '#bef264');
          host.vibrate(20); happy = 0.4;
          host.say('Hello!', 'en-US');
          return;
        }
      }
      host.sfx('blip'); // tapping empty just makes a soft sound, no penalty
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#ecfccb'); g.addColorStop(1, '#d9f99d');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      c.fillStyle = '#4d7c0f'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
      c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('🐹 Chạm bạn thò đầu lên!', W / 2, H * 0.1);

      // spawn over time
      spawnTimer -= dt;
      if (spawnTimer <= 0) { popUp(); spawnTimer = host.rand(0.7, 1.5); }
      if (happy > 0) happy -= dt;

      var L = grid();
      for (var i = 0; i < holes.length; i++) {
        var h = holes[i], b = L[i];
        // animate up/down toward target
        h.up += (h.target - h.up) * Math.min(1, dt * 6);
        // hold countdown then duck back (no penalty)
        if (h.target === 1) { h.hold -= dt; if (h.hold <= 0) h.target = 0; }
        if (h.giggle > 0) h.giggle -= dt;

        // hole (dirt mound)
        var hx = b.x + b.w / 2, hy = b.y + b.h * 0.72, rw = b.w * 0.42, rh = b.h * 0.2;
        c.save();
        c.beginPath(); c.ellipse(hx, hy, rw, rh, 0, 0, 7);
        c.fillStyle = '#7c5a2e'; c.fill();
        c.beginPath(); c.ellipse(hx, hy, rw * 0.78, rh * 0.7, 0, 0, 7);
        c.fillStyle = '#5b4220'; c.fill();
        // clip so animal rises out of the hole
        c.beginPath();
        c.rect(b.x, b.y, b.w, hy - b.y);
        c.clip();
        if (h.anim && h.up > 0.03) {
          var rise = (1 - h.up) * b.h * 0.5;
          var bounce = h.giggle > 0 ? Math.sin(h.giggle * 30) * b.h * 0.03 : 0;
          c.textAlign = 'center'; c.textBaseline = 'middle';
          c.font = Math.round(b.h * 0.42 * (h.giggle > 0 ? 1.12 : 1)) + 'px system-ui';
          c.fillText(h.anim[0], hx, hy - b.h * 0.18 + rise + bounce);
        }
        c.restore();
      }
      // happy flash overlay
      if (happy > 0) {
        c.save(); c.globalAlpha = happy * 0.4; c.fillStyle = '#fde047';
        c.fillRect(0, 0, W, H); c.restore();
      }
    });
    return { start: function () { reset(); host.music('sunny'); } };
  }
});

/* ---- 6. MEMORY — sound pairs: match cards by hidden sound -------------- */
Arcade.register({
  id: 'find-pair-sound', title: 'Cặp Âm Thanh', emoji: '🔔', category: 'Memory', color: '#ec4899',
  desc: 'Tìm hai thẻ cùng âm thanh.', how: 'Chạm thẻ nghe âm · tìm cặp giống!',
  create: function (host) {
    // each sound: animal name OR a musical note. icon shown when flipped.
    var POOL = [
      { id: 'cat', kind: 'animal', name: 'cat', icon: '🐱' },
      { id: 'dog', kind: 'animal', name: 'dog', icon: '🐶' },
      { id: 'cow', kind: 'animal', name: 'cow', icon: '🐮' },
      { id: 'duck', kind: 'animal', name: 'duck', icon: '🦆' },
      { id: 'bird', kind: 'animal', name: 'bird', icon: '🐦' },
      { id: 'frog', kind: 'animal', name: 'frog', icon: '🐸' },
      { id: 'bell', kind: 'note', name: 'C5', icon: '🔔' },
      { id: 'drum', kind: 'note', name: 'G3', icon: '🥁' }
    ];
    var cards, first, lock, lockTimer, matched, celebrate, total;
    function reset() {
      var pick = host.shuffle(POOL.slice()).slice(0, 3);
      var deck = host.shuffle(pick.concat(pick));
      cards = deck.map(function (s) { return { snd: s, up: false, done: false, sc: 1, pop: 0 }; });
      first = null; lock = false; lockTimer = 0; matched = 0; celebrate = 0; total = pick.length;
      host.say('Find the sound pairs', 'en-US');
    }
    function grid() {
      var W = host.W, H = host.H, n = cards.length; // 6
      var cols = W > H ? 3 : 2, rows = Math.ceil(n / cols);
      var pad = Math.min(W, H) * 0.04;
      var topPad = H * 0.16;
      var cw = (W - pad * (cols + 1)) / cols;
      var ch = (H - topPad - pad * (rows + 1)) / rows;
      var arr = [];
      for (var i = 0; i < n; i++) {
        arr.push({
          x: pad + (i % cols) * (cw + pad),
          y: topPad + pad + ((i / cols) | 0) * (ch + pad),
          w: cw, h: ch
        });
      }
      return arr;
    }
    function playSound(s) {
      if (s.kind === 'animal') host.animal(s.name);
      else host.note(s.name, 0.6, 'bell');
    }
    host.on('tap', function (p) {
      if (lock || celebrate > 0) return;
      var L = grid();
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i], b = L[i];
        if (p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h) {
          if (card.up || card.done) return;
          card.up = true; card.sc = 0.1; host.sfx('select');
          playSound(card.snd);
          if (!first) { first = card; }
          else {
            if (first.snd.id === card.snd.id) {
              first.done = card.done = true; first.pop = card.pop = 1; matched++;
              host.sfx('chime'); host.sparkle(b.x + b.w / 2, b.y + b.h / 2, '#f9a8d4');
              first = null;
              if (matched >= total) {
                celebrate = 2.0; host.celebrate(host.W / 2, host.H / 2);
                host.say('All matched! Yay!', 'en-US');
              }
            } else {
              // mismatch → gently reset after a short dt delay (no penalty)
              lock = true; lockTimer = 1.0; cards._pend = [first, card]; first = null;
              host.sfx('nope');
            }
          }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#fff0f7');
      c.fillStyle = '#be185d'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
      c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Tìm hết rồi!' : '🔔 Tìm cặp âm thanh · ' + matched + '/' + total, W / 2, H * 0.1);

      // mismatch reset timer
      if (lock) {
        lockTimer -= dt;
        if (lockTimer <= 0 && cards._pend) {
          cards._pend[0].up = false; cards._pend[1].up = false; cards._pend = null; lock = false;
        }
      }

      var L = grid();
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i], b = L[i];
        if (card.sc < 1) card.sc = Math.min(1, card.sc + dt * 4);
        if (card.pop > 0) card.pop = Math.max(0, card.pop - dt * 1.4);
        var show = card.up || card.done;
        c.save();
        c.translate(b.x + b.w / 2, b.y + b.h / 2);
        var ps = 1 + card.pop * 0.18;
        c.scale((show ? card.sc : 1) * ps, 1 * ps);
        host.rr(-b.w / 2, -b.h / 2, b.w, b.h, b.h * 0.16);
        c.fillStyle = card.done ? '#fbcfe8' : show ? '#ffffff' : host.PAL[(i * 3) % host.PAL.length];
        c.fill();
        c.lineWidth = 5; c.strokeStyle = card.done ? '#ec4899' : '#ffffff'; c.stroke();
        c.textAlign = 'center'; c.textBaseline = 'middle';
        if (show) {
          c.globalAlpha = card.done ? 0.85 : 1;
          c.font = Math.round(b.h * 0.46) + 'px system-ui';
          c.fillText(card.snd.icon, 0, 0);
          c.globalAlpha = 1;
        } else {
          // identical card backs with a music/speaker hint
          c.fillStyle = 'rgba(255,255,255,.9)';
          c.font = Math.round(b.h * 0.34) + 'px system-ui';
          c.fillText('🎵', 0, 0);
        }
        c.textBaseline = 'alphabetic';
        c.restore();
      }
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) reset(); }
    });
    return { start: function () { reset(); host.music('musicbox'); } };
  }
});

</script>

<script>Arcade.boot();</script>
