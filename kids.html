<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fde68a">
<title>BÉ VUI — 100 trò chơi cho bé</title>
<style>
  :root{ --accent:#f59e0b; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family:"Baloo 2",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(1200px 700px at 12% -8%, #ffd6e7cc, transparent),
      radial-gradient(1000px 600px at 108% 4%, #cdeafe, transparent),
      radial-gradient(900px 700px at 50% 120%, #d9f7d0, transparent),
      linear-gradient(160deg,#fff7e6,#fef3f6 55%,#eef7ff);
    color:#4a3a63; overscroll-behavior:none; user-select:none; -webkit-user-select:none;
    min-height:100%;
  }
  /* ---------------- HOME ---------------- */
  #home{ max-width:1180px; margin:0 auto; padding:18px 14px 70px; }
  .topbar{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:2px; }
  .logo{ font-weight:900; font-size:clamp(34px,8vw,58px); letter-spacing:-1px; line-height:1;
    background:linear-gradient(92deg,#fb7185,#f59e0b,#facc15,#34d399,#38bdf8,#a855f7);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 3px 0 #ffffff80; filter:drop-shadow(0 4px 8px #f59e0b33); }
  .subtitle{ width:100%; text-align:center; color:#8b7aa6; font-size:clamp(13px,3.4vw,16px); font-weight:700; margin:4px 0 12px; }
  .count{ color:#a899c0; font-size:13px; font-weight:700; }
  #chips{ display:flex; gap:9px; overflow-x:auto; padding:6px 2px 12px; margin:2px 0 8px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  #chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:none; padding:10px 17px; border-radius:999px; border:2px solid #ffffff; background:#ffffffcc;
    color:#6b5b86; font-size:15px; font-weight:800; cursor:pointer; transition:.15s; white-space:nowrap;
    box-shadow:0 4px 10px #c9b8e033; display:flex; align-items:center; gap:7px; }
  .chip .chip-e{ font-size:18px; }
  .chip:active{ transform:scale(.94); }
  .chip.active{ background:linear-gradient(135deg,#fbbf24,#fb7185); border-color:#fff; color:#fff; box-shadow:0 6px 16px #fb718566; }
  #grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(132px,1fr)); gap:14px; }
  @media(min-width:560px){ #grid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:18px; } }
  @media(min-width:900px){ #grid{ grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); } }
  .card{ position:relative; aspect-ratio:1/1; border:none; cursor:pointer; border-radius:26px;
    background:linear-gradient(160deg, color-mix(in srgb,var(--c) 26%, #ffffff), #ffffff);
    box-shadow:0 8px 20px color-mix(in srgb,var(--c) 30%, transparent), inset 0 2px 0 #ffffff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    color:#5a4878; overflow:hidden; transition:transform .12s ease;
    opacity:0; transform:translateY(14px) scale(.96); animation:pop .45s forwards;
    border:3px solid color-mix(in srgb,var(--c) 55%, #ffffff); }
  @keyframes pop{ to{ opacity:1; transform:none; } }
  .card:hover{ transform:translateY(-5px) scale(1.04); }
  .card:active{ transform:scale(.95); }
  .card-emoji{ font-size:clamp(48px,12vw,66px); line-height:1; filter:drop-shadow(0 4px 5px #0002); }
  .card-title{ font-size:14px; font-weight:800; text-align:center; padding:0 8px; line-height:1.12; color:#5a4878; }
  .footer{ text-align:center; color:#bcaed3; font-size:13px; font-weight:700; margin-top:30px; }
  /* ---------------- STAGE / PLAY ---------------- */
  #stage{ position:fixed; inset:0; display:flex; flex-direction:column; z-index:10;
    background:
      radial-gradient(900px 500px at 50% -10%, #ffe6f0, transparent),
      linear-gradient(160deg,#fff7e6,#eef7ff); }
  .cab-top{ display:flex; align-items:center; gap:10px; padding:10px 12px; padding-top:max(10px,env(safe-area-inset-top));
    background:#ffffffcc; backdrop-filter:blur(8px); border-bottom:2px solid #ffffff; }
  .cab-btn{ width:54px; height:54px; flex:none; border-radius:18px; border:3px solid #ffffff;
    background:linear-gradient(160deg,#fff,#ffe9c9); color:var(--accent); font-size:24px; font-weight:900; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:0 5px 12px #f59e0b33; }
  .cab-btn:active{ transform:scale(.9); }
  .cab-info{ flex:1; min-width:0; text-align:center; }
  #cab-title{ font-weight:900; font-size:18px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#5a4878; }
  #cab-how{ font-size:12px; color:#9b8bb6; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cab-stage{ flex:1; position:relative; display:flex; align-items:center; justify-content:center; min-height:0; padding:8px; }
  #game-canvas{ width:100%; height:100%; max-width:820px; border-radius:24px; background:#fff;
    touch-action:none; box-shadow:0 12px 40px #c9b8e055; display:block; }
  /* ---------------- TOAST ---------------- */
  #toast{ position:fixed; bottom:34px; left:50%; transform:translate(-50%,20px); background:#ffffffee; color:#5a4878;
    padding:13px 24px; border-radius:18px; font-weight:800; font-size:16px; border:3px solid var(--accent);
    opacity:0; pointer-events:none; transition:.25s; z-index:30; box-shadow:0 8px 20px #0002; }
  #toast.show{ opacity:1; transform:translate(-50%,0); }
  .hidden{ display:none !important; }
</style>
</head>
<body>
  <div id="home">
    <div class="topbar">
      <div class="logo">BÉ VUI</div>
    </div>
    <div class="subtitle">🌈 <b id="total">0</b> trò chơi cho bé 2–6 tuổi · chạm để chơi · bật loa 🔊</div>
    <div id="chips"></div>
    <div id="grid"></div>
    <div class="footer">💛 Học mà chơi · chơi mà học · <span id="count">0 trò</span></div>
  </div>

  <div id="stage" class="hidden">
    <div class="cab-top">
      <button class="cab-btn" id="back" title="Về nhà">‹</button>
      <div class="cab-info">
        <div id="cab-title">Trò chơi</div>
        <div id="cab-how">cách chơi</div>
      </div>
      <button class="cab-btn" id="restart" title="Chơi lại">↻</button>
      <button class="cab-btn" id="mute" title="Âm thanh">🔊</button>
    </div>
    <div class="cab-stage">
      <canvas id="game-canvas"></canvas>
    </div>
  </div>

  <div id="toast"></div>

<script>
/* =============================================================================
 * BÉ VUI — SHARED ENGINE  (kids 2–6, touch-first, no-fail, audio-rich)
 * =============================================================================
 * One self-contained engine. Every game is an independent module that calls
 * Arcade.register({...}). The engine owns the home grid, the play view, AUDIO
 * (synthesized — notes, animal sounds, gentle FX, optional speech), unified
 * input (touch + mouse + keyboard + multi-touch), the render loop, a free
 * confetti/sparkle layer, persistence, and ERROR ISOLATION (a crash in one
 * game can never take down the arcade).
 *
 * Design ethos for THIS project (different from the arcade engine):
 *   • NO-FAIL. No "game over", no score pressure, no harsh sounds. Reward often.
 *   • Big touch targets. Tap is the default; drag has generous tolerance.
 *   • Pre-readers must understand via picture + sound, never text.
 *   • Bright, cheerful, gentle.
 *
 * ──────────────────────────────────────────────────────────────────────────
 *  GAME MODULE CONTRACT
 * ──────────────────────────────────────────────────────────────────────────
 *  Arcade.register({
 *    id:'my-game', title:'Tên Trò', emoji:'🫧',     // (example only — not a real game)
 *    category:'Tap',        // Colors|Shapes|Animals|Numbers|Letters|Music|Art|Tap|Logic|Memory
 *    color:'#38bdf8',
 *    desc:'Chạm để làm vỡ bong bóng.',   // one short line
 *    how:'Chạm vào bong bóng!',           // how-to line under the title
 *    create(host){ ...; return { start(){...}, stop(){...} }; }
 *  });
 *
 * ──────────────────────────────────────────────────────────────────────────
 *  THE `host` OBJECT  (your only window into the engine)
 * ──────────────────────────────────────────────────────────────────────────
 *  RENDER
 *    host.canvas / host.ctx        2D context already scaled for devicePixelRatio
 *                                  → draw in CSS pixels, no manual dpr math.
 *    host.W, host.H                play-area size in CSS px. READ EVERY FRAME.
 *    host.loop(fn)                 register per-frame fn(dt). dt seconds, clamped.
 *    host.clear(color)            fill whole canvas (defaults to a soft cream).
 *    host.stopLoop()
 *
 *  INPUT (coords are CSS px in the canvas)
 *    host.on('down'|'move'|'up'|'tap'|'swipe'|'key'|'keyup'|'resize', fn)
 *      tap p={x,y,id}   swipe s={dir,dx,dy}   key/keyup = DOM KeyboardEvent
 *    host.pointer {x,y,down}      host.keys {ArrowUp:true,...}
 *    host.pointers [{id,x,y}...]  every finger held (multi-touch)
 *    host.pressedIn(x,y,w,h)      true if ANY held pointer is in this rect (POLL it)
 *
 *  AUDIO (everything synthesized — no asset files; respects global mute)
 *    host.sfx(name)               gentle one-shots — see SFX list below
 *    host.tone(freq,dur,type,vol) raw note ('sine'|'triangle'|'square'|'sawtooth')
 *    host.note(name,dur,timbre,vol)  musical note by NAME ('C4','F#5'...) with a
 *                                  timbre: 'xylophone'|'marimba'|'musicbox'|'bell'
 *                                          |'piano'|'flute'  (default 'xylophone')
 *    host.melody(arr, gap, timbre) play a sequence of note names, gap sec apart
 *    host.animal(name)            synthesized animal sound: 'cat','dog','cow','duck',
 *                                  'bird','sheep','frog','lion','horse','pig','owl',
 *                                  'bee','elephant','monkey','chick','wolf'
 *    host.say(text[,lang])        speak via speechSynthesis (best-effort; silent if
 *                                  unavailable). lang default 'en-US'. Pre-readers!
 *    host.music(name)             gentle looping bed: 'happy','playful','lullaby',
 *                                  'jungle','ocean','sunny','musicbox','march'
 *                                  (also accepts old beds 'arcade','chill',...). 'stop' stops.
 *
 *  CELEBRATION (free overlay drawn by the engine on top of your frame)
 *    host.confetti(x,y[,colors])  burst of falling confetti at x,y
 *    host.sparkle(x,y[,color])    rising sparkles/stars at x,y
 *    host.celebrate([x,y])        confetti + 'yay' sound (one-call reward)
 *
 *  STATE / PERSISTENCE   host.best(v) · host.save(k,v) · host.load(k,def)
 *  HELPERS  host.rand/rint/choice/clamp/dist/lerp/shuffle/now/vibrate
 *           host.rr(x,y,w,h,r)       rounded-rect PATH on host.ctx (then fill/stroke)
 *           host.bubble(x,y,r,color) glossy circle with highlight (kid staple)
 *           host.PAL                 bright palette array of hex colors
 *  UI  host.toast(msg) · host.banner(title,sub)
 *  Drawing tip: host.ctx.font = 'bold 900 '+Math.round(host.H*0.07)+'px system-ui'
 * ========================================================================== */
(function () {
  'use strict';
  var Arcade = (window.Arcade = window.Arcade || {});
  var GAMES = (Arcade._games = []);
  Arcade.register = function (def) { if (!def || !def.id) return; GAMES.push(def); };

  var PAL = ['#ef4444','#f97316','#f59e0b','#fde047','#84cc16','#22c55e','#14b8a6',
             '#38bdf8','#6366f1','#a855f7','#ec4899','#fb7185'];

  /* ---------------------------------------------------------------- AUDIO -- */
  var AudioEngine = (function () {
    var ac = null, master = null, musicGain = null, sfxGain = null, lp = null;
    var muted = false, musicTimer = null;

    function ensure() {
      if (ac) { if (ac.state === 'suspended') ac.resume(); unlockSpeech(); return; }
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      ac = new AC();
      master = ac.createGain(); master.gain.value = 0.9;
      lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 7200; lp.Q.value = 0.2;
      master.connect(lp); lp.connect(ac.destination);
      musicGain = ac.createGain(); musicGain.gain.value = 0.0; musicGain.connect(master);
      sfxGain = ac.createGain(); sfxGain.gain.value = 0.95; sfxGain.connect(master);
      unlockSpeech();
    }
    function setMuted(m) { muted = m; if (master) master.gain.value = m ? 0 : 0.9; if (m) try { stopSpeak(); } catch (e) {} }
    function isMuted() { return muted; }

    /* -- low-level voices -- */
    function env(o, g, when, dur, vol, attack) {
      g.gain.setValueAtTime(0.0001, when);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0002, vol), when + (attack || 0.006));
      g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
      o.start(when); o.stop(when + dur + 0.03);
    }
    function note(freq, dur, type, vol, dest, when) {
      if (!ac || muted) return;
      when = when || ac.currentTime;
      var o = ac.createOscillator(), g = ac.createGain();
      o.type = type || 'sine'; o.frequency.setValueAtTime(freq, when);
      o.connect(g); g.connect(dest || sfxGain);
      env(o, g, when, dur, vol == null ? 0.3 : vol);
    }
    function noise(dur, vol, dest, when, freq, q, type) {
      if (!ac || muted) return;
      when = when || ac.currentTime;
      var n = Math.floor(ac.sampleRate * dur);
      var buf = ac.createBuffer(1, n, ac.sampleRate), d = buf.getChannelData(0);
      for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
      var s = ac.createBufferSource(); s.buffer = buf;
      var g = ac.createGain(); g.gain.value = vol || 0.3;
      var f = ac.createBiquadFilter(); f.type = type || 'bandpass'; f.frequency.value = freq || 1200; f.Q.value = q || 1;
      s.connect(f); f.connect(g); g.connect(dest || sfxGain);
      s.start(when); s.stop(when + dur + 0.02);
    }
    function sweep(f1, f2, dur, type, vol, when) {
      if (!ac || muted) return;
      var t = when || ac.currentTime;
      var o = ac.createOscillator(), g = ac.createGain();
      o.type = type || 'sine';
      o.frequency.setValueAtTime(f1, t);
      o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), t + dur);
      g.gain.setValueAtTime(vol || 0.3, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + dur + 0.02);
    }
    function vib(freq, dur, type, vol, lfoHz, depth, when) { // amplitude-LFO tone (buzz/wobble)
      if (!ac || muted) return;
      var t = when || ac.currentTime;
      var o = ac.createOscillator(), g = ac.createGain();
      var l = ac.createOscillator(), lg = ac.createGain();
      o.type = type || 'sawtooth'; o.frequency.value = freq;
      l.type = 'sine'; l.frequency.value = lfoHz || 30; lg.gain.value = depth || 0.4;
      l.connect(lg); lg.connect(g.gain);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol || 0.3, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(sfxGain);
      o.start(t); l.start(t); o.stop(t + dur + 0.02); l.stop(t + dur + 0.02);
    }
    function bell(freq, dur, vol, dest, when) {
      if (!ac || muted) return;
      var t = when || ac.currentTime;
      var ratios = [1, 2.0, 2.4, 3.0, 4.5], amps = [1, 0.5, 0.35, 0.2, 0.12];
      for (var i = 0; i < ratios.length; i++) {
        var o = ac.createOscillator(), g = ac.createGain();
        o.type = 'sine'; o.frequency.value = freq * ratios[i];
        o.connect(g); g.connect(dest || sfxGain);
        env(o, g, t, dur * (1 - i * 0.13), (vol == null ? 0.3 : vol) * amps[i], 0.004);
      }
    }

    /* -- note names -> frequency -- */
    var SEMI = { C: 0, 'C#': 1, Db: 1, D: 2, 'D#': 3, Eb: 3, E: 4, F: 5, 'F#': 6, Gb: 6, G: 7, 'G#': 8, Ab: 8, A: 9, 'A#': 10, Bb: 10, B: 11 };
    function freqOf(name) {
      if (typeof name === 'number') return name;
      var m = /^([A-Ga-g][#b]?)(-?\d)$/.exec(String(name).trim());
      if (!m) return 440;
      var s = m[1].charAt(0).toUpperCase() + m[1].slice(1);
      var midi = (parseInt(m[2], 10) + 1) * 12 + (SEMI[s] == null ? 0 : SEMI[s]);
      return 440 * Math.pow(2, (midi - 69) / 12);
    }
    function playNote(name, dur, timbre, vol, dest, when) {
      ensure(); if (!ac || muted) return;
      var f = freqOf(name); dur = dur || 0.6; vol = vol == null ? 0.34 : vol;
      var t = when || ac.currentTime, d = dest || sfxGain;
      switch (timbre) {
        case 'bell': bell(f, Math.max(0.9, dur * 1.6), vol, d, t); break;
        case 'marimba':
          note(f, dur * 1.4, 'sine', vol, d, t);
          note(f * 4, dur * 0.5, 'sine', vol * 0.14, d, t);
          break;
        case 'musicbox':
          note(f, dur * 0.7, 'sine', vol, d, t);
          note(f * 2.001, dur * 0.5, 'sine', vol * 0.4, d, t);
          break;
        case 'piano':
          note(f, dur, 'triangle', vol, d, t);
          note(f, dur * 0.6, 'sine', vol * 0.5, d, t);
          break;
        case 'flute':
          note(f, dur * 1.3, 'sine', vol * 0.9, d, t);
          break;
        case 'xylophone':
        default:
          note(f, dur, 'triangle', vol, d, t);
          note(f * 2, dur * 0.5, 'sine', vol * 0.3, d, t);
      }
    }
    function melody(arr, gap, timbre, vol) {
      ensure(); if (!ac) return;
      gap = gap || 0.16;
      for (var i = 0; i < arr.length; i++) playNote(arr[i], gap * 1.7, timbre || 'xylophone', vol, sfxGain, ac.currentTime + i * gap);
    }

    /* -- gentle SFX presets -- */
    function nowT(off) { return (ac ? ac.currentTime : 0) + (off || 0); }
    var SFX = {
      tap:    function () { note(680, 0.05, 'sine', 0.25); },
      click:  function () { note(620, 0.05, 'sine', 0.22); },
      select: function () { note(740, 0.06, 'triangle', 0.28); note(988, 0.09, 'sine', 0.2, sfxGain, nowT(0.05)); },
      blip:   function () { note(560, 0.05, 'sine', 0.22); },
      pop:    function () { sweep(720, 200, 0.09, 'sine', 0.3); },
      pop2:   function () { sweep(900, 280, 0.08, 'sine', 0.3); },
      bubble: function () { sweep(200, 760, 0.13, 'sine', 0.28); },
      coin:   function () { note(988, 0.06, 'triangle', 0.28); note(1319, 0.12, 'sine', 0.26, sfxGain, nowT(0.06)); },
      ding:   function () { bell(880, 0.7, 0.3); },
      bell:   function () { bell(660, 1.0, 0.32); },
      chime:  function () { bell(784, 0.9, 0.3); bell(1047, 0.8, 0.2, sfxGain, nowT(0.08)); },
      correct:function () { note(659, 0.12, 'triangle', 0.3); note(988, 0.18, 'triangle', 0.3, sfxGain, nowT(0.1)); },
      sparkle:function () { var s = [1568, 1976, 2349, 2637]; for (var i = 0; i < s.length; i++) note(s[i], 0.12, 'sine', 0.18, sfxGain, nowT(i * 0.05)); },
      twinkle:function () { var s = [1047, 1319, 1568, 2093]; for (var i = 0; i < s.length; i++) note(s[i], 0.14, 'sine', 0.16, sfxGain, nowT(i * 0.06)); },
      magic:  function () { sweep(400, 1600, 0.4, 'sine', 0.22); var s = [1047, 1319, 1568, 2093, 2637]; for (var i = 0; i < s.length; i++) note(s[i], 0.16, 'sine', 0.16, sfxGain, nowT(0.1 + i * 0.05)); },
      yay:    function () { var s = [523, 659, 784, 1047]; for (var i = 0; i < s.length; i++) playNote(s[i], 0.18, 'xylophone', 0.3, sfxGain, nowT(i * 0.08)); note(1568, 0.2, 'sine', 0.14, sfxGain, nowT(0.34)); },
      win:    function () { SFX.yay(); },
      cheer:  function () { var s = [523, 587, 659, 784, 880, 1047]; for (var i = 0; i < s.length; i++) playNote(s[i], 0.2, 'marimba', 0.3, sfxGain, nowT(i * 0.1)); for (var k = 0; k < 3; k++) noise(0.18, 0.1, sfxGain, nowT(0.2 + k * 0.18), 2500, 0.6, 'highpass'); },
      tada:   function () { playNote('C5', 0.18, 'piano', 0.3); playNote('E5', 0.18, 'piano', 0.3, sfxGain, nowT(0.08)); playNote('G5', 0.4, 'bell', 0.3, sfxGain, nowT(0.16)); },
      applause:function () { for (var k = 0; k < 8; k++) noise(0.12, 0.08, sfxGain, nowT(k * 0.09 + Math.random() * 0.03), 2200, 0.5, 'highpass'); },
      boing:  function () { var o = null; sweep(180, 520, 0.18, 'sine', 0.3); sweep(520, 240, 0.18, 'sine', 0.22, nowT(0.16)); },
      whee:   function () { sweep(300, 1000, 0.3, 'sine', 0.26); },
      whoosh: function () { noise(0.3, 0.18, sfxGain, 0, 800, 0.7, 'lowpass'); },
      splash: function () { noise(0.25, 0.25, sfxGain, 0, 1400, 0.5); note(180, 0.12, 'sine', 0.2); },
      jump:   function () { sweep(320, 660, 0.14, 'sine', 0.28); },
      giggle: function () { var f = [700, 900, 760, 980, 820]; for (var i = 0; i < f.length; i++) note(f[i], 0.07, 'triangle', 0.2, sfxGain, nowT(i * 0.08)); },
      star:   function () { bell(1318, 0.6, 0.26); },
      // gentle, never-harsh "not quite" — soft downward two-note, encouraging not punishing

<script>
/* =============================================================================
 * BÉ VUI — ANCHOR GAMES (one per category). Reference implementations that
 * prove every engine API path and set the quality bar for the fan-out:
 *   no-fail · big targets · gentle feedback · audio+visual (no text reliance)

/* ---- 1. COLORS — tap the matching color -------------------------------- */
Arcade.register({
  id: 'find-color', title: 'Tìm Màu', emoji: '🎈', category: 'Colors', color: '#ef4444',
  desc: 'Chạm quả bóng đúng màu.', how: 'Chạm quả bóng đúng màu!',
  create: function (host) {
    var COLORS = [
      { n: 'red', c: '#ef4444' }, { n: 'blue', c: '#3b82f6' }, { n: 'yellow', c: '#facc15' },
      { n: 'green', c: '#22c55e' }, { n: 'orange', c: '#f97316' }, { n: 'purple', c: '#a855f7' },
      { n: 'pink', c: '#ec4899' }
    ];
    var balloons, target, celebrate, again;
    function round() {
      var pick = host.shuffle(COLORS.slice()).slice(0, host.rint(3, 4));
      target = host.choice(pick);
      balloons = pick.map(function (col) { return { col: col, wob: 0, pop: 0 }; });
      celebrate = 0; again = 0;
      host.say(target.n, 'en-US');
    }
    function layout() {
      var W = host.W, H = host.H, n = balloons.length;
      var r = Math.min(W / (n + 1), H * 0.22) * 0.46;
      r = Math.max(r, Math.min(W, H) * 0.11);
      var gap = (W - 2 * r * n) / (n + 1);
      var arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: gap + r + i * (2 * r + gap), y: H * 0.62, r: r });
      return arr;
    }
    host.on('tap', function (p) {
      if (celebrate > 0) return;
      var L = layout();
      for (var i = 0; i < balloons.length; i++) {
        if (host.dist(p.x, p.y, L[i].x, L[i].y) < L[i].r * 1.25) {

            host.sfx('yay'); host.say('Yes!', 'en-US'); host.vibrate(30);
          } else { balloons[i].wob = 0.6; host.sfx('nope'); host.say(target.n, 'en-US'); }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#dff1ff'); g.addColorStop(1, '#fff7e6'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      // prompt swatch
      var sw = Math.min(W, H) * 0.2;
      c.save(); host.rr(W / 2 - sw / 2, H * 0.12, sw, sw, sw * 0.22); c.fillStyle = target.c; c.fill();
      c.lineWidth = 6; c.strokeStyle = '#fff'; c.stroke(); c.restore();
      c.fillStyle = '#6b5b86'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('🔊  Màu này?', W / 2, H * 0.1);
      var L = layout();
      for (var i = 0; i < balloons.length; i++) {
        var b = balloons[i], x = L[i].x, y = L[i].y, r = L[i].r;
        if (b.wob > 0) { b.wob -= dt; x += Math.sin(b.wob * 40) * r * 0.15; }
        if (b.pop > 0) { b.pop -= dt * 1.4; r *= (1 + (1 - b.pop) * 0.5); if (b.pop < 0) continue; c.globalAlpha = Math.max(0, b.pop); }
        // string
        c.strokeStyle = '#c9b8e0'; c.lineWidth = 2; c.beginPath(); c.moveTo(x, y + r); c.quadraticCurveTo(x + 10, y + r + 30, x, y + r + 55); c.stroke();
        c.fillStyle = b.col.c; c.beginPath(); c.ellipse(x, y, r * 0.92, r, 0, 0, 7); c.fill();
        c.fillStyle = 'rgba(255,255,255,.45)'; c.beginPath(); c.ellipse(x - r * 0.3, y - r * 0.35, r * 0.22, r * 0.3, -0.4, 0, 7); c.fill();

  }
});

/* ---- 2. SHAPES — drag the shape into its hole -------------------------- */
Arcade.register({
  id: 'shape-drop', title: 'Thả Hình', emoji: '🔷', category: 'Shapes', color: '#38bdf8',
  desc: 'Kéo hình vào đúng ô.', how: 'Kéo hình tới ô giống nó!',
  create: function (host) {
    var SH = [['circle', 'tròn'], ['square', 'vuông'], ['triangle', 'tam giác'], ['star', 'ngôi sao'], ['heart', 'trái tim']];
    var holes, queue, active, drag, celebrate;
    function round() {
      var pick = host.shuffle(SH.slice()).slice(0, 3);
      holes = pick.map(function (s) { return { type: s[0], vi: s[1], col: host.choice(host.PAL), filled: false }; });
      queue = host.shuffle(pick.slice());
      next(); celebrate = 0;
    }
    function next() { active = queue.length ? { type: queue[0][0], vi: queue[0][1] } : null; drag = null; if (active) host.say(active.vi ? active.type : '', 'en-US'); }
    function holeLayout() {
      var W = host.W, H = host.H, n = holes.length, s = Math.min(W / (n + 0.6), H * 0.3) * 0.7;
      var gap = (W - s * n) / (n + 1), arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: gap + s / 2 + i * (s + gap), y: H * 0.27, s: s });
      return arr;
    }
    function activePos() { return drag ? drag : { x: host.W / 2, y: host.H * 0.74 }; }
    function activeSize() { return Math.min(host.W, host.H) * 0.2; }
    function shape(c, type, x, y, s, col) {
      c.fillStyle = col; c.strokeStyle = 'rgba(0,0,0,.12)'; c.lineWidth = 3;
      if (type === 'circle') { c.beginPath(); c.arc(x, y, s / 2, 0, 7); c.fill(); }
      else if (type === 'square') { host.rr(x - s / 2, y - s / 2, s, s, s * 0.16); c.fill(); }
      else if (type === 'triangle') { c.beginPath(); c.moveTo(x, y - s / 2); c.lineTo(x + s / 2, y + s / 2); c.lineTo(x - s / 2, y + s / 2); c.closePath(); c.fill(); }
      else if (type === 'star') { c.beginPath(); for (var k = 0; k < 5; k++) { var a = -Math.PI / 2 + k * 2 * Math.PI / 5; c.lineTo(x + Math.cos(a) * s / 2, y + Math.sin(a) * s / 2); var a2 = a + Math.PI / 5; c.lineTo(x + Math.cos(a2) * s * 0.22, y + Math.sin(a2) * s * 0.22); } c.closePath(); c.fill(); }
      else if (type === 'heart') { c.beginPath(); c.moveTo(x, y + s * 0.32); c.bezierCurveTo(x + s * 0.6, y - s * 0.25, x + s * 0.2, y - s * 0.5, x, y - s * 0.18); c.bezierCurveTo(x - s * 0.2, y - s * 0.5, x - s * 0.6, y - s * 0.25, x, y + s * 0.32); c.closePath(); c.fill(); }
    }
    host.on('down', function (p) { if (active && celebrate <= 0 && host.dist(p.x, p.y, host.W / 2, host.H * 0.74) < activeSize()) drag = { x: p.x, y: p.y }; });
    host.on('move', function (p) { if (drag) { drag.x = p.x; drag.y = p.y; } });
    host.on('up', function (p) {
      if (!drag || !active) { drag = null; return; }
      var L = holeLayout();
      for (var i = 0; i < holes.length; i++) {
        if (!holes[i].filled && host.dist(p.x, p.y, L[i].x, L[i].y) < L[i].s * 0.8) {
          if (holes[i].type === active.type) {
            holes[i].filled = true; host.sfx('pop'); host.sparkle(L[i].x, L[i].y, holes[i].col); queue.shift();
            if (!queue.length) { celebrate = 1.6; host.celebrate(host.W / 2, host.H * 0.4); host.say('Great!', 'en-US'); } else next();
            drag = null; return;
          }
        }
      }
      host.sfx('nope'); drag = null;
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#fff7ef');
      var L = holeLayout();
      for (var i = 0; i < holes.length; i++) {
        var h = holes[i];
        c.save(); c.globalAlpha = 0.32; shape(c, h.type, L[i].x, L[i].y, L[i].s, h.filled ? h.col : '#cbb8d8'); c.restore();
        if (h.filled) shape(c, h.type, L[i].x, L[i].y, L[i].s * 0.92, h.col);
      }
      if (active && celebrate <= 0) { var ap = activePos(); shape(c, active.type, ap.x, ap.y, activeSize(), drag ? '#fbbf24' : '#f59e0b'); }
      c.fillStyle = '#6b5b86'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Giỏi quá!' : '👇 Kéo hình lên ô', W / 2, H * 0.93);
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) round(); }
    });
    return { start: function () { round(); host.music('playful'); } };
  }
});

/* ---- 3. ANIMALS — peekaboo reveal + sound ----------------------------- */
Arcade.register({
  id: 'animal-peekaboo', title: 'Ú Òa Con Vật', emoji: '🐮', category: 'Animals', color: '#22c55e',

/* ---- 5. LETTERS — trace the letter by collecting dots ------------------ */
Arcade.register({
  id: 'trace-letter', title: 'Tô Chữ', emoji: '✏️', category: 'Letters', color: '#a855f7',

      T: [[.25, .25], [.5, .25], [.75, .25], [.5, .25], [.5, .5], [.5, .75]],

Arcade.register({
  id: 'match-pairs', title: 'Lật Hình', emoji: '🃏', category: 'Memory', color: '#6366f1',
  desc: 'Tìm cặp giống nhau.', how: 'Lật 2 ô giống nhau!',

    var POOL = ['🐶', '🐱', '🐰', '🦊', '🐼', '🐸', '🐵', '🦁', '🐮', '🐷'];
    var cards, first, lock, matched, celebrate;
    function reset() {
      var pick = host.shuffle(POOL.slice()).slice(0, 6);
      var deck = host.shuffle(pick.concat(pick));
      cards = deck.map(function (e) { return { e: e, up: false, done: false, sc: 1 }; });
      first = null; lock = 0; matched = 0; celebrate = 0;
    }
    function grid() {
      var W = host.W, H = host.H, cols = W > H ? 4 : 3, rows = Math.ceil(12 / cols);

      var arr = [];
      for (var i = 0; i < 12; i++) arr.push({ x: pad + (i % cols) * (cw + pad), y: H * 0.1 + pad + ((i / cols) | 0) * (ch + pad), w: cw, h: ch });
      return arr;
    }
    host.on('tap', function (p) {
      if (lock > 0 || celebrate > 0) return;
      var L = grid();
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i], b = L[i];
        if (p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h) {
          if (card.up || card.done) return;
          card.up = true; card.sc = 0.1; host.sfx('pop'); host.note('E5', 0.3, 'musicbox');
          if (!first) first = card;
          else {
            if (first.e === card.e) { first.done = card.done = true; matched++; host.sfx('coin'); host.sparkle(b.x + b.w / 2, b.y + b.h / 2); first = null; if (matched === 6) { celebrate = 2; host.celebrate(host.W / 2, host.H / 2); host.say('You did it!', 'en-US'); } }

      var c = host.ctx, W = host.W, H = host.H; host.clear('#eef0ff');

      var L = grid();
      c.fillStyle = '#5b54c9'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Giỏi lắm!' : '🃏 Tìm cặp giống nhau · ' + matched + '/6', W / 2, H * 0.07);

        var show = card.up || card.done;

        c.lineWidth = 4; c.strokeStyle = '#fff'; c.stroke();
        c.textAlign = 'center'; c.textBaseline = 'middle';
        if (show) { c.globalAlpha = card.done ? 0.6 : 1; c.font = Math.round(b.h * 0.5) + 'px system-ui'; c.fillText(card.e, 0, 0); }

        c.textBaseline = 'alphabetic'; c.restore();
      }
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) reset(); }
    });
    return { start: function () { reset(); host.music('playful'); } };
  }

/* ---- 1. COLORS — mix two primaries in a pot ---------------------------- */
Arcade.register({
  id: 'color-mix', title: 'Pha Màu', emoji: '🎨', category: 'Colors', color: '#a855f7',
  desc: 'Pha hai màu thành màu mới.', how: 'Chạm hai màu để pha!',
  create: function (host) {

      { n: 'red',    c: '#ef4444' },
      { n: 'blue',   c: '#3b82f6' },
      { n: 'yellow', c: '#facc15' }
    ];
    // mix table keyed by sorted pair of names
    var MIX = {
      'blue|red':    { n: 'purple', c: '#a855f7' },
      'blue|yellow': { n: 'green',  c: '#22c55e' },
      'red|yellow':  { n: 'orange', c: '#f97316' }

    var picked, result, potWob, hint;
    function reset() { picked = []; result = null; potWob = 0; hint = 0; }

      var r = Math.max(Math.min(W, H) * 0.13, Math.min(W / (n + 1), H * 0.22) * 0.42);

    }
    function tryMix() {
      if (picked.length < 2) return;
      var key = [picked[0].n, picked[1].n].sort().join('|');
      var m = MIX[key];
      if (m) {
        result = m; potWob = 0.5; host.sfx('magic'); host.sparkle(host.W / 2, host.H * 0.45, m.c);
        host.celebrate(host.W / 2, host.H * 0.45); host.say(m.n, 'en-US');
      } else {
        // same color tapped twice (shouldn't normally happen, guarded) — gentle
        result = { n: picked[0].n, c: picked[0].c }; host.sparkle(host.W / 2, host.H * 0.45, picked[0].c);
      }
    }
    host.on('tap', function (p) {
      if (!BLOBS) return;
      var pot = potRect();
      // tap the pot -> clear it
      if (p.x > pot.x - 20 && p.x < pot.x + pot.w + 20 && p.y > pot.y - 20 && p.y < pot.y + pot.h + 20) {
        if (picked.length || result) { reset(); host.sfx('whoosh'); }

      }

      for (var i = 0; i < BLOBS.length; i++) {
        if (host.dist(p.x, p.y, L[i].x, L[i].y) < L[i].r * 1.25) {

          host.sparkle(L[i].x, L[i].y, BLOBS[i].c);
          if (picked.length >= 2) tryMix();
          return;
        }
      }
    });

<script>
/* =============================================================================
 * BÉ VUI — GAMES PART 2  (Colors & Shapes fan-out)

 * inside its own create(host) — NO globals, NO shared top-level state/helpers.
 * Patterns follow the anchors: find-color · shape-drop · trace-letter.
 *   • read W/H every frame   • big hit areas   • gentle 'nope'+wobble on wrong
 *   • reward with celebrate/sparkle + say   • dt timers (no leaked timeouts)
 *   • sound on every action + host.music in start()

/* ---- 1. COLORS — tap any candy of the target color -------------------- */
Arcade.register({
  id: 'color-match-pop', title: 'Chạm Đúng Màu', emoji: '🍭', category: 'Colors', color: '#ec4899',
  desc: 'Chạm viên kẹo đúng màu.', how: 'Chạm kẹo đúng màu nhé!',
  create: function (host) {

      { n: 'red', c: '#ef4444' }, { n: 'blue', c: '#3b82f6' }, { n: 'yellow', c: '#facc15' },
      { n: 'green', c: '#22c55e' }, { n: 'orange', c: '#f97316' }, { n: 'purple', c: '#a855f7' },
      { n: 'pink', c: '#ec4899' }

    var items, target, celebrate, prompt;
    function round() {
      // a palette of 3-4 colors, target is one of them; scatter several items.
      var pick = host.shuffle(COLORS.slice()).slice(0, host.rint(3, 4));
      target = host.choice(pick);
      var n = host.rint(6, 8);

        items.push({ col: col, nx: host.rand(0.12, 0.88), ny: host.rand(0.32, 0.9), bob: host.rand(0, 6.28), wob: 0, pop: 0 });

<script>

                ['🦁', 'lion'], ['🐘', 'elephant']];
    var choices = [], target = null, celebrate = 0, wob = [], playTimer = 0;

    function mouth() { var W = host.W, H = host.H; return { x: W / 2, y: H * 0.34, r: Math.min(W, H) * 0.18 }; }
    function foodSize() { return Math.min(host.W, host.H) * 0.13; }
    function slotPos(i) {
      var W = host.W, H = host.H, n = foods.length;

      if (celebrate > 0 || !foods.length) return;
      var sz = foodSize();
      for (var i = foods.length - 1; i >= 0; i--) {

        var sp = slotPos(f.slot);

        if (host.dist(p.x, p.y, fx, fy) < sz * 1.2) {

    });
    host.on('move', function (p) {
      if (!drag) return;
      var sp = slotPos(drag.slot);
      drag.hx = p.x - sp.x; drag.hy = p.y - sp.y;
    });
    host.on('up', function (p) {
      if (!drag) return;
      var f = drag; drag = null;

      if (host.dist(p.x, p.y, m.x, m.y) < m.r * 1.15) {
        if (f.ok) {

      c.beginPath(); c.ellipse(m.x, m.y, m.r * 0.7, m.r * (chomp > 0 ? 0.35 : 0.62), 0, 0, 7); c.stroke();
      c.restore();

      c.fillStyle = '#9a4a14'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
      c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Ngon quá!' : '👇 Kéo món ăn vào miệng', W / 2, H * 0.6);

      // foods at the bottom (skip the one being dragged so it draws on top)
      var sz = foodSize();
      for (var pass = 0; pass < 2; pass++) {
        for (var i = 0; i < foods.length; i++) {
          var f = foods[i]; if (f.gone) continue;
          var isDrag = (f === drag);
          if (pass === 0 && isDrag) continue;
          if (pass === 1 && !isDrag) continue;
          if (f.wob > 0) f.wob -= dt;
          var sp = slotPos(f.slot);
          var fx = sp.x + f.hx + (f.wob > 0 ? Math.sin(f.wob * 40) * sz * 0.2 : 0);

          c.save();
          if (!isDrag) {
            c.fillStyle = 'rgba(0,0,0,.06)'; c.beginPath(); c.arc(sp.x, sp.y + sz * 0.55, sz * 0.5, 0, 7); c.fill();
          }
          c.textAlign = 'center'; c.textBaseline = 'middle';
          c.font = Math.round(sz * (isDrag ? 1.5 : 1.3)) + 'px system-ui';
          c.fillText(f.e, fx, fy);
          c.restore();
        }
      }
      c.textBaseline = 'alphabetic';

      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) round(); }
    });

    return {
      start: function () { round(); host.music('playful'); },
      stop: function () {}
    };
  }
});

  }

        e: a2[0], sound: a2[1],
        x: fromLeft ? -s2 : host.W + s2,
        laneY: host.clamp(p.y / host.H, 0.3, 0.85),
        dir: fromLeft ? 1 : -1,
        sp: host.rand(45, 85),
        bob: host.rand(0, 6.28),
        hop: 0, scale: 0
      });
      host.animal(a2[1]); host.say(a2[1], 'en-US');
    });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#fef9c3'); g.addColorStop(0.6, '#bbf7d0'); g.addColorStop(1, '#86efac');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      // ground band
      c.fillStyle = 'rgba(74,222,128,.45)'; c.fillRect(0, H * 0.78, W, H * 0.22);

      var s = sizeOf();
      for (var i = 0; i < parade.length; i++) {
        var a = parade[i];
        if (a.scale < 1) a.scale = Math.min(1, a.scale + dt * 3);
        a.x += a.dir * a.sp * dt;
        a.bob += dt * 4;
        if (a.hop > 0) a.hop -= dt;
        // loop gently across the screen
        if (a.dir > 0 && a.x > W + s) a.x = -s;
        if (a.dir < 0 && a.x < -s) a.x = W + s;
        var ay = H * a.laneY + Math.sin(a.bob) * s * 0.06 - (a.hop > 0 ? Math.sin(a.hop / 0.5 * Math.PI) * s * 0.5 : 0);
        c.save();
        // shadow
        c.fillStyle = 'rgba(0,0,0,.08)';
        c.beginPath(); c.ellipse(a.x, H * a.laneY + s * 0.55, s * 0.45, s * 0.14, 0, 0, 7); c.fill();
        c.translate(a.x, ay);
        c.scale(a.dir < 0 ? -a.scale : a.scale, a.scale); // face direction of travel
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = Math.round(s * 1.5) + 'px system-ui';
        c.fillText(a.e, 0, 0);
        c.restore();
      }

      c.fillStyle = '#b45309'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
      c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('🦒 Chạm để thêm thú · chạm thú để chào!', W / 2, H * 0.07);
    });

    return {
      start: function () { reset(); host.music('jungle'); },
      stop: function () {}
    };
  }
});

</script>
<script>
/* =============================================================================
 * BÉ VUI — GAMES PART 5  (kids 2–6, touch-first, no-fail, audio-rich)
 * Six independent modules registered onto window.Arcade. Everything lives
 * inside each create(host) — NO globals, no leaked timers, W/H read every
 * frame, big hit areas, gentle (no fail) feedback, reward on success.
 *   1. hide-seek-animal  Trốn Tìm        🌳  Animals  #22c55e
 *   2. animal-puzzle     Ghép Thú        🧩  Animals  #a855f7
 *   3. baby-animal       Thú Mẹ Thú Con  🐥  Animals  #ec4899
 *   4. animal-bath       Tắm Cho Thú     🛁  Animals  #38bdf8
 *   5. egg-hatch         Trứng Nở        🥚  Animals  #facc15
 *   6. count-pop         Chạm Đủ Số      🔢  Numbers  #f97316
 * ========================================================================== */

/* ---- 1. ANIMALS — hide & seek: tap bushes to find hidden animals -------- */
Arcade.register({
  id: 'hide-seek-animal', title: 'Trốn Tìm', emoji: '🌳', category: 'Animals', color: '#22c55e',
  desc: 'Chạm bụi cây để tìm con vật.', how: 'Chạm vào bụi cây tìm thú!',
  create: function (host) {
    var ANIM = [['🐱', 'cat'], ['🐶', 'dog'], ['🐰', 'rabbit'], ['🦆', 'duck'],
                ['🐦', 'bird'], ['🐸', 'frog'], ['🦉', 'owl'], ['🐷', 'pig'],
                ['🐹', 'hamster'], ['🐻', 'bear'], ['🦊', 'fox'], ['🐮', 'cow']];
    var BUSH = ['🌳', '🌲', '🌴', '🌿'];
    var spots, celebrate;

    function reset() {
      var n = 6;                                  // six bushes
      var picks = host.shuffle(ANIM.slice());
      var hideCount = host.rint(3, 4);            // 3–4 actually hide an animal
      spots = [];
      for (var i = 0; i < n; i++) {
        spots.push({
          bush: host.choice(BUSH),
          hasAnimal: i < hideCount,
          emoji: picks[i] ? picks[i][0] : '🐱',
          sound: picks[i] ? picks[i][1] : 'cat',
          found: false,
          peek: 0,        // 0..1 reveal height of animal
          rustle: 0,      // wobble timer
          jx: host.rand(0, 6.28)
        });
      }
      host.shuffle(spots);
      celebrate = 0;
    }

    function layout() {
      var W = host.W, H = host.H, n = spots.length;
      var cols = W > H ? 3 : 2, rows = Math.ceil(n / cols);
      var padX = W * 0.06, padY = H * 0.16;
      var cw = (W - padX * 2) / cols, ch = (H - padY - H * 0.06) / rows;
      var arr = [];
      for (var i = 0; i < n; i++) {
        var col = i % cols, row = (i / cols) | 0;
        arr.push({
          x: padX + col * cw + cw / 2,
          y: padY + row * ch + ch / 2,
          r: Math.max(Math.min(cw, ch) * 0.42, Math.min(W, H) * 0.13)
        });
      }
      return arr;
    }

    function remaining() {
      var k = 0;
      for (var i = 0; i < spots.length; i++) if (spots[i].hasAnimal && !spots[i].found) k++;
      return k;
    }

    host.on('tap', function (p) {
      if (!spots || celebrate > 0) return;
      var L = layout();
      for (var i = 0; i < spots.length; i++) {
        if (host.dist(p.x, p.y, L[i].x, L[i].y) < L[i].r * 1.15) {
          var s = spots[i];
          if (s.hasAnimal) {
            if (!s.found) {
              s.found = true; s.peek = 0.001; s.rustle = 0.5;
              host.animal(s.sound); host.say(s.sound, 'en-US');
              host.sparkle(L[i].x, L[i].y - L[i].r * 0.6, '#fde047');
              host.vibrate(20);
              if (remaining() === 0) { celebrate = 1.8; }
            } else { s.rustle = 0.45; host.sfx('giggle'); }
          } else {
            s.rustle = 0.5; host.sfx('whoosh');     // just leaves rustling, no fail
          }
          return;
        }
      }
    });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#bbf7d0'); g.addColorStop(1, '#dcfce7');
      c.fillStyle = g; c.fillRect(0, 0, W, H);

      var L = layout();
      for (var i = 0; i < spots.length; i++) {
        var s = spots[i], b = L[i];
        if (s.rustle > 0) s.rustle -= dt;
        if (s.found && s.peek < 1) s.peek = Math.min(1, s.peek + dt * 3);
        s.jx += dt;
        var wob = s.rustle > 0 ? Math.sin(s.rustle * 50) * b.r * 0.12 : 0;

        // revealed animal rising from behind the bush
        if (s.found && s.peek > 0) {
          c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
          c.font = Math.round(b.r * 1.05) + 'px system-ui';
          c.globalAlpha = s.peek;
          c.fillText(s.emoji, b.x + wob, b.y - b.r * 0.5 - b.r * 0.4 * s.peek);
          c.globalAlpha = 1; c.textBaseline = 'alphabetic'; c.restore();
        }

        // bush body (rounded mound)
        c.save();
        var bob = Math.sin(s.jx * 1.5) * b.r * 0.03;
        c.fillStyle = '#16a34a';
        c.beginPath(); c.arc(b.x + wob, b.y + bob, b.r, 0, 7); c.fill();
        c.fillStyle = 'rgba(255,255,255,.18)';
        c.beginPath(); c.arc(b.x + wob - b.r * 0.3, b.y + bob - b.r * 0.32, b.r * 0.3, 0, 7); c.fill();
        // bush emoji on top for charm
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = Math.round(b.r * 1.1) + 'px system-ui';
        c.globalAlpha = 0.95;
        c.fillText(s.bush, b.x + wob, b.y + bob);
        c.globalAlpha = 1; c.textBaseline = 'alphabetic';
        c.restore();

        // a small "?" hint over un-searched bushes
        if (!s.found) {
          c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
          c.font = '900 ' + Math.round(b.r * 0.42) + 'px system-ui';
          c.fillStyle = 'rgba(255,255,255,.85)';
          c.fillText('❓', b.x + wob + b.r * 0.55, b.y - b.r * 0.55);
          c.textBaseline = 'alphabetic'; c.restore();
        }
      }

      c.fillStyle = '#15803d'; c.textAlign = 'center';
      c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Tìm hết rồi!' : '🌳 Chạm bụi cây tìm thú · còn ' + remaining(),
                 W / 2, H * 0.09);

      if (celebrate > 0) {
        celebrate -= dt;
        if (celebrate > 1.6) { host.celebrate(W / 2, H * 0.4); host.say('You found them all!', 'en-US'); }
        if (celebrate <= 0) reset();
      }
    });

    return {
      start: function () { reset(); host.music('jungle'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 2. ANIMALS — jigsaw: drag big pieces of an animal into slots ------- */
Arcade.register({
  id: 'animal-puzzle', title: 'Ghép Thú', emoji: '🧩', category: 'Animals', color: '#a855f7',
  desc: 'Kéo mảnh ghép vào đúng ô.', how: 'Kéo mảnh ghép thành con vật!',
  create: function (host) {
    var ANIM = [['🐶', 'dog'], ['🐱', 'cat'], ['🐮', 'cow'], ['🐷', 'pig'],
                ['🦁', 'lion'], ['🐸', 'frog'], ['🐵', 'monkey'], ['🐰', 'rabbit'],
                ['🦊', 'fox'], ['🐻', 'bear']];
    var animal, sound, pieces, nPieces, drag, celebrate;

    function frame() { var W = host.W, H = host.H, S = Math.min(W, H) * 0.5; return { x: W / 2 - S / 2, y: H * 0.12, S: S }; }

    function reset() {
      var a = host.choice(ANIM); animal = a[0]; sound = a[1];
      nPieces = host.rint(2, 3);
      var f = frame();
      pieces = [];
      for (var i = 0; i < nPieces; i++) {
        // each piece owns a horizontal band of the picture
        pieces.push({
          idx: i,
          placed: false,
          // scattered start positions in the lower scatter zone
          x: 0, y: 0,
          pop: 0
        });
      }
      scatter();
      drag = null; celebrate = 0;
      host.say('Make the ' + sound, 'en-US');
    }

    function scatter() {
      var W = host.W, H = host.H, n = pieces.length;
      var order = host.shuffle(pieces.slice());
      var zoneY = H * 0.72, slotW = W / n;
      for (var i = 0; i < order.length; i++) {
        order[i].x = slotW * i + slotW / 2 + host.rand(-slotW * 0.12, slotW * 0.12);
        order[i].y = zoneY + host.rand(-H * 0.05, H * 0.05);
      }
    }

    function pieceSize() { var f = frame(); return { w: f.S, h: f.S / nPieces }; }
    function slotPos(i) { var f = frame(), ps = pieceSize(); return { x: f.x + f.S / 2, y: f.y + ps.h / 2 + i * ps.h }; }
    function pos(pc) { return pc.placed ? slotPos(pc.idx) : { x: pc.x, y: pc.y }; }

    // draw one horizontal band of the animal emoji using clipping
    function drawPiece(c, pc, cx, cy, alpha) {
      var f = frame(), ps = pieceSize();
      c.save();
      c.globalAlpha = alpha == null ? 1 : alpha;
      host.rr(cx - ps.w / 2, cy - ps.h / 2, ps.w, ps.h, Math.min(14, ps.h * 0.2));
      c.fillStyle = pc.placed ? '#f3e8ff' : '#ffffff'; c.fill();
      c.lineWidth = 4; c.strokeStyle = pc === (drag && drag.pc) ? '#a855f7' : '#e9d5ff'; c.stroke();
      c.clip();
      // render the full emoji but offset so this band shows its slice
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = Math.round(f.S * 0.92) + 'px system-ui';
      var fullCenterY = cy - (pc.idx - (nPieces - 1) / 2) * ps.h;
      c.fillText(animal, cx, fullCenterY);
      c.restore();
    }

    host.on('down', function (p) {
      if (!pieces || celebrate > 0) return;
      var ps = pieceSize();
      for (var i = pieces.length - 1; i >= 0; i--) {
        var pc = pieces[i]; if (pc.placed) continue;
        var pp = pos(pc);
        if (Math.abs(p.x - pp.x) < ps.w * 0.6 && Math.abs(p.y - pp.y) < ps.h * 0.75) {
          drag = { pc: pc, ox: p.x - pp.x, oy: p.y - pp.y };
          pc.x = pp.x; pc.y = pp.y;
          host.sfx('select');
          return;
        }
      }
    });
    host.on('move', function (p) { if (drag) { drag.pc.x = p.x - drag.ox; drag.pc.y = p.y - drag.oy; } });
    host.on('up', function () {
      if (!drag) return;
      var pc = drag.pc, sp = slotPos(pc.idx), ps = pieceSize();
      // VERY generous snap
      if (host.dist(pc.x, pc.y, sp.x, sp.y) < Math.max(ps.h, ps.w * 0.6)) {
        pc.placed = true; pc.pop = 1;
        host.sfx('click'); host.sparkle(sp.x, sp.y, '#a855f7'); host.vibrate(15);
        var all = true;
        for (var i = 0; i < pieces.length; i++) if (!pieces[i].placed) all = false;
        if (all) { celebrate = 1.8; }
      } else {
        host.sfx('nope'); // soft, no fail — piece simply stays where dropped
      }
      drag = null;
    });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#faf5ff');
      var f = frame(), ps = pieceSize();

      // slot board (faint full silhouette + slot dividers)
      c.save();
      host.rr(f.x, f.y, f.S, f.S, 22);
      c.fillStyle = '#f5edff'; c.fill();
      c.lineWidth = 4; c.strokeStyle = '#e9d5ff'; c.stroke();
      c.clip();
      c.globalAlpha = 0.18; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = Math.round(f.S * 0.92) + 'px system-ui';
      c.fillText(animal, f.x + f.S / 2, f.y + f.S / 2);
      c.restore();
      // slot guide lines
      c.strokeStyle = 'rgba(168,85,247,.25)'; c.lineWidth = 2;
      for (var k = 1; k < nPieces; k++) {
        c.beginPath(); c.moveTo(f.x, f.y + ps.h * k); c.lineTo(f.x + f.S, f.y + ps.h * k); c.stroke();
      }

      // placed pieces (in board)
      for (var i = 0; i < pieces.length; i++) {
        var pc = pieces[i]; if (!pc.placed) continue;
        if (pc.pop > 0) pc.pop -= dt;
        var sp = slotPos(pc.idx);
        drawPiece(c, pc, sp.x, sp.y, 1);
      }
      // loose pieces (draw dragged one last/on top)
      var dragged = drag && drag.pc;
      for (var j = 0; j < pieces.length; j++) {
        var lp = pieces[j]; if (lp.placed || lp === dragged) continue;
        drawPiece(c, lp, lp.x, lp.y, 1);
      }
      if (dragged && !dragged.placed) drawPiece(c, dragged, dragged.x, dragged.y, 1);

      c.fillStyle = '#7e22ce'; c.textAlign = 'center';
      c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Ghép xong rồi!' : '🧩 Kéo mảnh vào ô', W / 2, H * 0.075);

      if (celebrate > 0) {
        celebrate -= dt;
        if (celebrate > 1.6) { host.animal(sound); host.celebrate(W / 2, f.y + f.S / 2); host.say('Great!', 'en-US'); }
        if (celebrate <= 0) reset();
      }
    });

    return {
      start: function () { reset(); host.music('playful'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 3. ANIMALS — match baby to its mother ----------------------------- */
Arcade.register({
  id: 'baby-animal', title: 'Thú Mẹ Thú Con', emoji: '🐥', category: 'Animals', color: '#ec4899',
  desc: 'Kéo thú con về với mẹ.', how: 'Kéo thú con tới mẹ của nó!',
  create: function (host) {
    // [adult, baby, sound]  — distinct emojis for adult vs baby
    var PAIRS = [
      ['🐔', '🐥', 'chick'], ['🐶', '🐕', 'dog'], ['🐱', '🐈', 'cat'],
      ['🐄', '🐮', 'cow'], ['🐑', '🐏', 'sheep'], ['🐷', '🐖', 'pig'],
      ['🦆', '🐤', 'duck'], ['🐸', '🐸', 'frog'], ['🐴', '🐎', 'horse']
    ];
    var mothers, babies, drag, celebrate;

    function reset() {
      var pick = host.shuffle(PAIRS.slice()).slice(0, 3);
      mothers = pick.map(function (p) { return { emoji: p[0], baby: p[1], sound: p[2], wob: 0 }; });
      var bArr = pick.map(function (p, i) {
        return { emoji: p[1], sound: p[2], owner: i, matched: false, x: 0, y: 0, hx: 0, hy: 0, wob: 0 };
      });
      babies = host.shuffle(bArr);
      drag = null; celebrate = 0;
      placeHome();
    }

    function motherLayout() {
      var W = host.W, H = host.H, n = mothers.length;
      var cw = W / n, arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: cw * i + cw / 2, y: H * 0.26, r: Math.max(Math.min(W, H) * 0.16, Math.min(W, H) * 0.14) });
      return arr;
    }
    function placeHome() {
      var W = host.W, H = host.H, n = babies.length, cw = W / n;
      for (var i = 0; i < n; i++) {
        babies[i].hx = cw * i + cw / 2; babies[i].hy = H * 0.74;
        if (!babies[i].matched) { babies[i].x = babies[i].hx; babies[i].y = babies[i].hy; }
      }
    }
    function babyR() { return Math.max(Math.min(host.W, host.H) * 0.12, Math.min(host.W, host.H) * 0.11); }

    host.on('down', function (p) {
      if (!babies || celebrate > 0) return;
      placeHome();
      var r = babyR();
      for (var i = babies.length - 1; i >= 0; i--) {
        var b = babies[i]; if (b.matched) continue;
        if (host.dist(p.x, p.y, b.x, b.y) < r * 1.25) {
          drag = { b: b, ox: p.x - b.x, oy: p.y - b.y };
          host.sfx('select');
          return;
        }
      }
    });
    host.on('move', function (p) { if (drag) { drag.b.x = p.x - drag.ox; drag.b.y = p.y - drag.oy; } });
    host.on('up', function (p) {
      if (!drag) return;
      var b = drag.b, ML = motherLayout();
      var hit = -1;
      for (var i = 0; i < mothers.length; i++) {
        if (host.dist(p.x, p.y, ML[i].x, ML[i].y) < ML[i].r * 1.35) { hit = i; break; }
      }
      if (hit >= 0 && mothers[hit].baby === b.emoji) {
        b.matched = true; b.x = ML[hit].x; b.y = ML[hit].y + ML[hit].r * 0.75;
        mothers[hit].wob = 0.5;
        host.sfx('coin'); host.animal(b.sound); host.sparkle(ML[hit].x, ML[hit].y, '#ec4899'); host.vibrate(15);
        var all = true;
        for (var k = 0; k < babies.length; k++) if (!babies[k].matched) all = false;
        if (all) { celebrate = 1.8; }
      } else {
        // wrong / missed → soft nope, baby returns home (no fail)
        host.sfx('nope'); b.wob = 0.5; b.x = b.hx; b.y = b.hy;
      }
      drag = null;
    });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#fce7f3'); g.addColorStop(1, '#ffe4ef');
      c.fillStyle = g; c.fillRect(0, 0, W, H);

      // divider line between mothers and babies
      c.strokeStyle = 'rgba(236,72,153,.2)'; c.lineWidth = 3;
      c.setLineDash([12, 10]); c.beginPath(); c.moveTo(W * 0.05, H * 0.5); c.lineTo(W * 0.95, H * 0.5); c.stroke();
      c.setLineDash([]);

      var ML = motherLayout();
      for (var i = 0; i < mothers.length; i++) {
        var m = mothers[i], b = ML[i];
        if (m.wob > 0) m.wob -= dt;
        var s = m.wob > 0 ? 1 + Math.sin(m.wob * 40) * 0.06 : 1;
        // soft pad under mother
        c.fillStyle = 'rgba(255,255,255,.6)'; c.beginPath(); c.arc(b.x, b.y, b.r, 0, 7); c.fill();
        c.lineWidth = 5; c.strokeStyle = '#fbcfe8'; c.stroke();
        c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = Math.round(b.r * 1.3 * s) + 'px system-ui';
        c.fillText(m.emoji, b.x, b.y);
        c.textBaseline = 'alphabetic'; c.restore();
      }

      placeHome();
      var r = babyR();
      var dragged = drag && drag.b;
      for (var j = 0; j < babies.length; j++) {
        var by = babies[j]; if (by === dragged) continue;
        drawBaby(c, by, r, dt);
      }
      if (dragged) drawBaby(c, dragged, r * 1.1, dt);

      function drawBaby(cc, by, rr, ddt) {
        if (by.wob > 0) by.wob -= ddt;
        var wx = by.wob > 0 && !by.matched ? Math.sin(by.wob * 45) * rr * 0.18 : 0;
        cc.save(); cc.textAlign = 'center'; cc.textBaseline = 'middle';
        if (by.matched) cc.globalAlpha = 0.95;
        cc.font = Math.round(rr * 1.5) + 'px system-ui';
        cc.fillText(by.emoji, by.x + wx, by.y);
        cc.globalAlpha = 1; cc.textBaseline = 'alphabetic'; cc.restore();
      }

      c.fillStyle = '#be185d'; c.textAlign = 'center';
      c.font = '900 ' + Math.round(W * 0.048) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Đoàn tụ rồi!' : '🐥 Kéo thú con về với mẹ', W / 2, H * 0.075);

      }
    });

    return {
      start: function () { reset(); host.music('happy'); },

  }
});

/* ---- 4. ANIMALS — wash the dirty animal with a sponge ------------------ */
Arcade.register({
  id: 'animal-bath', title: 'Tắm Cho Thú', emoji: '🛁', category: 'Animals', color: '#38bdf8',
  desc: 'Kéo bọt biển để tắm cho thú.', how: 'Kéo bọt biển lau sạch thú!',
  create: function (host) {
    var ANIM = [['🐶', 'dog'], ['🐱', 'cat'], ['🐷', 'pig'], ['🐮', 'cow'],
                ['🐰', 'rabbit'], ['🐻', 'bear'], ['🦊', 'fox'], ['🐵', 'monkey'],
                ['🐴', 'horse'], ['🐑', 'sheep']];
    var animal, sound, smudges, sponge, celebrate, splashT;

    function reset() {
      var a = host.choice(ANIM); animal = a[0]; sound = a[1];
      var W = host.W, H = host.H, cx = W / 2, cy = H * 0.46;
      var R = Math.min(W, H) * 0.3;

    function washAt(x, y) {
      if (celebrate > 0) return;
      var ctr = center(), sr = spongeR();
      var any = false;
      for (var i = 0; i < smudges.length; i++) {
        var s = smudges[i]; if (s.dirt <= 0) continue;
        var sx = ctr.x + s.nx, sy = ctr.y + s.ny;

      c.lineWidth = 4; c.strokeStyle = '#fbbf24'; c.stroke();

/* ---- 5. ANIMALS — tap the egg until it hatches ------------------------- */
Arcade.register({
  id: 'egg-hatch', title: 'Trứng Nở', emoji: '🥚', category: 'Animals', color: '#facc15',
  desc: 'Chạm trứng nhiều lần cho nở.', how: 'Chạm vào trứng cho nó nở!',
  create: function (host) {
    // egg-layers only, each emoji matched to a sound the engine can actually voice
    var ANIM = [['🐥', 'chick'], ['🐤', 'chick'], ['🦆', 'duck'], ['🐦', 'bird'],
                ['🦉', 'owl'], ['🐸', 'frog'], ['🐧', 'bird'], ['🐔', 'chick']];
    var taps, need, hatched, baby, sound, wob, celebrate, hatchPop;

    function reset() {
      var a = host.choice(ANIM); baby = a[0]; sound = a[1];
      taps = 0; need = host.rint(5, 7); hatched = false;
      wob = 0; celebrate = 0; hatchPop = 0;
    }

    function eggCenter() { return { x: host.W / 2, y: host.H * 0.52, r: Math.min(host.W, host.H) * 0.26 }; }

    host.on('tap', function (p) {
      if (!ANIM || celebrate > 0) return;
      var e = eggCenter();
      if (hatched) { wob = 0.4; host.sfx('giggle'); host.animal(sound); return; }
      if (host.dist(p.x, p.y, e.x, e.y) < e.r * 1.3) {
        taps++; wob = 0.5; host.sfx('boing'); host.vibrate(15);
        host.note(['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'][Math.min(taps, 6)], 0.25, 'marimba');
        if (taps >= need) {
          hatched = true; hatchPop = 1; celebrate = 2.0;
        }
      }
    });

    function drawCracks(c, e, frac) {
      // frac 0..1 → number/length of cracks
      var n = Math.floor(frac * 6);
      c.save(); c.strokeStyle = '#a16207'; c.lineWidth = Math.max(3, e.r * 0.04); c.lineCap = 'round';
      for (var i = 0; i < n; i++) {
        var a = (i / 6) * 6.28 + 0.3;
        var x0 = e.x + Math.cos(a) * e.r * 0.2, y0 = e.y - e.r * 0.1 + Math.sin(a) * e.r * 0.2;
        c.beginPath(); c.moveTo(x0, y0);
        var steps = 4, px = x0, py = y0;
        for (var k = 0; k < steps; k++) {
          px += Math.cos(a) * e.r * 0.18 + host.rand(-e.r * 0.06, e.r * 0.06);
          py += Math.sin(a) * e.r * 0.18 + host.rand(-e.r * 0.04, e.r * 0.04);
          c.lineTo(px, py);
        }
        c.stroke();
      }
      c.restore();
    }

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#fef9c3'); g.addColorStop(1, '#fef08a');
      c.fillStyle = g; c.fillRect(0, 0, W, H);

      // little nest under the egg
      var e = eggCenter();
      c.save(); c.fillStyle = '#b45309'; c.globalAlpha = 0.85;
      c.beginPath(); c.ellipse(e.x, e.y + e.r * 0.95, e.r * 1.15, e.r * 0.4, 0, 0, 7); c.fill();
      c.restore();

      if (wob > 0) wob -= dt;
      var shake = wob > 0 ? Math.sin(wob * 55) * e.r * 0.12 : 0;
      var tilt = wob > 0 ? Math.sin(wob * 55) * 0.12 : 0;

      if (!hatched) {
        // egg shell
        c.save();
        c.translate(e.x + shake, e.y); c.rotate(tilt);
        c.fillStyle = '#fffdf5';
        c.beginPath(); c.ellipse(0, 0, e.r * 0.82, e.r, 0, 0, 7); c.fill();
        c.fillStyle = 'rgba(0,0,0,.05)';
        c.beginPath(); c.ellipse(e.r * 0.2, e.r * 0.15, e.r * 0.55, e.r * 0.7, 0, 0, 7); c.fill();
        // speckles
        c.fillStyle = '#fcd34d';
        for (var s = 0; s < 6; s++) {
          var aa = s * 1.1, dr = e.r * 0.5;
          c.beginPath(); c.arc(Math.cos(aa) * dr * 0.6, Math.sin(aa) * dr, e.r * 0.07, 0, 7); c.fill();
        }
        c.restore();
        drawCracks(c, { x: e.x + shake, y: e.y, r: e.r }, taps / need);

        // gentle "tap me" pulse
        c.save(); c.globalAlpha = 0.6 + Math.sin(host.now() / 250) * 0.2;
        c.fillStyle = '#92400e'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = Math.round(e.r * 0.5) + 'px system-ui';
        c.fillText('👆', e.x, e.y - e.r * 1.35);
        c.textBaseline = 'alphabetic'; c.restore();
      } else {
        if (hatchPop > 0) hatchPop -= dt;
        var sc = 1 + Math.max(0, hatchPop) * 0.5;
        // broken shell halves
        c.save(); c.fillStyle = '#fffdf5';
        c.beginPath(); c.ellipse(e.x - e.r * 0.5, e.y + e.r * 0.7, e.r * 0.5, e.r * 0.32, -0.3, 0, 7); c.fill();
        c.beginPath(); c.ellipse(e.x + e.r * 0.5, e.y + e.r * 0.7, e.r * 0.5, e.r * 0.32, 0.3, 0, 7); c.fill();
        c.restore();
        // the baby animal
        c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = Math.round(e.r * 1.5 * sc) + 'px system-ui';
        c.fillText(baby, e.x + shake, e.y - e.r * 0.15);
        c.textBaseline = 'alphabetic'; c.restore();
      }

      c.fillStyle = '#92400e'; c.textAlign = 'center';
      c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(hatched ? '🎉 Nở rồi!' : '🥚 Chạm vào trứng!', W / 2, H * 0.1);

      if (celebrate > 0) {
        celebrate -= dt;
        if (celebrate > 1.85 && hatched) { host.animal(sound); host.say(sound, 'en-US'); host.confetti(e.x, e.y - e.r); }
        if (celebrate <= 0) reset();
      }
    });

    return {
      start: function () { reset(); host.music('sunny'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 6. NUMBERS — pop N bubbles to match the target number ------------- */
Arcade.register({
  id: 'count-pop', title: 'Chạm Đủ Số', emoji: '🔢', category: 'Numbers', color: '#f97316',
  desc: 'Chạm vỡ bong bóng đủ số.', how: 'Chạm vỡ bong bóng đủ số!',
  create: function (host) {
    var WORDS = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten'];
    var COLS = ['#ef4444', '#f97316', '#facc15', '#22c55e', '#38bdf8', '#a855f7', '#ec4899'];
    var target, popped, bubbles, spawn, celebrate;

    function round() {
      target = host.rint(2, 6); popped = 0; bubbles = []; spawn = 0; celebrate = 0;
      host.say('Pop ' + WORDS[target], 'en-US');
    }

    function newBubble() {
      var W = host.W, H = host.H;
      var r = host.rand(Math.min(W, H) * 0.08, Math.min(W, H) * 0.13);
      r = Math.max(r, Math.min(W, H) * 0.075);
      bubbles.push({
        x: host.rand(r, W - r), y: H + r, r: r,
        sp: host.rand(45, 95), wob: host.rand(0, 6.28),
        col: host.choice(COLS), pop: 0
      });
    }

    host.on('tap', function (p) {
      if (!bubbles || celebrate > 0) return;
      for (var i = bubbles.length - 1; i >= 0; i--) {
        var b = bubbles[i]; if (b.pop > 0) continue;
        if (host.dist(p.x, p.y, b.x, b.y) < b.r * 1.2) {
          b.pop = 0.3; host.sfx('pop'); host.sparkle(b.x, b.y, b.col); host.vibrate(12);
          if (popped < target) {
            popped++;
            host.note(['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'][Math.min(popped, 6)], 0.35, 'xylophone');
            host.say(WORDS[popped], 'en-US');
            if (popped === target) { celebrate = 2.0; }
          } else {
            // already reached target — extra pops are fine, just a happy blip
            host.note('C5', 0.25, 'musicbox', 0.25);
          }
          return;
        }
      }
    });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#ffedd5'); g.addColorStop(1, '#fed7aa');
      c.fillStyle = g; c.fillRect(0, 0, W, H);

      // big target numeral + counter
      c.textAlign = 'center';
      c.fillStyle = '#f97316'; c.font = '900 ' + Math.round(H * 0.18) + 'px system-ui';
      c.fillText(String(target), W / 2, H * 0.2);
      c.fillStyle = '#9a3412'; c.font = '900 ' + Math.round(W * 0.06) + 'px system-ui';
      c.fillText(popped + ' / ' + target, W / 2, H * 0.27);
      c.fillStyle = '#c2410c'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Giỏi quá!' : '🔢 Chạm đủ số bong bóng', W / 2, H * 0.075);

      // spawn bubbles (stop spawning once celebrating, but keep existing afloat)
      spawn -= dt;
      if (celebrate <= 0 && spawn <= 0 && bubbles.length < 12) {
        spawn = host.rand(0.35, 0.7); newBubble();
      }

      for (var i = bubbles.length - 1; i >= 0; i--) {
        var b = bubbles[i];
        if (b.pop > 0) {
          b.pop -= dt * 3;
          var pr = b.r * (1 + (0.3 - Math.max(0, b.pop)) * 1.5);
          c.save(); c.globalAlpha = Math.max(0, b.pop / 0.3);
          host.bubble(b.x, b.y, pr, 'rgba(255,255,255,.4)');
          c.restore();
          if (b.pop <= 0) bubbles.splice(i, 1);
          continue;
        }
        b.y -= b.sp * dt; b.wob += dt; b.x += Math.sin(b.wob) * 0.5;
        if (b.y < -b.r) { bubbles.splice(i, 1); continue; }
        host.bubble(b.x, b.y, b.r, b.col + 'cc');
        // numeral hint inside bubble (its index toward the goal is not shown — just a dot)
        c.save(); c.fillStyle = 'rgba(255,255,255,.85)'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = '900 ' + Math.round(b.r * 0.9) + 'px system-ui';
        c.fillText('•', b.x, b.y);
        c.textBaseline = 'alphabetic'; c.restore();
      }

      if (celebrate > 0) {
        celebrate -= dt;
        if (celebrate > 1.85) { host.celebrate(W / 2, H * 0.45); host.say(WORDS[target] + '!', 'en-US'); }
        if (celebrate <= 0) round();
      }
    });

    return {
      start: function () { round(); host.music('playful'); },
      stop: function () { host.music('stop'); }
    };
  }
});

</script>
<script>
/* =============================================================================
 * BÉ VUI — PART 6 · NUMBERS PACK (kids 2–6, touch-first, no-fail, audio-rich)
 * Six gentle number games. Every game is self-contained inside create(host):
 * no globals, reads W/H every frame, big hit targets, dt-based timers cleared
 * by stopLoop, reward + speech, soft 'nope' on wrong (never punishing).
 *   1. num-trace    Tô Số      ✏️  trace numerals by dragging through dots
 *   2. add-one      Thêm Một   ➕  tap + to drop apples into a basket
 *   3. dot-match    Số Và Chấm 🎲  count dots, pick the matching numeral
 *   4. number-bus   Xe Chở Số  🚌  load N passengers, bus drives off
 *   5. candle-count Thổi Nến   🎂  light N candles, blow them out
 *   6. frog-hop     Ếch Nhảy   🐸  hop frog along a lily-pad number line
 * ========================================================================== */

/* ---- 1. num-trace — TÔ SỐ — trace numerals by collecting dots ---------- */
Arcade.register({
  id: 'num-trace', title: 'Tô Số', emoji: '✏️', category: 'Numbers', color: '#a855f7',
  desc: 'Lần theo chấm để viết số.', how: 'Kéo ngón tay theo các chấm sáng!',
  create: function (host) {
    var WORDS = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten'];
    // normalized stroke dot paths (0..1) for simple digits
    var DIGITS = {
      '1': [[.5, .18], [.5, .42], [.5, .66], [.5, .84]],
      '2': [[.3, .3], [.45, .2], [.62, .28], [.55, .48], [.38, .66], [.28, .82], [.5, .82], [.72, .82]],
      '3': [[.32, .24], [.55, .2], [.62, .38], [.46, .5], [.64, .62], [.56, .8], [.32, .78]],
      '4': [[.62, .82], [.62, .55], [.62, .28], [.62, .18], [.42, .42], [.28, .58], [.5, .58], [.72, .58]],
      '7': [[.28, .22], [.5, .22], [.72, .22], [.6, .46], [.5, .66], [.42, .84]]
    };
    var keys = Object.keys(DIGITS), order = host.shuffle(keys.slice()), oi = 0;
    var digit, dots, idx, celebrate;
    function round() {
      digit = order[oi % order.length]; oi++;
      var pts = DIGITS[digit];
      dots = pts.map(function (p) { return { nx: p[0], ny: p[1], hit: false }; });
      idx = 0; celebrate = 0; host.say(WORDS[+digit], 'en-US');
    }
    function box() { var W = host.W, H = host.H, S = Math.min(W, H) * 0.7; return { x: (W - S) / 2, y: (H - S) / 2, S: S }; }
    function check(p) {
      if (celebrate > 0 || !dots || idx >= dots.length) return;
      var b = box(), d = dots[idx];
      var dx = b.x + d.nx * b.S, dy = b.y + d.ny * b.S;
      if (host.dist(p.x, p.y, dx, dy) < b.S * 0.15) {
        d.hit = true; idx++;
        host.note(['C4', 'E4', 'G4', 'C5', 'E5', 'G5', 'C6', 'E6'][Math.min(idx, 7)], 0.4, 'marimba');
        host.sparkle(dx, dy); host.vibrate(12);
        if (idx >= dots.length) {
          celebrate = 1.9; host.celebrate(host.W / 2, host.H / 2);
          host.say(WORDS[+digit], 'en-US');
        }
      }
    }
    host.on('down', check);
    host.on('move', function (p) { if (host.pointer.down) check(p); });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#f6effb');
      var b = box();
      // faint big numeral behind
      c.fillStyle = 'rgba(168,85,247,.12)'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = '900 ' + Math.round(b.S * 1.05) + 'px system-ui,sans-serif';
      c.fillText(digit, W / 2, H * 0.52);
      c.textBaseline = 'alphabetic';
      // connect hit dots
      c.strokeStyle = '#a855f7'; c.lineWidth = Math.max(8, b.S * 0.045); c.lineCap = 'round'; c.lineJoin = 'round';
      c.beginPath();
      for (var i = 0; i < dots.length; i++) {
        if (!dots[i].hit) break;
        var x = b.x + dots[i].nx * b.S, y = b.y + dots[i].ny * b.S;
        if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
      }
      c.stroke();
      // dots
      for (var j = 0; j < dots.length; j++) {
        var d = dots[j], dx = b.x + d.nx * b.S, dy = b.y + d.ny * b.S, r = b.S * 0.062;
        c.beginPath(); c.arc(dx, dy, r, 0, 7);

      N = host.rint(4, 6); pos = 0;
      targetPad = host.rint(1, N);
      hopAnim = 0; celebrate = 0; froggy = 0;
      host.say('Hop to ' + WORDS[targetPad], 'en-US');
    }
    function pads() {
      var W = host.W, H = host.H, n = N + 1;
      var pad = W * 0.04, pw = (W - pad * 2) / n;
      var r = Math.min(pw * 0.42, H * 0.1);
      r = Math.max(r, Math.min(W, H) * 0.06);
      var arr = [], y = H * 0.62;
      for (var i = 0; i < n; i++) arr.push({ x: pad + pw * i + pw / 2, y: y, r: r });
      return arr;
    }
    function hop() {
      if (celebrate > 0 || hopAnim > 0) return;
      pos++;
      if (pos > N) pos = 0; // gentle wrap
      hopAnim = 0.35; froggy = 1;
      host.sfx('boing'); host.animal('frog'); host.note(['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'][Math.min(pos, 6)], 0.4, 'xylophone');
      if (pos >= 1 && pos <= N) host.say(WORDS[pos], 'en-US'); else host.say('zero', 'en-US');
      if (pos === targetPad) {
        celebrate = 2.0;
        var L = pads(); host.celebrate(L[pos].x, L[pos].y - L[pos].r);
        host.say(WORDS[targetPad] + '!', 'en-US'); host.vibrate(30);
      }
    }
    host.on('tap', hop);
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#d9f99d'); g.addColorStop(1, '#bbf7d0');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      // pond water band
      c.fillStyle = 'rgba(56,189,248,.35)'; c.fillRect(0, H * 0.5, W, H * 0.32);
      // big target numeral
      c.textAlign = 'center'; c.fillStyle = '#4d7c0f'; c.font = '900 ' + Math.round(H * 0.13) + 'px system-ui,sans-serif';
      c.fillText('⭐ ' + targetPad, W / 2, H * 0.2);
      c.fillStyle = '#4d7c0f'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui,sans-serif';
      c.fillText(celebrate > 0 ? '🎉 Tới nơi rồi!' : '🐸 Chạm để ếch nhảy', W / 2, H * 0.08);
      var L = pads();
      // lily pads + numerals
      for (var i = 0; i < L.length; i++) {
        var p = L[i];
        c.beginPath(); c.arc(p.x, p.y, p.r, 0, 7);
        c.fillStyle = (i === targetPad) ? '#86efac' : '#4ade80'; c.fill();
        c.lineWidth = 4; c.strokeStyle = '#15803d'; c.stroke();
        // notch
        c.fillStyle = (i === targetPad) ? '#86efac' : '#4ade80';
        // numeral
        c.fillStyle = '#14532d'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = '900 ' + Math.round(p.r * 0.9) + 'px system-ui,sans-serif';
        c.fillText('' + i, p.x, p.y);
        if (i === targetPad) {
          c.font = Math.round(p.r * 0.7) + 'px system-ui';
          c.fillText('⭐', p.x, p.y - p.r * 1.4);
        }
        c.textBaseline = 'alphabetic';
      }
      // frog (interpolate hop arc between prev and current pad)
      if (hopAnim > 0) hopAnim -= dt; if (froggy > 0) froggy -= dt * 2;
      var fp = L[pos];
      var arc = hopAnim > 0 ? Math.sin((1 - hopAnim / 0.35) * Math.PI) * fp.r * 1.6 : 0;
      var fy = fp.y - fp.r * 0.5 - arc;
      var fsize = fp.r * 1.5 * (1 + Math.max(0, froggy) * 0.15);
      c.font = Math.round(fsize) + 'px system-ui'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('🐸', fp.x, fy); c.textBaseline = 'alphabetic';
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) round(); }
    });
    return {
      start: function () { round(); host.music('jungle'); },
      stop: function () { host.stopLoop(); host.music('stop'); }
    };
  }
});
