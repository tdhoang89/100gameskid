<script>
/* =============================================================================
 * BÉ VUI — PART 7  (Numbers + Letters fan-out)
 * 6 games: more-less, number-order, fish-numbers, share-plates, tap-letter,
 *          letter-pop.  No globals; everything inside create(host). No-fail,
 *          gentle, big targets, speech for pre-readers, dt-based timers.
 * ========================================================================== */

/* ---- 1. NUMBERS — more / less: tap the correct plate ------------------- */
Arcade.register({
  id: 'more-less', title: 'Nhiều Hơn', emoji: '🍪', category: 'Numbers', color: '#f59e0b',
  desc: 'Chạm đĩa nhiều hơn (hoặc ít hơn).', how: 'Chạm đĩa đúng theo yêu cầu!',
  create: function (host) {
    var WORDS = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten'];
    var plates, wantMore, celebrate;
    function round() {
      var a = host.rint(1, 6), b = host.rint(1, 6);
      while (b === a) b = host.rint(1, 6);
      plates = [
        { n: a, wob: 0, glow: 0, seeds: makeSeeds(a) },
        { n: b, wob: 0, glow: 0, seeds: makeSeeds(b) }
      ];
      wantMore = host.rand() < 0.5;
      celebrate = 0;
      host.say(wantMore ? 'more' : 'less', 'en-US');
    }
    function makeSeeds(n) {
      var arr = [];
      for (var i = 0; i < n; i++) arr.push({ ox: host.rand(-1, 1), oy: host.rand(-1, 1) });
      return arr;
    }
    function plateLayout() {
      var W = host.W, H = host.H;
      var r = Math.min(W * 0.21, H * 0.24);
      r = Math.max(r, Math.min(W, H) * 0.16);
      return [
        { x: W * 0.28, y: H * 0.6, r: r },
        { x: W * 0.72, y: H * 0.6, r: r }
      ];
    }
    host.on('tap', function (p) {
      if (!plates || celebrate > 0) return;
      var L = plateLayout();
      for (var i = 0; i < plates.length; i++) {
        if (host.dist(p.x, p.y, L[i].x, L[i].y) < L[i].r * 1.15) {
          var correct = wantMore ? (plates[i].n > plates[1 - i].n) : (plates[i].n < plates[1 - i].n);
          if (correct) {
            plates[i].glow = 1; celebrate = 1.6;
            host.confetti(L[i].x, L[i].y); host.sfx('yay'); host.vibrate(30);
            host.say(wantMore ? 'more' : 'less', 'en-US');
          } else {
            plates[i].wob = 0.6; host.sfx('nope'); host.vibrate(12);
            host.say(wantMore ? 'more' : 'less', 'en-US');
          }
          return;
        }
      }
    });
    function drawPlate(c, x, y, r, pl, dt) {
      if (pl.wob > 0) { pl.wob -= dt; x += Math.sin(pl.wob * 42) * r * 0.12; }
      if (pl.glow > 0) pl.glow -= dt * 0.7;
      // plate
      c.save();
      if (pl.glow > 0) { c.shadowColor = '#fcd34d'; c.shadowBlur = 30 + pl.glow * 30; }
      c.fillStyle = '#fff7ed'; c.beginPath(); c.ellipse(x, y, r, r * 0.62, 0, 0, 7); c.fill();
      c.shadowBlur = 0;
      c.lineWidth = Math.max(6, r * 0.06); c.strokeStyle = '#fbbf24'; c.stroke();
      c.fillStyle = '#fed7aa'; c.beginPath(); c.ellipse(x, y, r * 0.74, r * 0.46, 0, 0, 7); c.fill();
      c.restore();
      // cookies
      var cr = host.clamp(r * 0.2, 8, r * 0.28);
      for (var i = 0; i < pl.seeds.length; i++) {
        var ang = (i / Math.max(1, pl.seeds.length)) * Math.PI * 2;
        var rad = pl.seeds.length === 1 ? 0 : r * 0.4;
        var cx = x + Math.cos(ang) * rad + pl.seeds[i].ox * cr * 0.4;
        var cy = y + Math.sin(ang) * rad * 0.6 + pl.seeds[i].oy * cr * 0.4;
        c.font = Math.round(cr * 2.0) + 'px system-ui';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText('🍪', cx, cy);
      }
      c.textBaseline = 'alphabetic';
    }
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#fff7e6'); g.addColorStop(1, '#ffedd5');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      if (!plates) return;
      // prompt: big icon (up arrow stack vs down) + speaker
      c.textAlign = 'center';
      c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillStyle = '#b45309';
      c.fillText('🔊  ' + (wantMore ? 'Nhiều hơn? ⬆️' : 'Ít hơn? ⬇️'), W / 2, H * 0.13);
      // big visual hint emoji
      c.font = Math.round(H * 0.1) + 'px system-ui';
      c.textBaseline = 'middle';
      c.fillText(wantMore ? '🍪🍪🍪' : '🍪', W / 2, H * 0.27);
      c.textBaseline = 'alphabetic';
      var L = plateLayout();
      for (var i = 0; i < plates.length; i++) drawPlate(c, L[i].x, L[i].y, L[i].r, plates[i], dt);
      if (celebrate > 0) {
        c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.06) + 'px system-ui'; c.fillStyle = '#d97706';
        c.fillText('🎉 Giỏi quá!', W / 2, H * 0.93);
        celebrate -= dt; if (celebrate <= 0) round();
      }
    });
    return {
      start: function () { round(); host.music('happy'); },
      stop: function () { plates = null; }
    };
  }
});

/* ---- 2. NUMBERS — tap stepping stones in order 1..5 -------------------- */
Arcade.register({
  id: 'number-order', title: 'Đếm Thứ Tự', emoji: '🔟', category: 'Numbers', color: '#3b82f6',
  desc: 'Chạm các số theo thứ tự 1→5.', how: 'Chạm 1, 2, 3, 4, 5 đúng thứ tự!',
  create: function (host) {
    var WORDS = ['zero', 'one', 'two', 'three', 'four', 'five'];
    var COLS = ['#ef4444', '#f97316', '#22c55e', '#3b82f6', '#a855f7'];
    var stones, nextN, celebrate;
    function round() {
      var positions = scatter(5);
      stones = [];
      for (var i = 0; i < 5; i++) {
        stones.push({ n: i + 1, nx: positions[i].nx, ny: positions[i].ny, lit: false, wob: 0, pop: 0 });
      }
      nextN = 1; celebrate = 0;
    }
    function scatter(n) {
      // grid-ish jittered positions in normalized 0..1 space, shuffled per number
      var slots = [], cols = 3, rows = 2;
      for (var r = 0; r < rows; r++) for (var cc = 0; cc < cols; cc++) {
        slots.push({ nx: (cc + 0.5) / cols, ny: 0.32 + (r + 0.5) / rows * 0.5 });
      }
      host.shuffle(slots);
      var out = [];
      for (var i = 0; i < n; i++) {
        out.push({ nx: host.clamp(slots[i].nx + host.rand(-0.06, 0.06), 0.12, 0.88),
                   ny: host.clamp(slots[i].ny + host.rand(-0.05, 0.05), 0.28, 0.86) });
      }
      return out;
    }
    function radius() { return Math.max(Math.min(host.W, host.H) * 0.13, 40); }
    function pos(s) { return { x: s.nx * host.W, y: s.ny * host.H }; }
    host.on('tap', function (p) {
      if (!stones || celebrate > 0) return;
      var r = radius();
      for (var i = 0; i < stones.length; i++) {
        var s = stones[i]; if (s.lit) continue;
        var pp = pos(s);
        if (host.dist(p.x, p.y, pp.x, pp.y) < r * 1.2) {
          if (s.n === nextN) {
            s.lit = true; s.pop = 0.5;
            host.note(['C4', 'D4', 'E4', 'F4', 'G4', 'A4'][s.n], 0.45, 'xylophone');
            host.say(WORDS[s.n], 'en-US'); host.sparkle(pp.x, pp.y, COLS[i % COLS.length]);
            nextN++;
            if (nextN > 5) {
              celebrate = 1.9; host.celebrate(host.W / 2, host.H * 0.4); host.say('five', 'en-US');
            }
          } else {
            s.wob = 0.6; host.sfx('nope'); host.vibrate(12);
          }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#dbeafe'); g.addColorStop(1, '#eff6ff');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      if (!stones) return;
      c.textAlign = 'center'; c.fillStyle = '#1d4ed8'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('🔊  Chạm số tiếp theo: ' + (nextN <= 5 ? nextN : '✓'), W / 2, H * 0.13);
      var r = radius();
      for (var i = 0; i < stones.length; i++) {
        var s = stones[i], pp = pos(s), x = pp.x, y = pp.y, rr = r;
        if (s.wob > 0) { s.wob -= dt; x += Math.sin(s.wob * 42) * rr * 0.14; }
        if (s.pop > 0) { s.pop -= dt; rr = r * (1 + s.pop * 0.25); }
        // stone / balloon
        c.save();
        if (s.lit) { c.shadowColor = COLS[i % COLS.length]; c.shadowBlur = 24; }
        c.beginPath(); c.arc(x, y, rr, 0, 7);
        c.fillStyle = s.lit ? COLS[i % COLS.length] : '#ffffff'; c.fill();
        c.shadowBlur = 0;
        c.lineWidth = Math.max(5, rr * 0.07); c.strokeStyle = s.lit ? '#ffffff' : COLS[i % COLS.length]; c.stroke();
        c.restore();
        // highlight
        c.fillStyle = 'rgba(255,255,255,.4)'; c.beginPath(); c.arc(x - rr * 0.3, y - rr * 0.32, rr * 0.24, 0, 7); c.fill();
        // numeral
        c.fillStyle = s.lit ? '#ffffff' : '#334155';
        c.font = '900 ' + Math.round(rr * 1.05) + 'px system-ui';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText(String(s.n), x, y);
        c.textBaseline = 'alphabetic';
      }
      if (celebrate > 0) {
        c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.06) + 'px system-ui'; c.fillStyle = '#2563eb';
        c.fillText('🎉 Tuyệt vời!', W / 2, H * 0.94);
        celebrate -= dt; if (celebrate <= 0) round();
      }
    });
    return {
      start: function () { round(); host.music('playful'); },
      stop: function () { stones = null; }
    };
  }
});

/* ---- 3. NUMBERS — catch the fish with the target number --------------- */
Arcade.register({
  id: 'fish-numbers', title: 'Câu Số', emoji: '🎣', category: 'Numbers', color: '#38bdf8',
  desc: 'Chạm con cá mang đúng số.', how: 'Chạm con cá có số được gọi!',
  create: function (host) {
    var WORDS = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
    var COLS = ['#ef4444', '#f97316', '#facc15', '#22c55e', '#14b8a6', '#3b82f6', '#a855f7', '#ec4899'];
    var fish, target, celebrate;
    function round() {
      var count = host.rint(4, 5);
      var nums = host.shuffle([1, 2, 3, 4, 5, 6].slice()).slice(0, count);
      target = host.choice(nums);
      fish = [];
      for (var i = 0; i < count; i++) {
        var dir = host.rand() < 0.5 ? 1 : -1;
        fish.push({
          n: nums[i],
          x: dir > 0 ? -host.W * 0.1 - i * host.W * 0.12 : host.W * 1.1 + i * host.W * 0.12,
          ny: host.rand(0.32, 0.82),
          dir: dir,
          sp: host.rand(0.05, 0.11),
          bob: host.rand(0, 6.28),
          col: COLS[i % COLS.length],
          wob: 0, caught: 0
        });
      }
      celebrate = 0;
      host.say('Catch ' + WORDS[target], 'en-US');
    }
    function fr() { return Math.max(Math.min(host.W, host.H) * 0.11, 34); }
    host.on('tap', function (p) {
      if (!fish || celebrate > 0) return;
      var r = fr();
      for (var i = 0; i < fish.length; i++) {
        var f = fish[i]; if (f.caught > 0) continue;
        var x = f.x, y = f.ny * host.H + Math.sin(f.bob) * 8;
        if (host.dist(p.x, p.y, x, y) < r * 1.25) {
          if (f.n === target) {
            f.caught = 1; celebrate = 1.7;
            host.sfx('splash'); host.confetti(x, y); host.vibrate(30);
            host.say(WORDS[target], 'en-US');
          } else {
            f.wob = 0.6; host.sfx('nope'); host.vibrate(12);
            host.say('Catch ' + WORDS[target], 'en-US');
          }
          return;
        }
      }
    });
    function drawFish(c, f, r, dt) {
      var x = f.x, y = f.ny * host.H + Math.sin(f.bob) * 8;
      if (f.wob > 0) { f.wob -= dt; y += Math.sin(f.wob * 40) * r * 0.18; }
      var a = 1;
      if (f.caught > 0) { a = host.clamp(1 - (1 - f.caught), 0, 1); }
      c.save(); c.globalAlpha = a;
      c.translate(x, y); c.scale(f.dir, 1);
      // body
      c.fillStyle = f.col; c.beginPath(); c.ellipse(0, 0, r, r * 0.72, 0, 0, 7); c.fill();
      // tail
      c.beginPath(); c.moveTo(-r * 0.85, 0); c.lineTo(-r * 1.5, -r * 0.55); c.lineTo(-r * 1.5, r * 0.55); c.closePath(); c.fill();
      // eye
      c.fillStyle = '#fff'; c.beginPath(); c.arc(r * 0.45, -r * 0.2, r * 0.2, 0, 7); c.fill();
      c.fillStyle = '#1f2937'; c.beginPath(); c.arc(r * 0.5, -r * 0.2, r * 0.1, 0, 7); c.fill();
      c.restore();
      // numeral (unflipped, upright)
      c.save(); c.globalAlpha = a;
      c.fillStyle = '#ffffff'; c.font = '900 ' + Math.round(r * 0.85) + 'px system-ui';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(String(f.n), x, y);
      c.textBaseline = 'alphabetic'; c.restore();
    }
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#bae6fd'); g.addColorStop(1, '#38bdf8');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      if (!fish) return;
      // gentle water ripples
      c.strokeStyle = 'rgba(255,255,255,.25)'; c.lineWidth = 3;
      for (var w = 0; w < 3; w++) {
        c.beginPath();
        var yy = H * (0.4 + w * 0.18);
        for (var xx = 0; xx <= W; xx += 20) c.lineTo(xx, yy + Math.sin(xx / 60 + host.now() / 700 + w) * 6);
        c.stroke();
      }
      // prompt: target numeral big
      c.textAlign = 'center';
      c.fillStyle = '#0369a1'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('🔊  Câu số:', W / 2, H * 0.1);
      c.fillStyle = '#ffffff';
      c.font = '900 ' + Math.round(H * 0.16) + 'px system-ui';
      c.save(); c.shadowColor = 'rgba(3,105,161,.5)'; c.shadowBlur = 12;
      c.fillText(String(target), W / 2, H * 0.26); c.restore();
      var r = fr();
      for (var i = 0; i < fish.length; i++) {
        var f = fish[i];
        f.bob += dt * 2;
        if (f.caught > 0) { f.caught -= dt; }
        else {
          f.x += f.dir * f.sp * W * dt * 4;
          // wrap around gently
          if (f.dir > 0 && f.x > W + r * 2) f.x = -r * 2;
          if (f.dir < 0 && f.x < -r * 2) f.x = W + r * 2;
        }
        drawFish(c, f, r, dt);
      }
      if (celebrate > 0) {
        c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.06) + 'px system-ui'; c.fillStyle = '#ffffff';
        c.fillText('🎉 Bắt được rồi!', W / 2, H * 0.93);
        celebrate -= dt; if (celebrate <= 0) round();
      }
    });
    return {
      start: function () { round(); host.music('ocean'); },
      stop: function () { fish = null; }
    };
  }
});

/* ---- 4. NUMBERS — share slices equally onto two plates ---------------- */
Arcade.register({
  id: 'share-plates', title: 'Chia Đều', emoji: '🍕', category: 'Numbers', color: '#ef4444',
  desc: 'Kéo bánh chia đều cho hai đĩa.', how: 'Kéo bánh vào hai đĩa cho bằng nhau!',
  create: function (host) {
    var WORDS = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight'];
    var pile, plates, drag, celebrate, didSame;
    function round() {
      var total = host.rint(2, 3) * 2; // 4 or 6 — always even so it can be split equally
      pile = [];
      for (var i = 0; i < total; i++) {
        pile.push({ id: i, place: 'pile', plate: -1, x: 0, y: 0, ox: host.rand(-1, 1), oy: host.rand(-1, 1), wob: 0 });
      }
      plates = [{ items: [] }, { items: [] }];
      drag = null; celebrate = 0; didSame = false;
    }
    function isz() { return Math.max(Math.min(host.W, host.H) * 0.09, 26); }
    function pilePos(item, idx, n) {
      var W = host.W, H = host.H;
      var cols = Math.min(n, 4);
      var cw = W * 0.7 / Math.max(1, cols);
      var col = idx % cols, row = (idx / cols) | 0;
      return { x: W * 0.15 + cw * (col + 0.5), y: H * 0.2 + row * isz() * 1.6 };
    }
    function plateRect(i) {
      var W = host.W, H = host.H;
      var pw = W * 0.42, ph = H * 0.34;
      var x = i === 0 ? W * 0.04 : W * 0.54;
      return { x: x, y: H * 0.52, w: pw, h: ph };
    }
    function platePos(i, idx, n) {
      var R = plateRect(i);

  create: function (host) {

<script>

/* ---- 1. LETTERS — ABC train: tap cars in order ------------------------- */
Arcade.register({
  id: 'abc-train', title: 'Tàu ABC', emoji: '🚂', category: 'Letters', color: '#f97316',
  desc: 'Chạm các toa theo thứ tự ABC.', how: 'Chạm các toa theo đúng A B C!',
  create: function (host) {
    var ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    var CARCOLS = ['#ef4444', '#f97316', '#facc15', '#22c55e', '#3b82f6'];
    var setStart, cars, next, depart, celebrate, chug;
    function buildSet() {
      cars = [];
      for (var i = 0; i < 5; i++) {
        var ch = ALPHABET.charAt((setStart + i) % 26);
        cars.push({ ch: ch, lit: false, wob: 0, pop: 0 });
      }
      next = 0; depart = 0; celebrate = 0; chug = 0;
    }
    function reset() { setStart = 0; buildSet(); }
    function layout() {
      var W = host.W, H = host.H, n = cars.length;

    host.on('tap', function (p) {
      if (!cars || celebrate > 0 || depart > 0) return;
      var L = layout(), off = depart * host.W * 1.6;
      for (var i = 0; i < cars.length; i++) {
        var b = L[i];
        if (p.x > b.x - off && p.x < b.x + b.w - off && p.y > b.y && p.y < b.y + b.h) {
          if (cars[i].lit) { host.sfx('pop'); host.say(cars[i].ch, 'en-US'); return; }
          if (i === next) {
            cars[i].lit = true; cars[i].pop = 1; next++;
            host.sfx('boing'); host.note('C5', 0.3, 'piano'); host.say(cars[i].ch, 'en-US');
            host.sparkle(b.x + b.w / 2, b.y + b.h / 2, CARCOLS[i % CARCOLS.length]); host.vibrate(20);
            if (next >= cars.length) {
              celebrate = 1.4; host.sfx('whee');

            cars[i].wob = 0.6; host.sfx('nope');

          return;
        }

    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;

      c.fillStyle = g; c.fillRect(0, 0, W, H);
      // ground / track
      c.strokeStyle = '#c79a6a'; c.lineWidth = Math.max(5, H * 0.012);
      var ty = H * 0.5 + Math.min(W, H) * 0.22;
      c.beginPath(); c.moveTo(0, ty); c.lineTo(W, ty); c.stroke();

      c.fillStyle = '#9a5a1e'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui,sans-serif';
      c.fillText(celebrate > 0 ? '🎉 Tàu chạy rồi!' : '🚂 Chạm A → B → C …', W / 2, H * 0.12);

      var L = layout();
      var off = depart > 0 ? (1 - depart) * (W * 1.7) : 0; // slides left then off-screen as depart->0? handled below

      for (var i = 0; i < cars.length; i++) {

        c.fillStyle = car.lit ? CARCOLS[i % CARCOLS.length] : '#e7d3bc'; c.fill();
        c.lineWidth = Math.max(4, b.w * 0.04); c.strokeStyle = '#fff'; c.stroke();
        // wheels
        c.fillStyle = '#5b4636';
        var wr = b.w * 0.13;
        c.beginPath(); c.arc(x + b.w * 0.27, b.y + b.h + wr * 0.4, wr, 0, 7); c.fill();
        c.beginPath(); c.arc(x + b.w * 0.73, b.y + b.h + wr * 0.4, wr, 0, 7); c.fill();
        // letter
        c.fillStyle = car.lit ? '#ffffff' : '#b69a7c';
        c.font = '900 ' + Math.round(b.h * 0.55) + 'px system-ui,sans-serif';
        c.fillText(car.ch, x + b.w / 2, b.y + b.h / 2);

  }
});

/* ---- 2. LETTERS — first letter of object ------------------------------- */
Arcade.register({
  id: 'letter-object', title: 'Chữ Đầu', emoji: '🍎', category: 'Letters', color: '#22c55e',

        var b = L[i];
        if (p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h) {
          if (tiles[i].lit) { host.sfx('pop'); return; }
          if (tiles[i].ch === target) {
            tiles[i].lit = true; tiles[i].pop = 1; found++;
            host.sfx('coin'); host.note('G5', 0.35, 'marimba'); host.say(target, 'en-US');
            host.sparkle(b.x + b.w / 2, b.y + b.h / 2, tiles[i].col); host.vibrate(18);
            if (found >= total) {
              celebrate = 1.8; host.celebrate(host.W / 2, host.H * 0.3); host.say('Great!', 'en-US');
            }
          } else {
            tiles[i].wob = 0.6; host.sfx('nope');
          }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#e6fbf7');
      c.textAlign = 'center'; c.textBaseline = 'middle';
      // target banner
      var ts = Math.min(W, H) * 0.16;
      c.save(); host.rr(W / 2 - ts / 2, H * 0.04, ts, ts, ts * 0.2);
      c.fillStyle = '#14b8a6'; c.fill(); c.lineWidth = Math.max(5, ts * 0.05); c.strokeStyle = '#fff'; c.stroke(); c.restore();
      c.fillStyle = '#ffffff'; c.font = '900 ' + Math.round(ts * 0.6) + 'px system-ui,sans-serif';
      c.fillText(target, W / 2, H * 0.04 + ts / 2);
      c.fillStyle = '#0f766e'; c.font = '900 ' + Math.round(W * 0.04) + 'px system-ui,sans-serif';
      c.fillText(celebrate > 0 ? '🎉 Giỏi quá!' : '🔊 Tìm chữ ' + target + ' · ' + found + '/' + total, W / 2, H * 0.19);

      var L = grid();
      for (var i = 0; i < tiles.length; i++) {
        var t = tiles[i], b = L[i];
        var x = b.x, y = b.y;
        if (t.wob > 0) { t.wob -= dt; x += Math.sin(t.wob * 40) * b.w * 0.1; }
        var pop = 1; if (t.pop > 0) { t.pop -= dt * 2; pop = 1 + Math.max(0, t.pop) * 0.2; }
        var cx = x + b.w / 2, cy = y + b.h / 2;
        c.save(); c.translate(cx, cy); c.scale(pop, pop); c.translate(-cx, -cy);
        host.rr(x, y, b.w, b.h, b.h * 0.18);
        c.fillStyle = t.lit ? '#14b8a6' : t.col; c.fill();
        c.lineWidth = Math.max(4, b.w * 0.04); c.strokeStyle = '#fff'; c.stroke();
        if (t.lit) {
          // checkmark glow ring
          c.lineWidth = Math.max(4, b.w * 0.06); c.strokeStyle = '#fde047';
          host.rr(x + 3, y + 3, b.w - 6, b.h - 6, b.h * 0.16); c.stroke();
        }
        c.fillStyle = '#ffffff'; c.font = '900 ' + Math.round(b.h * 0.5) + 'px system-ui,sans-serif';
        c.fillText(t.ch, cx, cy);
        c.restore();
      }
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) round(); }
    });
    return { start: function () { round(); host.music('sunny'); }, stop: function () {} };
  }
});

</script>
<script>
/* =============================================================================
 * BÉ VUI — PART 9  (Letters + Music wave)
 * 1. match-case   — Chữ Hoa Chữ Thường   🔠  Letters  #14b8a6
 * 2. drum-pads    — Trống                 🥁  Music    #ef4444
 * 3. animal-band  — Ban Nhạc Thú          🎺  Music    #f59e0b
 * 4. copy-tune    — Lặp Lại               🎵  Music    #3b82f6
 * 5. piano-keys   — Đàn Piano             🎹  Music    #a855f7
 * 6. pitch-slider — Kéo Cao Thấp          🎚️  Music    #ec4899
 * No-fail · big targets · audio-rich · everything inside create() · W/H every frame.
 * ========================================================================== */

/* ---- 1. LETTERS — match uppercase with lowercase (drag) ---------------- */
Arcade.register({
  id: 'match-case', title: 'Chữ Hoa Chữ Thường', emoji: '🔠', category: 'Letters', color: '#14b8a6',
  desc: 'Kéo chữ thường vào chữ hoa.', how: 'Kéo chữ thường tới chữ hoa giống nó!',
  create: function (host) {
    var POOL = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'M', 'N', 'O', 'P', 'R', 'S', 'T'];
    var tops, bottoms, drag, celebrate;
    function round() {
      var pick = host.shuffle(POOL.slice()).slice(0, 3);
      tops = pick.map(function (ch) { return { up: ch, lo: ch.toLowerCase(), col: host.choice(host.PAL), filled: false, wob: 0 }; });
      var order = host.shuffle(pick.slice());
      // guard: avoid identical order so it reads as shuffled
      if (order.length === pick.length && order.join('') === pick.join('')) order.reverse();
      bottoms = order.map(function (ch) { return { up: ch, lo: ch.toLowerCase(), col: host.choice(host.PAL), home: { x: 0, y: 0 }, x: 0, y: 0, wob: 0, gone: false }; });
      drag = null; celebrate = 0;
      host.say('Match the letters', 'en-US');
    }
    function topLayout() {
      var W = host.W, H = host.H, n = tops.length;
      var s = Math.min(W / (n + 0.5), H * 0.3);
      s = Math.max(s, Math.min(W, H) * 0.16);
      var gap = (W - s * n) / (n + 1), arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: gap + s / 2 + i * (s + gap), y: H * 0.26, s: s });
      return arr;
    }
    function botLayout() {
      var W = host.W, H = host.H, n = bottoms.length;
      var s = Math.min(W / (n + 0.5), H * 0.3);
      s = Math.max(s, Math.min(W, H) * 0.16);
      var gap = (W - s * n) / (n + 1), arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: gap + s / 2 + i * (s + gap), y: H * 0.72, s: s });
      return arr;
    }
    function syncHomes() {
      var L = botLayout();
      for (var i = 0; i < bottoms.length; i++) {
        bottoms[i].home = { x: L[i].x, y: L[i].y };
        if (!drag || drag.idx !== i) {
          if (!bottoms[i]._placed) { bottoms[i].x = L[i].x; bottoms[i].y = L[i].y; }
        }
      }
    }
    function tileSize() { return Math.min(host.W, host.H) * 0.18; }
    host.on('down', function (p) {
      if (celebrate > 0) return;
      syncHomes();
      var sz = tileSize();
      for (var i = 0; i < bottoms.length; i++) {
        var b = bottoms[i];
        if (b.gone) continue;
        if (host.dist(p.x, p.y, b.x, b.y) < sz) {
          drag = { idx: i, dx: p.x - b.x, dy: p.y - b.y };
          host.sfx('select');
          return;
        }
      }
    });
    host.on('move', function (p) {
      if (drag) { var b = bottoms[drag.idx]; b.x = p.x - drag.dx; b.y = p.y - drag.dy; }
    });
    host.on('up', function (p) {
      if (!drag) return;
      var b = bottoms[drag.idx], TL = topLayout();
      var matched = false;
      for (var i = 0; i < tops.length; i++) {
        if (tops[i].filled) continue;
        if (host.dist(b.x, b.y, TL[i].x, TL[i].y) < TL[i].s * 0.95 && tops[i].up === b.up) {
          tops[i].filled = true; b.gone = true; matched = true;
          host.sfx('ding'); host.say(b.up, 'en-US'); host.sparkle(TL[i].x, TL[i].y, tops[i].col); host.vibrate(20);
          var allDone = true;
          for (var k = 0; k < tops.length; k++) if (!tops[k].filled) allDone = false;
          if (allDone) { celebrate = 1.8; host.celebrate(host.W / 2, host.H * 0.45); host.say('Great!', 'en-US'); }
          break;
        }
      }
      if (!matched) { b.wob = 0.5; b._placed = false; host.sfx('nope'); }
      drag = null;
    });
    function letterTile(c, x, y, s, txt, col, alpha) {
      c.save(); c.globalAlpha = alpha == null ? 1 : alpha;
      host.rr(x - s / 2, y - s / 2, s, s, s * 0.22); c.fillStyle = col; c.fill();
      c.lineWidth = Math.max(4, s * 0.05); c.strokeStyle = '#ffffff'; c.stroke();
      c.fillStyle = '#ffffff'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = '900 ' + Math.round(s * 0.6) + 'px system-ui,sans-serif';
      c.fillText(txt, x, y + s * 0.02);
      c.textBaseline = 'alphabetic'; c.restore();
    }
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#cffafe'); g.addColorStop(1, '#fff7ed'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      c.fillStyle = '#0d9488'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Giỏi quá!' : '🔠 Kéo chữ thường lên chữ hoa', W / 2, H * 0.09);
      syncHomes();
      var TL = topLayout();
      for (var i = 0; i < tops.length; i++) {
        var t = tops[i], x = TL[i].x, y = TL[i].y, s = TL[i].s;
        if (t.wob > 0) { t.wob -= dt; x += Math.sin(t.wob * 40) * s * 0.08; }
        // empty slot look vs filled
        c.save();
        host.rr(x - s / 2, y - s / 2, s, s, s * 0.22);
        c.setLineDash(t.filled ? [] : [10, 8]); c.lineWidth = Math.max(4, s * 0.05);
        c.strokeStyle = t.filled ? t.col : 'rgba(13,148,136,.4)'; c.stroke(); c.setLineDash([]);
        c.restore();
        c.fillStyle = t.filled ? t.col : 'rgba(13,148,136,.85)'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = '900 ' + Math.round(s * 0.6) + 'px system-ui,sans-serif';
        c.fillText(t.up, x, y + s * 0.02); c.textBaseline = 'alphabetic';
        if (t.filled) {
          c.save(); c.globalAlpha = 0.5;
          c.fillStyle = '#ffffff'; c.font = '900 ' + Math.round(s * 0.36) + 'px system-ui';
          c.textAlign = 'right'; c.textBaseline = 'bottom';
          c.fillText(t.lo, x + s / 2 - 6, y + s / 2 - 4); c.textBaseline = 'alphabetic'; c.restore();
        }
      }
      var ds = tileSize();
      for (var j = 0; j < bottoms.length; j++) {
        var b = bottoms[j]; if (b.gone) continue;
        var bx = b.x, by = b.y, sc = 1;
        if (drag && drag.idx === j) sc = 1.12;
        if (b.wob > 0) { b.wob -= dt; bx += Math.sin(b.wob * 40) * ds * 0.1; if (b.wob <= 0) { b.x = b.home.x; b.y = b.home.y; } }
        letterTile(c, bx, by, ds * sc, b.lo, b.col, 1);
      }
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) round(); }
    });
    return { start: function () { round(); host.music('happy'); } };
  }
});

/* ---- 2. MUSIC — drum pads -------------------------------------------- */
Arcade.register({
  id: 'drum-pads', title: 'Trống', emoji: '🥁', category: 'Music', color: '#ef4444',
  desc: 'Chạm trống để chơi nhịp.', how: 'Chạm các mặt trống!',
  create: function (host) {
    var PADS = [
      { sfx: 'hit',    col: '#ef4444', emoji: '🥁' },
      { sfx: 'pop',    col: '#f59e0b', emoji: '🪘' },
      { sfx: 'boing',  col: '#22c55e', emoji: '🔔' },
      { sfx: 'whoosh', col: '#3b82f6', emoji: '🎷' },
      { sfx: 'splash', col: '#a855f7', emoji: '💥' },
      { sfx: 'pop',    col: '#ec4899', emoji: '🎵' }
    ];
    var pads, beat, beatT, beatI;
    function reset() {
      pads = PADS.map(function (p) { return { sfx: p.sfx, col: p.col, emoji: p.emoji, flash: 0, ripple: -1 }; });
      beat = false; beatT = 0; beatI = 0;
    }
    function gridRect() {
      var W = host.W, H = host.H;
      var cols = (W > H) ? 3 : 2, rows = Math.ceil(pads.length / cols);
      var pad = Math.min(W, H) * 0.035;
      var top = H * 0.16, areaH = H * 0.7;
      var cw = (W - pad * (cols + 1)) / cols, ch = (areaH - pad * (rows + 1)) / rows;
      var arr = [];
      for (var i = 0; i < pads.length; i++) {
        arr.push({ x: pad + (i % cols) * (cw + pad), y: top + pad + ((i / cols) | 0) * (ch + pad), w: cw, h: ch });
      }
      return arr;
    }
    function beatBtn() { var W = host.W, H = host.H; var bw = Math.min(W * 0.5, H * 0.18); return { x: W / 2 - bw / 2, y: H * 0.875, w: bw, h: H * 0.1 }; }
    function strike(i, L) {
      var p = pads[i]; p.flash = 0.32; p.ripple = 0;
      host.sfx(p.sfx); host.vibrate(15);
    }
    var PATTERN = [0, 1, 2, 1, 3, 1, 0, 4];
    host.on('down', function (pt) {
      var L = gridRect();
      for (var i = 0; i < pads.length; i++) {
        var b = L[i];
        if (pt.x > b.x && pt.x < b.x + b.w && pt.y > b.y && pt.y < b.y + b.h) { strike(i, L); return; }
      }
      var bb = beatBtn();
      if (pt.x > bb.x && pt.x < bb.x + bb.w && pt.y > bb.y - 10 && pt.y < bb.y + bb.h + 10) {
        beat = !beat; beatI = 0; beatT = 0; host.sfx(beat ? 'select' : 'pop');
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#1f1430');
      // subtle gradient stage
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#2a1b40'); g.addColorStop(1, '#150d22'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      c.fillStyle = '#ffe4e6'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText('🥁 Chạm trống · nút dưới = nhịp tự động', W / 2, H * 0.1);
      var L = gridRect();
      // auto beat
      if (beat) { beatT -= dt; if (beatT <= 0) { var idx = PATTERN[beatI % PATTERN.length]; if (idx < pads.length) strike(idx, L); beatI++; beatT = 0.34; } }
      for (var i = 0; i < pads.length; i++) {
        var p = pads[i], b = L[i], cx = b.x + b.w / 2, cy = b.y + b.h / 2;
        var down = p.flash > 0; if (down) p.flash -= dt;
        var off = down ? 6 : 0;
        // ripple ring
        if (p.ripple >= 0) {
          p.ripple += dt * 2.2;
          var rr = (Math.min(b.w, b.h) * 0.4) * (1 + p.ripple * 1.4);
          c.save(); c.globalAlpha = Math.max(0, 0.5 - p.ripple * 0.5); c.strokeStyle = '#ffffff'; c.lineWidth = 6;
          c.beginPath(); c.arc(cx, cy + off, rr, 0, 7); c.stroke(); c.restore();
          if (p.ripple > 1) p.ripple = -1;
        }
        c.save();
        host.rr(b.x, b.y + off, b.w, b.h - off, Math.min(b.w, b.h) * 0.5);
        c.fillStyle = p.col; if (down) c.globalAlpha = 1; c.fill();
        c.lineWidth = Math.max(5, b.h * 0.04); c.strokeStyle = 'rgba(255,255,255,.85)'; c.stroke();
        // gloss
        c.globalAlpha = down ? 0.55 : 0.32; c.fillStyle = '#ffffff';
        c.beginPath(); c.ellipse(cx, b.y + off + b.h * 0.28, b.w * 0.32, b.h * 0.16, 0, 0, 7); c.fill();
        c.restore();
        c.save(); if (down) c.globalAlpha = 1;
        c.font = Math.round(Math.min(b.w, b.h) * (down ? 0.5 : 0.46)) + 'px system-ui';
        c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText(p.emoji, cx, cy + off); c.textBaseline = 'alphabetic'; c.restore();
      }
      // beat button
      var bb = beatBtn();
      c.save(); host.rr(bb.x, bb.y, bb.w, bb.h, bb.h * 0.5);
      c.fillStyle = beat ? '#22c55e' : '#fb7185'; c.fill();
      c.lineWidth = 5; c.strokeStyle = '#ffffff'; c.stroke();
      c.fillStyle = '#ffffff'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = '900 ' + Math.round(bb.h * 0.42) + 'px system-ui';
      c.fillText(beat ? '⏸ Dừng' : '▶ Nhịp', bb.x + bb.w / 2, bb.y + bb.h / 2);
      c.textBaseline = 'alphabetic'; c.restore();
    });
    return { start: function () { reset(); } };
  }
});

/* ---- 3. MUSIC — animal band (toggle layers) --------------------------- */
Arcade.register({
  id: 'animal-band', title: 'Ban Nhạc Thú', emoji: '🎺', category: 'Music', color: '#f59e0b',
  desc: 'Chạm con vật để bật tiếng.', how: 'Chạm con vật để thêm vào ban nhạc!',
  create: function (host) {
    var BAND = [
      { emoji: '🐸', sound: 'frog',  col: '#22c55e', period: 0.8 },
      { emoji: '🐶', sound: 'dog',   col: '#f59e0b', period: 1.0 },
      { emoji: '🐱', sound: 'cat',   col: '#ec4899', period: 1.2 },
      { emoji: '🐮', sound: 'cow',   col: '#3b82f6', period: 1.6 },
      { emoji: '🦆', sound: 'duck',  col: '#fde047', period: 0.7 },
      { emoji: '🐦', sound: 'bird',  col: '#14b8a6', period: 0.9 }
    ];
    var band;
    function reset() {
      band = BAND.map(function (a) { return { emoji: a.emoji, sound: a.sound, col: a.col, period: a.period, on: false, t: 0, bob: host.rand(0, 6.28), pulse: 0 }; });
    }
    function layout() {
      var W = host.W, H = host.H, n = band.length;
      var cols = (W > H) ? 3 : 2, rows = Math.ceil(n / cols);
      var pad = Math.min(W, H) * 0.04;
      var top = H * 0.18, areaH = H * 0.74;
      var cw = (W - pad * (cols + 1)) / cols, ch = (areaH - pad * (rows + 1)) / rows;
      var arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: pad + (i % cols) * (cw + pad), y: top + pad + ((i / cols) | 0) * (ch + pad), w: cw, h: ch });
      return arr;
    }
    host.on('tap', function (p) {
      var L = layout();
      for (var i = 0; i < band.length; i++) {
        var b = L[i];
        if (p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h) {
          var a = band[i];
          a.on = !a.on;
          if (a.on) { a.t = 0; a.pulse = 0.5; host.animal(a.sound); host.sparkle(b.x + b.w / 2, b.y + b.h / 2, a.col); host.vibrate(20); }
          else { host.sfx('pop'); }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#fff7e6');
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#fff3d6'); g.addColorStop(1, '#ffe3b3'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      var anyOn = false;
      var L = layout();
      for (var i = 0; i < band.length; i++) {
        var a = band[i]; if (a.on) anyOn = true;
        if (a.on) {
          a.t += dt;
          if (a.t >= a.period) { a.t -= a.period; a.pulse = 0.5; host.animal(a.sound); }
        }
        a.bob += dt;
      }
      c.fillStyle = '#b45309'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.048) + 'px system-ui';
      c.fillText(anyOn ? '🎺 Ban nhạc đang chơi!' : '🎺 Chạm con vật để bật tiếng', W / 2, H * 0.1);
      for (var j = 0; j < band.length; j++) {
        var a2 = band[j], b = L[j], cx = b.x + b.w / 2, cy = b.y + b.h / 2;
        if (a2.pulse > 0) a2.pulse -= dt * 1.2;
        var bobY = a2.on ? Math.sin(a2.bob * 4) * b.h * 0.06 : 0;
        var sc = 1 + Math.max(0, a2.pulse) * 0.18;
        c.save();
        host.rr(b.x, b.y, b.w, b.h, Math.min(b.w, b.h) * 0.22);
        c.fillStyle = a2.on ? a2.col : '#f1e3cf'; c.fill();
        c.lineWidth = Math.max(5, b.h * 0.05); c.strokeStyle = a2.on ? '#ffffff' : 'rgba(180,83,9,.35)'; c.stroke();
        c.restore();
        // animal
        c.save(); c.translate(cx, cy + bobY); c.scale(sc, sc);
        c.globalAlpha = a2.on ? 1 : 0.55;
        c.font = Math.round(Math.min(b.w, b.h) * 0.5) + 'px system-ui'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText(a2.emoji, 0, 0); c.textBaseline = 'alphabetic'; c.restore();
        // on/off badge (music note when on)
        c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = Math.round(b.h * 0.2) + 'px system-ui';
        c.fillText(a2.on ? '🎵' : '➕', b.x + b.w * 0.8, b.y + b.h * 0.22);
        c.textBaseline = 'alphabetic'; c.restore();
      }
    });
    return { start: function () { reset(); host.music('jungle'); } };
  }
});

/* ---- 4. MUSIC — copy the tune (Simon-lite, no fail) ------------------- */
Arcade.register({
  id: 'copy-tune', title: 'Lặp Lại', emoji: '🎵', category: 'Music', color: '#3b82f6',
  desc: 'Nghe rồi lặp lại giai điệu.', how: 'Nghe nhạc rồi chạm lại y như vậy!',
  create: function (host) {
    var PADS = [

<script>

/* ---- 1. MUSIC — Bubble Harp -------------------------------------------- */
Arcade.register({
  id: 'bubble-harp', title: 'Đàn Bong Bóng', emoji: '🫧', category: 'Music', color: '#38bdf8',
  desc: 'Lướt ngón tay qua các cột bong bóng.', how: 'Lướt ngón tay qua bong bóng!',
  create: function (host) {
    // pentatonic columns of bubbles — drag across to arpeggiate
    var NOTES = ['C4', 'D4', 'E4', 'G4', 'A4', 'C5', 'D5', 'E5'];
    var COLS = ['#ef4444', '#f97316', '#facc15', '#22c55e', '#14b8a6', '#38bdf8', '#6366f1', '#a855f7'];
    var strings, lastCol, ripples, drawn;

    function reset() {
      strings = NOTES.map(function () { return { glow: 0, wob: 0 }; });
      lastCol = -1; ripples = []; drawn = false;
    }
    function layout() {
      var W = host.W, H = host.H, n = NOTES.length;
      var top = H * 0.16, bottom = H * 0.92;
      var arr = [];
      for (var i = 0; i < n; i++) arr.push({ cx: (i + 0.5) * (W / n), top: top, bottom: bottom, w: W / n });
      return arr;
    }
    function play(i, x, y) {
      if (i < 0 || i >= strings.length) return;
      strings[i].glow = 0.6; strings[i].wob = 0.5;
      host.note(NOTES[i], 0.7, 'musicbox');
      host.sparkle(x, y, COLS[i]);
      ripples.push({ x: x, y: y, r: Math.min(host.W, host.H) * 0.05, col: COLS[i], life: 0.7 });
      host.vibrate(10);
    }
    function cross(p) {
      var L = layout();
      if (p.y < L[0].top - 30 || p.y > L[0].bottom + 30) return;
      var n = NOTES.length, i = host.clamp(Math.floor(p.x / (host.W / n)), 0, n - 1);
      if (i !== lastCol) { play(i, p.x, p.y); lastCol = i; }
    }
    host.on('down', function (p) { drawn = true; lastCol = -1; cross(p); });
    host.on('move', function (p) { if (host.pointer.down) cross(p); });
    host.on('up', function () { lastCol = -1; });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#e0f2ff'); g.addColorStop(1, '#dbeafe');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      var L = layout();
      // bubble strings (chain of bubbles down each column)
      for (var i = 0; i < L.length; i++) {
        var s = strings[i]; if (s.glow > 0) s.glow -= dt; if (s.wob > 0) s.wob -= dt;
        var col = L[i], bn = 6;
        var br = Math.min(col.w * 0.34, (col.bottom - col.top) / (bn + 1) * 0.5);
        br = Math.max(br, Math.min(W, H) * 0.05);
        var sway = s.wob > 0 ? Math.sin(s.wob * 36) * br * 0.4 : 0;
        for (var k = 0; k < bn; k++) {
          var y = col.top + (k + 0.5) * ((col.bottom - col.top) / bn);
          var bx = col.cx + sway * (1 - k / bn);
          var lit = s.glow > 0;
          c.save();
          c.globalAlpha = lit ? 1 : 0.78;
          host.bubble(bx, y, br * (lit ? 1.12 : 1), lit ? COLS[i] : 'rgba(255,255,255,.55)');
          if (lit) {
            c.globalAlpha = s.glow; c.fillStyle = COLS[i];
            c.beginPath(); c.arc(bx, y, br * 1.2, 0, 7); c.fill();
          }
          c.restore();
        }
      }
      // ripples
      for (var r = ripples.length - 1; r >= 0; r--) {
        var rp = ripples[r]; rp.life -= dt; rp.r += 160 * dt;
        if (rp.life <= 0) { ripples.splice(r, 1); continue; }
        c.save(); c.globalAlpha = Math.max(0, rp.life); c.strokeStyle = rp.col;
        c.lineWidth = 4; c.beginPath(); c.arc(rp.x, rp.y, rp.r, 0, 7); c.stroke(); c.restore();
      }
      c.fillStyle = '#2563eb'; c.textAlign = 'center';
      c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('🫧 Lướt ngón tay qua bong bóng!', W / 2, H * 0.09);
    });
    return { start: function () { reset(); host.music('ocean'); }, stop: function () { host.music('stop'); } };
  }
});

<script>
/* =============================================================================
 * BÉ VUI — GAMES PART 11  (6 ART games · kids 2–6 · no-fail · touch-first)
 * -----------------------------------------------------------------------------
 *  1. connect-dots   Nối Chấm        🔢  Art  #3b82f6
 *  2. scratch-off    Cào Tranh       🪙  Art  #f59e0b
 *  3. glitter-spray  Phun Kim Tuyến  ✨  Art  #ec4899
 *  4. mirror-doodle  Vẽ Đối Xứng     🦋  Art  #a855f7
 *  5. pixel-paint    Vẽ Ô Vuông      🟦  Art  #14b8a6
 *  6. fireworks-paint Pháo Hoa       🎆  Art  #ef4444
 *
 *  All state lives inside create(host). No globals. W/H read every frame.
 *  ART games store strokes/cells/particles in arrays and redraw each frame.
 * ========================================================================== */

/* ---- 1. ART — connect the numbered dots ------------------------------- */
Arcade.register({
  id: 'connect-dots', title: 'Nối Chấm', emoji: '🔢', category: 'Art', color: '#3b82f6',
  desc: 'Nối các chấm theo số.', how: 'Chạm chấm 1, 2, 3…!',
  create: function (host) {
    // simple closed shapes as normalized points (0..1), connected in order then filled
    var SHAPES = [
      { name: 'a star', fill: '#fde047', pts: [[.5, .12], [.61, .38], [.9, .4], [.67, .58], [.76, .88], [.5, .68], [.24, .88], [.33, .58], [.1, .4], [.39, .38]] },
      { name: 'a fish', fill: '#38bdf8', pts: [[.18, .5], [.42, .28], [.66, .3], [.82, .22], [.82, .78], [.66, .7], [.42, .72], [.18, .5]] },
      { name: 'a house', fill: '#fb7185', pts: [[.5, .14], [.84, .42], [.84, .86], [.16, .86], [.16, .42]] },
      { name: 'a heart', fill: '#ec4899', pts: [[.5, .3], [.36, .16], [.18, .24], [.16, .44], [.5, .82], [.84, .44], [.82, .24], [.64, .16]] },
      { name: 'a boat', fill: '#f59e0b', pts: [[.2, .56], [.8, .56], [.7, .82], [.3, .82]] }
    ];
    var order, oi, shape, dots, idx, lines, celebrate, fillT, msg;

    function reset() { order = host.shuffle(SHAPES.slice()); oi = 0; round(); }
    function round() {
      shape = order[oi % order.length]; oi++;
      dots = shape.pts.map(function (p) { return { nx: p[0], ny: p[1] }; });
      idx = 0; lines = []; celebrate = 0; fillT = 0; msg = '';
      host.say('Connect the dots', 'en-US');
    }
    function box() { var W = host.W, H = host.H, S = Math.min(W, H) * 0.78; return { x: (W - S) / 2, y: (H - S) / 2 + H * 0.03, S: S }; }
    function dotXY(i) { var b = box(); return { x: b.x + dots[i].nx * b.S, y: b.y + dots[i].ny * b.S }; }

    function tryHit(p) {
      if (celebrate > 0 || idx >= dots.length) return;
      var b = box(), R = Math.max(Math.min(host.W, host.H) * 0.14, b.S * 0.12);
      var d = dotXY(idx);
      if (host.dist(p.x, p.y, d.x, d.y) < R) {
        if (idx > 0) { var pr = dotXY(idx - 1); lines.push({ ax: pr.x, ay: pr.y, bx: d.x, by: d.y }); }
        idx++;
        host.note(['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5'][Math.min(idx - 1, 9)], 0.4, 'marimba');
        host.sparkle(d.x, d.y, '#3b82f6'); host.vibrate(12);
        if (idx >= dots.length) {
          // close the shape back to dot 0
          var first = dotXY(0), lastd = dotXY(dots.length - 1);
          lines.push({ ax: lastd.x, ay: lastd.y, bx: first.x, by: first.y });
          celebrate = 2.0; fillT = 0.001; msg = '🎉';
          host.celebrate(host.W / 2, host.H / 2); host.say('I see ' + shape.name, 'en-US');
        }
      } else {
        // tapped wrong/empty: gentle nudge only if it looks like a dot tap (any other dot)
        for (var k = 0; k < dots.length; k++) {
          if (k === idx) continue;
          var dk = dotXY(k);
          if (host.dist(p.x, p.y, dk.x, dk.y) < R) { host.sfx('nope'); return; }
        }
      }
    }
    host.on('tap', tryHit); // tap only — a single dot per gesture (no double-advance)

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#eef6ff');
      if (!dots) return;
      var b = box();
      // filled shape (grows in when complete)
      if (fillT > 0) {
        fillT = Math.min(1, fillT + dt * 2.2);
        c.save(); c.globalAlpha = 0.55 * fillT; c.fillStyle = shape.fill;
        c.beginPath();
        for (var f = 0; f < dots.length; f++) { var df = dotXY(f); if (f === 0) c.moveTo(df.x, df.y); else c.lineTo(df.x, df.y); }
        c.closePath(); c.fill(); c.restore();
      }
      // connecting lines
      c.strokeStyle = '#3b82f6'; c.lineWidth = Math.max(8, b.S * 0.035); c.lineCap = 'round'; c.lineJoin = 'round';
      for (var i = 0; i < lines.length; i++) { c.beginPath(); c.moveTo(lines[i].ax, lines[i].ay); c.lineTo(lines[i].bx, lines[i].by); c.stroke(); }
      // dots
      for (var j = 0; j < dots.length; j++) {
        var dxy = dotXY(j), r = b.S * 0.05;
        c.beginPath(); c.arc(dxy.x, dxy.y, r, 0, 7);
        if (j < idx) c.fillStyle = '#3b82f6'; else if (j === idx) c.fillStyle = '#fbbf24'; else c.fillStyle = '#cfe0f5';
        c.fill();
        if (j === idx && celebrate <= 0) { c.lineWidth = 4; c.strokeStyle = '#f59e0b'; c.beginPath(); c.arc(dxy.x, dxy.y, r * 1.5 + Math.sin(host.now() / 150) * 3, 0, 7); c.stroke(); }
        // number
        c.fillStyle = (j <= idx) ? '#ffffff' : '#3b82f6'; c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = '900 ' + Math.round(r * 1.05) + 'px system-ui'; c.fillText(String(j + 1), dxy.x, dxy.y + 1);
        c.textBaseline = 'alphabetic';
      }
      c.fillStyle = '#1e40af'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Đẹp quá!' : '👆 Chạm số ' + (idx + 1), W / 2, H * 0.08);
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) round(); }
    });
    return {
      start: function () { reset(); host.music('happy'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 2. ART — scratch off a hidden picture ---------------------------- */
Arcade.register({
  id: 'scratch-off', title: 'Cào Tranh', emoji: '🪙', category: 'Art', color: '#f59e0b',
  desc: 'Cào lớp xám để lộ hình.', how: 'Kéo ngón tay để cào!',
  create: function (host) {
    var PICS = [
      { e: '🦋', say: 'a butterfly' }, { e: '🐱', say: 'a cat' }, { e: '🌈', say: 'a rainbow' },
      { e: '🍓', say: 'a strawberry' }, { e: '🚗', say: 'a car' }, { e: '⭐', say: 'a star' },
      { e: '🐠', say: 'a fish' }, { e: '🌻', say: 'a sunflower' }, { e: '🦄', say: 'a unicorn' }, { e: '🎈', say: 'a balloon' }
    ];
    var order, oi, pic, holes, scratched, total, celebrate, lastErase, started;

    function reset() { order = host.shuffle(PICS.slice()); oi = 0; round(); }
    function round() {
      pic = order[oi % order.length]; oi++;
      holes = []; scratched = 0; celebrate = 0; lastErase = 0; started = false;
      // grid count to estimate coverage (independent of pixel mask)
      total = 36;
    }
    function gridIndex(p) {
      var W = host.W, H = host.H, cols = 6, rows = 6;
      var gx = host.clamp(Math.floor(p.x / W * cols), 0, cols - 1);
      var gy = host.clamp(Math.floor(p.y / H * rows), 0, rows - 1);
      return gy * cols + gx;
    }
    var marks = {};
    function erase(p) {
      if (celebrate > 0) return;
      started = true;
      holes.push({ x: p.x, y: p.y, r: Math.max(host.W, host.H) * 0.09 });
      if (holes.length > 900) holes.splice(0, holes.length - 900);
      var gi = gridIndex(p);
      if (!marks[gi]) { marks[gi] = true; scratched++; }
      if (host.now() - lastErase > 80) { host.sfx('whoosh'); lastErase = host.now(); }
      if (scratched >= Math.floor(total * 0.62) && celebrate <= 0) {
        celebrate = 2.2; host.celebrate(host.W / 2, host.H / 2); host.say('It is ' + pic.say, 'en-US');
      }
    }
    host.on('down', function (p) { erase(p); });
    host.on('move', function (p) { if (host.pointer.down) erase(p); });

    function roundResetMarks() { marks = {}; }

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      host.clear('#fff7ed');
      // picture underneath
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = Math.round(Math.min(W, H) * 0.6) + 'px system-ui';
      c.fillText(pic.e, W / 2, H * 0.52);
      c.textBaseline = 'alphabetic';
      // gray scratch layer with holes punched out
      c.save();
      c.beginPath(); c.rect(0, 0, W, H);
      for (var i = 0; i < holes.length; i++) { c.moveTo(holes[i].x + holes[i].r, holes[i].y); c.arc(holes[i].x, holes[i].y, holes[i].r, 0, 7, true); }
      c.clip('evenodd');
      var g = c.createLinearGradient(0, 0, W, H); g.addColorStop(0, '#cbd5e1'); g.addColorStop(0.5, '#94a3b8'); g.addColorStop(1, '#b0bcca');
      c.fillStyle = g; c.fillRect(0, 0, W, H);
      // sparkle dots on the foil
      c.fillStyle = 'rgba(255,255,255,.35)';
      for (var s = 0; s < 40; s++) { var sx = (s * 97 % W), sy = (s * 53 % H); c.fillRect(sx, sy, 3, 3); }
      c.restore();
      // hint text on the foil (only before celebrate)
      c.fillStyle = '#a16207'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.05) + 'px system-ui';
      c.fillText(celebrate > 0 ? '🎉 Hay quá!' : '👆 Cào để xem hình!', W / 2, H * 0.08);
      if (celebrate > 0) { celebrate -= dt; if (celebrate <= 0) { round(); roundResetMarks(); } }
    });
    return {
      start: function () { reset(); roundResetMarks(); host.music('playful'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 3. ART — glitter spray ------------------------------------------- */
Arcade.register({
  id: 'glitter-spray', title: 'Phun Kim Tuyến', emoji: '✨', category: 'Art', color: '#ec4899',
  desc: 'Phun kim tuyến lấp lánh.', how: 'Giữ và kéo để phun!',
  create: function (host) {
    var COLS = ['#ec4899', '#f59e0b', '#fde047', '#22c55e', '#38bdf8', '#a855f7', '#ffffff', '#fb7185'];
    var bits, color, lastNote, lastSp;
    function reset() { bits = []; color = COLS[0]; lastNote = 0; lastSp = 0; }
    function tray() {
      var W = host.W, H = host.H, n = COLS.length + 1, bw = W / n, bh = H * 0.13;
      var arr = []; for (var i = 0; i < n; i++) arr.push({ x: i * bw, y: H - bh, w: bw, h: bh }); return arr;
    }
    function inTray(p) { return p.y > host.H - host.H * 0.13; }
    function spray(p) {
      var n = 5;
      for (var i = 0; i < n; i++) {
        var a = host.rand(0, 6.28), sp = host.rand(8, 46);
        bits.push({
          x: p.x + Math.cos(a) * host.rand(0, 22), y: p.y + Math.sin(a) * host.rand(0, 22),
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - host.rand(10, 50),
          col: (color === '#ffffff' || host.rand() < 0.3) ? host.choice(COLS) : color,
          s: host.rand(3, 9), life: host.rand(1.4, 3.2), max: 3.2, rot: host.rand(0, 6.28), vr: host.rand(-5, 5),
          tw: host.rand(0, 6.28)
        });
      }
      if (bits.length > 1400) bits.splice(0, bits.length - 1400);
      if (host.now() - lastNote > 110) { host.sfx('twinkle'); lastNote = host.now(); }
    }
    host.on('down', function (p) {
      if (inTray(p)) {
        var T = tray();
        for (var i = 0; i < COLS.length; i++) if (p.x >= T[i].x && p.x < T[i].x + T[i].w) { color = COLS[i]; host.sfx('pop'); return; }
        bits = []; host.sfx('whoosh'); return; // last cell = clear
      }
      spray(p);
    });
    host.on('move', function (p) { if (host.pointer.down && !inTray(p)) spray(p); });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      // night-ish soft gradient backdrop so glitter pops
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#2a1240'); g.addColorStop(1, '#4c1d63'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      // glitter
      for (var i = bits.length - 1; i >= 0; i--) {
        var b = bits[i];
        b.life -= dt; if (b.life <= 0) { bits.splice(i, 1); continue; }
        b.vy += 60 * dt; b.x += b.vx * dt; b.y += b.vy * dt; b.rot += b.vr * dt; b.tw += dt * 6;
        var a = host.clamp(b.life / b.max, 0, 1) * (0.6 + 0.4 * Math.abs(Math.sin(b.tw)));
        c.save(); c.globalAlpha = a; c.translate(b.x, b.y); c.rotate(b.rot); c.fillStyle = b.col;
        c.beginPath();
        for (var k = 0; k < 4; k++) { var ang = k * Math.PI / 2; c.lineTo(Math.cos(ang) * b.s, Math.sin(ang) * b.s); var a2 = ang + Math.PI / 4; c.lineTo(Math.cos(a2) * b.s * 0.4, Math.sin(a2) * b.s * 0.4); }
        c.closePath(); c.fill(); c.restore();
      }
      // tray
      var T = tray();
      for (var t = 0; t < COLS.length; t++) { c.fillStyle = COLS[t]; host.rr(T[t].x + 3, T[t].y + 3, T[t].w - 6, T[t].h - 6, 10); c.fill(); if (COLS[t] === color) { c.lineWidth = 5; c.strokeStyle = '#fff'; host.rr(T[t].x + 3, T[t].y + 3, T[t].w - 6, T[t].h - 6, 10); c.stroke(); } }
      var cl = T[COLS.length]; c.fillStyle = '#3f3f46'; host.rr(cl.x + 3, cl.y + 3, cl.w - 6, cl.h - 6, 10); c.fill();
      c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle'; c.font = Math.round(cl.h * 0.42) + 'px system-ui'; c.fillText('🧽', cl.x + cl.w / 2, cl.y + cl.h / 2); c.textBaseline = 'alphabetic';
      c.fillStyle = 'rgba(255,255,255,.92)'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('✨ Giữ và kéo để phun kim tuyến!', W / 2, H * 0.07);
    });
    return {
      start: function () { reset(); host.music('musicbox'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 4. ART — mirror doodle (symmetry paint) -------------------------- */
Arcade.register({
  id: 'mirror-doodle', title: 'Vẽ Đối Xứng', emoji: '🦋', category: 'Art', color: '#a855f7',
  desc: 'Vẽ một bên, bên kia tự hiện.', how: 'Kéo ngón tay để vẽ!',
  create: function (host) {
    var COLS = ['#a855f7', '#ec4899', '#ef4444', '#f59e0b', '#fde047', '#22c55e', '#38bdf8', '#111827'];
    var strokes, cur, color, last;
    function reset() { strokes = []; cur = null; color = COLS[0]; last = null; }
    function tray() {
      var W = host.W, H = host.H, n = COLS.length + 1, bw = W / n, bh = H * 0.13;
      var arr = []; for (var i = 0; i < n; i++) arr.push({ x: i * bw, y: H - bh, w: bw, h: bh }); return arr;
    }
    function inTray(p) { return p.y > host.H - host.H * 0.13; }
    host.on('down', function (p) {
      if (inTray(p)) {
        var T = tray();
        for (var i = 0; i < COLS.length; i++) if (p.x >= T[i].x && p.x < T[i].x + T[i].w) { color = COLS[i]; host.sfx('pop'); return; }
        reset(); host.sfx('whoosh'); return; // last cell = clear
      }
      cur = { col: color, pts: [{ x: p.x, y: p.y }] }; strokes.push(cur); last = p;
      host.note(host.choice(['C5', 'E5', 'G5', 'A5']), 0.2, 'musicbox', 0.2);
      if (strokes.length > 400) strokes.splice(0, strokes.length - 400);
    });
    host.on('move', function (p) {
      if (cur && host.pointer.down && !inTray(p)) {
        if (!last || host.dist(p.x, p.y, last.x, last.y) > 3) {
          cur.pts.push({ x: p.x, y: p.y }); last = p;
          if (cur.pts.length > 600) cur.pts.shift();
        }
      }
    });
    host.on('up', function () { cur = null; last = null; });

    host.loop(function () {
      var c = host.ctx, W = host.W, H = host.H, cx = W / 2;
      host.clear('#faf5ff');
      // soft center axis
      c.strokeStyle = 'rgba(168,85,247,.25)'; c.lineWidth = 2; c.setLineDash([8, 8]);
      c.beginPath(); c.moveTo(cx, 0); c.lineTo(cx, H - H * 0.13); c.stroke(); c.setLineDash([]);
      c.lineCap = 'round'; c.lineJoin = 'round'; c.lineWidth = 13;
      for (var s = 0; s < strokes.length; s++) {
        var st = strokes[s], pts = st.pts; c.strokeStyle = st.col;
        // original side
        c.beginPath();
        for (var i = 0; i < pts.length; i++) { if (i === 0) c.moveTo(pts[i].x, pts[i].y); else c.lineTo(pts[i].x, pts[i].y); }
        if (pts.length === 1) { c.arc(pts[0].x, pts[0].y, 6.5, 0, 7); c.fillStyle = st.col; c.fill(); } else c.stroke();
        // mirrored side
        c.beginPath();
        for (var j = 0; j < pts.length; j++) { var mx = 2 * cx - pts[j].x; if (j === 0) c.moveTo(mx, pts[j].y); else c.lineTo(mx, pts[j].y); }
        if (pts.length === 1) { c.arc(2 * cx - pts[0].x, pts[0].y, 6.5, 0, 7); c.fillStyle = st.col; c.fill(); } else c.stroke();
      }
      // tray
      var T = tray();
      for (var k = 0; k < COLS.length; k++) { c.fillStyle = COLS[k]; host.rr(T[k].x + 3, T[k].y + 3, T[k].w - 6, T[k].h - 6, 10); c.fill(); if (COLS[k] === color) { c.lineWidth = 5; c.strokeStyle = '#fff'; host.rr(T[k].x + 3, T[k].y + 3, T[k].w - 6, T[k].h - 6, 10); c.stroke(); } }
      var cl = T[COLS.length]; c.fillStyle = '#e5e7eb'; host.rr(cl.x + 3, cl.y + 3, cl.w - 6, cl.h - 6, 10); c.fill();
      c.fillStyle = '#6b7280'; c.textAlign = 'center'; c.textBaseline = 'middle'; c.font = Math.round(cl.h * 0.42) + 'px system-ui'; c.fillText('🧽', cl.x + cl.w / 2, cl.y + cl.h / 2); c.textBaseline = 'alphabetic';
      c.fillStyle = '#7e22ce'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('🦋 Vẽ một bên — bên kia tự hiện!', W / 2, H * 0.07);
    });
    return {
      start: function () { reset(); host.music('lullaby'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 5. ART — pixel paint grid ---------------------------------------- */
Arcade.register({
  id: 'pixel-paint', title: 'Vẽ Ô Vuông', emoji: '🟦', category: 'Art', color: '#14b8a6',
  desc: 'Tô từng ô để tạo hình.', how: 'Chọn màu, chạm ô vuông!',
  create: function (host) {
    var COLS = ['#ef4444', '#f59e0b', '#fde047', '#22c55e', '#14b8a6', '#38bdf8', '#a855f7', '#111827'];
    var COLN = 10, ROWN = 10;
    var cells, color;
    function reset() { cells = []; for (var i = 0; i < COLN * ROWN; i++) cells.push(null); color = COLS[0]; }
    function gridBox() {
      var W = host.W, H = host.H;
      var top = H * 0.11, bottom = H * 0.13, avail = H - top - bottom;
      var S = Math.min(W * 0.96, avail);
      return { x: (W - S) / 2, y: top + (avail - S) / 2, S: S, cw: S / COLN, ch: S / ROWN };
    }
    function tray() {
      var W = host.W, H = host.H, n = COLS.length + 1, bw = W / n, bh = H * 0.13;
      var arr = []; for (var i = 0; i < n; i++) arr.push({ x: i * bw, y: H - bh, w: bw, h: bh }); return arr;
    }
    function inTray(p) { return p.y > host.H - host.H * 0.13; }
    host.on('tap', function (p) {
      if (inTray(p)) {
        var T = tray();
        for (var i = 0; i < COLS.length; i++) if (p.x >= T[i].x && p.x < T[i].x + T[i].w) { color = COLS[i]; host.sfx('pop'); return; }
        reset(); host.sfx('whoosh'); return; // last cell = clear
      }
      var b = gridBox();
      var gx = Math.floor((p.x - b.x) / b.cw), gy = Math.floor((p.y - b.y) / b.ch);
      if (gx < 0 || gx >= COLN || gy < 0 || gy >= ROWN) return;
      var idx = gy * COLN + gx;
      if (cells[idx] === color) { cells[idx] = null; host.sfx('blip'); }
      else { cells[idx] = color; host.sfx('pop'); host.note(host.choice(['C5', 'E5', 'G5']), 0.18, 'marimba', 0.2); }
      host.vibrate(10);
    });
    host.loop(function () {
      var c = host.ctx, W = host.W, H = host.H; host.clear('#ecfeff');
      var b = gridBox();
      // cells + grid lines
      for (var gy = 0; gy < ROWN; gy++) {
        for (var gx = 0; gx < COLN; gx++) {
          var idx = gy * COLN + gx, cx = b.x + gx * b.cw, cy = b.y + gy * b.ch;
          if (cells[idx]) { c.fillStyle = cells[idx]; c.fillRect(cx, cy, b.cw, b.ch); }
          c.strokeStyle = 'rgba(20,184,166,.28)'; c.lineWidth = 1; c.strokeRect(cx, cy, b.cw, b.ch);
        }
      }
      // frame
      c.strokeStyle = '#14b8a6'; c.lineWidth = 4; c.strokeRect(b.x, b.y, b.S, b.S);
      // tray
      var T = tray();
      for (var k = 0; k < COLS.length; k++) { c.fillStyle = COLS[k]; host.rr(T[k].x + 3, T[k].y + 3, T[k].w - 6, T[k].h - 6, 10); c.fill(); if (COLS[k] === color) { c.lineWidth = 5; c.strokeStyle = '#fff'; host.rr(T[k].x + 3, T[k].y + 3, T[k].w - 6, T[k].h - 6, 10); c.stroke(); } }
      var cl = T[COLS.length]; c.fillStyle = '#e5e7eb'; host.rr(cl.x + 3, cl.y + 3, cl.w - 6, cl.h - 6, 10); c.fill();
      c.fillStyle = '#6b7280'; c.textAlign = 'center'; c.textBaseline = 'middle'; c.font = Math.round(cl.h * 0.42) + 'px system-ui'; c.fillText('🧽', cl.x + cl.w / 2, cl.y + cl.h / 2); c.textBaseline = 'alphabetic';
      c.fillStyle = '#0f766e'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('🟦 Chọn màu · chạm ô vuông!', W / 2, H * 0.07);
    });
    return {
      start: function () { reset(); host.music('happy'); },
      stop: function () { host.music('stop'); }
    };
  }
});

/* ---- 6. ART — fireworks paint ----------------------------------------- */
Arcade.register({
  id: 'fireworks-paint', title: 'Pháo Hoa', emoji: '🎆', category: 'Art', color: '#ef4444',
  desc: 'Chạm để bắn pháo hoa.', how: 'Chạm bất kỳ đâu!',
  create: function (host) {
    var BRIGHT = ['#ef4444', '#f59e0b', '#fde047', '#22c55e', '#38bdf8', '#a855f7', '#ec4899', '#ffffff', '#fb7185', '#34d399'];
    var rockets, sparks, stars, twinkle;
    function reset() {
      rockets = []; sparks = []; twinkle = 0;
      stars = [];
      for (var i = 0; i < 60; i++) stars.push({ nx: Math.random(), ny: Math.random() * 0.7, ph: Math.random() * 6.28, sp: 1 + Math.random() * 2 });
    }
    function launch(p) {
      var W = host.W, H = host.H;
      rockets.push({ x: p.x, y: H + 6, tx: p.x, ty: host.clamp(p.y, H * 0.12, H * 0.7), col: host.choice(BRIGHT), prog: 0 });
      host.sfx('whee'); host.vibrate(12);
    }
    function burst(x, y, col) {
      var n = 26;
      for (var i = 0; i < n; i++) {
        var a = (i / n) * 6.28 + host.rand(-0.1, 0.1), sp = host.rand(80, 230);
        sparks.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, col: (host.rand() < 0.25 ? host.choice(BRIGHT) : col), life: host.rand(0.8, 1.5), max: 1.5, s: host.rand(2.5, 5) });
      }
      // engine overlay reward too
      host.confetti(x, y, BRIGHT); host.sparkle(x, y, col); host.sfx('pop');
    }
    host.on('tap', launch);
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      // night sky
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#0b1026'); g.addColorStop(0.6, '#1b1840'); g.addColorStop(1, '#2a1b4d'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      // twinkling stars
      twinkle += dt;
      c.fillStyle = '#fff';
      for (var i = 0; i < stars.length; i++) { var st = stars[i]; var a = 0.3 + 0.5 * Math.abs(Math.sin(twinkle * st.sp + st.ph)); c.save(); c.globalAlpha = a; c.beginPath(); c.arc(st.nx * W, st.ny * H, 1.6, 0, 7); c.fill(); c.restore(); }
      // rockets rising
      for (var r = rockets.length - 1; r >= 0; r--) {
        var ro = rockets[r]; ro.prog += dt * 1.8;
        var x = ro.x, y = host.lerp(H + 6, ro.ty, Math.min(1, ro.prog));
        c.save(); c.globalAlpha = 0.9; c.fillStyle = ro.col; c.beginPath(); c.arc(x, y, 4, 0, 7); c.fill();
        c.globalAlpha = 0.35; c.fillRect(x - 1.5, y, 3, Math.min(40, (H - y) * 0.2)); c.restore();
        if (ro.prog >= 1) { burst(ro.tx, ro.ty, ro.col); rockets.splice(r, 1); }
      }
      // sparks
      for (var s = sparks.length - 1; s >= 0; s--) {
        var sp = sparks[s]; sp.life -= dt; if (sp.life <= 0) { sparks.splice(s, 1); continue; }
        sp.vy += 120 * dt; sp.vx *= 0.985; sp.vy *= 0.985; sp.x += sp.vx * dt; sp.y += sp.vy * dt;
        var al = host.clamp(sp.life / sp.max, 0, 1);
        c.save(); c.globalAlpha = al; c.fillStyle = sp.col; c.beginPath(); c.arc(sp.x, sp.y, sp.s, 0, 7); c.fill(); c.restore();
      }
      if (sparks.length > 1500) sparks.splice(0, sparks.length - 1500);
      c.fillStyle = 'rgba(255,255,255,.9)'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('🎆 Chạm để bắn pháo hoa!', W / 2, H * 0.07);
    });
    return {
      start: function () { reset(); host.music('sunny'); },
      stop: function () { host.music('stop'); }
    };
  }
});

</script>
<script>
/* =============================================================================
 * BÉ VUI — PART 12  (kids 2–6, touch-first, no-fail, audio-rich)
 * Six gentle cause-effect / tap-toy games. All state inside create(host).
 * No globals. W/H read every frame. dt timers only. Big hit areas.
 *   1. face-maker     — Làm Mặt Cười
 *   2. balloon-pump   — Bơm Bóng
 *   3. bubble-wrap    — Bóng Khí
 *   4. light-switches — Bật Đèn
 *   5. jack-in-box    — Hộp Bất Ngờ
 *   6. confetti-tap   — Pháo Giấy
 * ========================================================================== */

/* ---- 1. ART — make a silly face (persistent placement) ----------------- */
Arcade.register({
  id: 'face-maker', title: 'Làm Mặt Cười', emoji: '😀', category: 'Art', color: '#fbbf24',
  desc: 'Kéo mắt, mũi, miệng lên mặt.', how: 'Kéo các bộ phận lên khuôn mặt!',
  create: function (host) {
    // tray feature set — emoji parts the child drags onto the face
    var PARTS = ['👀', '👁️', '👃', '👄', '👂', '👃', '🎩', '🎀', '👓', '⭐', '❤️', '👅'];
    var placed, drag, blink, giggle, clearPulse;
    function reset() {
      placed = [];           // {emoji,x,y,size}
      drag = null;           // {emoji,x,y,size}
      blink = 0; giggle = 0; clearPulse = 0;
    }
    function faceC() { return { x: host.W / 2, y: host.H * 0.42, r: Math.min(host.W, host.H) * 0.3 }; }
    function trayRect() { var H = host.H; return { y: H - H * 0.2, h: H * 0.2 }; }
    function traySlots() {
      var W = host.W, t = trayRect(), n = PARTS.length;
      var bw = W / n, arr = [];
      for (var i = 0; i < n; i++) arr.push({ x: i * bw + bw / 2, y: t.y + t.h / 2, w: bw, h: t.h, emoji: PARTS[i] });
      return arr;
    }
    function clearBtn() { var W = host.W; var s = Math.min(W, host.H) * 0.13; return { x: W - s - 12, y: 12, w: s, h: s * 0.78 }; }
    function partSize() { return Math.min(host.W, host.H) * 0.16; }

    host.on('down', function (p) {
      if (!placed) return;
      var cb = clearBtn();
      if (p.x > cb.x && p.x < cb.x + cb.w && p.y > cb.y && p.y < cb.y + cb.h) {
        placed = []; clearPulse = 0.5; host.sfx('whoosh'); host.say('Clear', 'en-US'); return;
      }
      var t = trayRect();
      if (p.y > t.y) {
        var slots = traySlots();
        for (var i = 0; i < slots.length; i++) {
          if (host.dist(p.x, p.y, slots[i].x, slots[i].y) < Math.max(slots[i].w, slots[i].h) * 0.6) {
            drag = { emoji: slots[i].emoji, x: p.x, y: p.y, size: partSize() };
            host.sfx('pop'); return;
          }
        }
        return;
      }
      // tap the face itself -> blink + giggle
      var f = faceC();
      if (host.dist(p.x, p.y, f.x, f.y) < f.r) {
        blink = 0.5; giggle = 0.6; host.sfx('giggle'); host.say('Hello!', 'en-US'); host.vibrate(20);
      }
    });
    host.on('move', function (p) { if (drag) { drag.x = p.x; drag.y = p.y; } });
    host.on('up', function (p) {
      if (!drag) return;
      var t = trayRect();
      // drop onto the upper area (face zone) -> it stays where dropped
      if (p.y < t.y - 4) {
        placed.push({ emoji: drag.emoji, x: p.x, y: p.y, size: drag.size });
        host.sfx('ding'); host.sparkle(p.x, p.y); host.vibrate(15);
      } else {
        host.sfx('pop2');
      }
      drag = null;
    });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#fff7d6'); g.addColorStop(1, '#ffe9b8'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      if (blink > 0) blink -= dt; if (giggle > 0) giggle -= dt; if (clearPulse > 0) clearPulse -= dt;

      // big blank face
      var f = faceC();
      var wob = giggle > 0 ? Math.sin(giggle * 40) * f.r * 0.04 : 0;
      c.save();
      c.beginPath(); c.arc(f.x + wob, f.y, f.r, 0, 7);
      c.fillStyle = '#ffe08a'; c.fill();
      c.lineWidth = Math.max(6, f.r * 0.05); c.strokeStyle = '#f59e0b'; c.stroke();
      // cheeks
      c.fillStyle = 'rgba(244,114,182,.35)';
      c.beginPath(); c.arc(f.x - f.r * 0.45 + wob, f.y + f.r * 0.2, f.r * 0.16, 0, 7); c.fill();
      c.beginPath(); c.arc(f.x + f.r * 0.45 + wob, f.y + f.r * 0.2, f.r * 0.16, 0, 7); c.fill();
      c.restore();

      // placed features — redrawn every frame, persistent
      c.textAlign = 'center'; c.textBaseline = 'middle';
      for (var i = 0; i < placed.length; i++) {
        var pp = placed[i];
        var sz = pp.size * (blink > 0 ? (1 + Math.sin(blink * 30) * 0.04) : 1);
        c.font = Math.round(sz) + 'px system-ui';
        c.fillText(pp.emoji, pp.x, pp.y);
      }

      // tray background
      var t = trayRect();
      c.fillStyle = 'rgba(255,255,255,.55)'; c.fillRect(0, t.y, W, t.h);
      c.strokeStyle = '#fbbf24'; c.lineWidth = 4; c.beginPath(); c.moveTo(0, t.y); c.lineTo(W, t.y); c.stroke();
      var slots = traySlots();
      for (var k = 0; k < slots.length; k++) {
        c.font = Math.round(t.h * 0.5) + 'px system-ui';
        c.fillText(slots[k].emoji, slots[k].x, slots[k].y);
      }

      // dragging piece
      if (drag) { c.font = Math.round(drag.size * 1.1) + 'px system-ui'; c.fillText(drag.emoji, drag.x, drag.y); }

      // clear button
      var cb = clearBtn();
      var cp = clearPulse > 0 ? 1.08 : 1;
      c.save(); host.rr(cb.x, cb.y, cb.w * cp, cb.h * cp, cb.h * 0.3);
      c.fillStyle = '#fb7185'; c.fill(); c.lineWidth = 4; c.strokeStyle = '#fff'; c.stroke(); c.restore();
      c.font = Math.round(cb.h * 0.55) + 'px system-ui'; c.fillStyle = '#fff';
      c.fillText('🧹', cb.x + cb.w / 2, cb.y + cb.h / 2);
      c.textBaseline = 'alphabetic';

      c.fillStyle = '#a16207'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('😀 Kéo lên mặt · chạm mặt để cười', W / 2, t.y - H * 0.02);
    });

    return { start: function () { reset(); host.music('playful'); } };
  }
});

/* ---- 2. TAP — pump up the balloon until it pops ------------------------ */
Arcade.register({
  id: 'balloon-pump', title: 'Bơm Bóng', emoji: '🎈', category: 'Tap', color: '#ef4444',
  desc: 'Chạm bơm để bóng to dần.', how: 'Chạm cái bơm để bơm bóng!',
  create: function (host) {
    var COLORS = ['#ef4444', '#f97316', '#facc15', '#22c55e', '#38bdf8', '#a855f7', '#ec4899'];
    var size, color, pumping, popped, fresh, wob;
    function newBalloon() { size = 0.16; color = host.choice(COLORS); pumping = 0; popped = 0; fresh = 0; wob = 0; }
    function reset() { newBalloon(); }
    function balloon() {
      var W = host.W, H = host.H;
      var r = Math.min(W, H) * size;
      return { x: W / 2, y: H * 0.42, r: r };
    }
    function pumpBtn() {
      var W = host.W, H = host.H;
      var s = Math.min(W, H) * 0.26;
      return { x: W / 2 - s / 2, y: H - s - H * 0.06, w: s, h: s };
    }
    function pump() {
      if (popped > 0) return;
      size += 0.045;
      pumping = 0.18; wob = 0.4;
      // rising pitch with size + a little squeak
      var f = 240 + size * 900;
      host.tone(f, 0.12, 'sine', 0.28);
      host.sfx('boing'); host.vibrate(12);
      if (size >= 0.42) {
        // POP!
        var b = balloon();
        popped = 1; host.sfx('pop'); host.confetti(b.x, b.y, [color]); host.celebrate(b.x, b.y);
        host.say('Pop!', 'en-US'); host.vibrate(40);
      }
    }
    host.on('tap', function (p) {
      if (!balloon) return;
      var pb = pumpBtn();
      if (p.x > pb.x && p.x < pb.x + pb.w && p.y > pb.y && p.y < pb.y + pb.h) { pump(); return; }
      // also let kids tap the balloon to pump (big friendly target)
      var b = balloon();
      if (popped <= 0 && host.dist(p.x, p.y, b.x, b.y) < b.r * 1.1) pump();
    });

    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#dbeafe'); g.addColorStop(1, '#fee2e2'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      if (pumping > 0) pumping -= dt; if (wob > 0) wob -= dt;

      if (popped > 0) {
        popped += dt;
        c.fillStyle = '#b45309'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.07) + 'px system-ui';
        c.fillText('🎉 Bùm!', W / 2, H * 0.42);
        if (popped > 1.3) newBalloon();
      } else {
        var b = balloon();
        var sx = wob > 0 ? 1 + Math.sin(wob * 40) * 0.05 : 1;
        // string
        c.strokeStyle = '#c9b8e0'; c.lineWidth = 3; c.beginPath(); c.moveTo(b.x, b.y + b.r); c.quadraticCurveTo(b.x + 14, b.y + b.r + 40, b.x, b.y + b.r + 70); c.stroke();
        // balloon body
        c.save(); c.translate(b.x, b.y); c.scale(sx, 2 - sx);
        c.fillStyle = color; c.beginPath(); c.ellipse(0, 0, b.r * 0.92, b.r, 0, 0, 7); c.fill();
        c.fillStyle = 'rgba(255,255,255,.45)'; c.beginPath(); c.ellipse(-b.r * 0.3, -b.r * 0.35, b.r * 0.2, b.r * 0.28, -0.4, 0, 7); c.fill();
        c.restore();
        // knot
        c.fillStyle = color; c.beginPath(); c.moveTo(b.x - 6, b.y + b.r); c.lineTo(b.x + 6, b.y + b.r); c.lineTo(b.x, b.y + b.r + 12); c.closePath(); c.fill();
      }

      // pump button
      var pb = pumpBtn();
      var press = pumping > 0 ? 1 : 0;
      c.save(); host.rr(pb.x, pb.y + press * 6, pb.w, pb.h - press * 6, pb.w * 0.22);
      c.fillStyle = pumping > 0 ? '#dc2626' : '#ef4444'; c.fill();
      c.lineWidth = 6; c.strokeStyle = '#fff'; c.stroke(); c.restore();
      c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.font = Math.round(pb.h * 0.42) + 'px system-ui'; c.fillText('💨', pb.x + pb.w / 2, pb.y + pb.h * 0.4 + press * 6);
      c.font = '900 ' + Math.round(pb.h * 0.16) + 'px system-ui'; c.fillText('BƠM', pb.x + pb.w / 2, pb.y + pb.h * 0.78 + press * 6);
      c.textBaseline = 'alphabetic';

      c.fillStyle = '#9f1239'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.045) + 'px system-ui';
      c.fillText('🎈 Chạm bơm cho bóng to!', W / 2, H * 0.08);
    });

    return { start: function () { reset(); host.music('happy'); } };
  }
});

/* ---- 3. TAP — pop the bubble wrap ------------------------------------- */
Arcade.register({
  id: 'bubble-wrap', title: 'Bóng Khí', emoji: '🧼', category: 'Tap', color: '#38bdf8',
  desc: 'Chạm để bóp bóng khí.', how: 'Chạm từng bóng để bóp nổ!',
  create: function (host) {
    var bubbles, cols, rows, refill;
    function reset() {
      // grid sized to screen; refilled all-at-once on full pop
      cols = host.W > host.H ? 6 : 4;
      rows = host.W > host.H ? 4 : 6;
      bubbles = [];
      for (var i = 0; i < cols * rows; i++) bubbles.push({ popped: 0, anim: 0 });
      refill = 0;
    }
    function grid() {
      var W = host.W, H = host.H;
      var c2 = host.W > host.H ? 6 : 4, r2 = host.W > host.H ? 4 : 6;
      if (c2 !== cols || r2 !== rows) { cols = c2; rows = r2; if (bubbles.length !== cols * rows) { var nb = []; for (var k = 0; k < cols * rows; k++) nb.push(bubbles[k] || { popped: 0, anim: 0 }); bubbles = nb; } }
      var pad = Math.min(W, H) * 0.03;
      var top = H * 0.12;
      var cw = (W - pad * (cols + 1)) / cols;
      var ch = (H - top - pad * (rows + 1)) / rows;
      var arr = [];
      for (var i = 0; i < cols * rows; i++) {
        var cx = i % cols, cy = (i / cols) | 0;
        arr.push({ x: pad + cx * (cw + pad) + cw / 2, y: top + pad + cy * (ch + pad) + ch / 2, r: Math.min(cw, ch) * 0.46 });
      }
      return arr;
    }
    host.on('tap', function (p) {
      if (!bubbles || refill > 0) return;
      var L = grid();
      for (var i = 0; i < bubbles.length; i++) {
        if (!bubbles[i].popped && host.dist(p.x, p.y, L[i].x, L[i].y) < L[i].r * 1.15) {
          bubbles[i].popped = 1; bubbles[i].anim = 0.3;
          host.sfx(host.choice(['pop', 'pop2'])); host.vibrate(15); host.sparkle(L[i].x, L[i].y, '#bae6fd');
          // all popped?
          var all = true;
          for (var j = 0; j < bubbles.length; j++) if (!bubbles[j].popped) { all = false; break; }
          if (all) { refill = 1.3; host.celebrate(host.W / 2, host.H * 0.5); host.say('All popped!', 'en-US'); }
          return;
        }
      }
    });
    host.loop(function (dt) {
      var c = host.ctx, W = host.W, H = host.H;
      var g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#e0f2fe'); g.addColorStop(1, '#bae6fd'); c.fillStyle = g; c.fillRect(0, 0, W, H);
      var L = grid();
      for (var i = 0; i < bubbles.length; i++) {
        var b = bubbles[i], pt = L[i];
        if (b.anim > 0) b.anim -= dt;
        if (!b.popped) {
          host.bubble(pt.x, pt.y, pt.r, 'rgba(186,230,253,.85)');
        } else {
          // deflated / flat
          var pop = Math.max(0, b.anim) / 0.3;
          c.fillStyle = 'rgba(125,180,225,.45)';
          c.beginPath(); c.ellipse(pt.x, pt.y, pt.r * (0.7 + pop * 0.3), pt.r * 0.4, 0, 0, 7); c.fill();
          c.strokeStyle = 'rgba(80,140,200,.35)'; c.lineWidth = 2;
          c.beginPath(); c.ellipse(pt.x, pt.y, pt.r * 0.7, pt.r * 0.4, 0, 0, 7); c.stroke();
        }
      }
      if (refill > 0) {
        refill -= dt;
        c.fillStyle = '#0369a1'; c.textAlign = 'center'; c.font = '900 ' + Math.round(W * 0.06) + 'px system-ui';

        c.fillText('🧼 Chạm bóp bóng khí!', W / 2, H * 0.07);
